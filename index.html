eau-Zeichen), Kribbeln.<br><b>Hyperkalzämie:</b> Müdigkeit, Obstipation, Polyurie, Nierensteine, Herzrhythmusstörungen („Stein-, Bein-, Magenpein“).","id":"k0315"},{"cat":"haema","topic":"Eisenmangelanämie","freq":28,"type":"qa","q":"Nenne Ursachen und Laborbefund der Eisenmangelanämie.","a":"Häufigste Anämie. Ursachen: chronische Blutverluste (Menstruation, GI-Blutung/Tumor!), erhöhter Bedarf (Schwangerschaft), Mangelernährung.<br>Labor: <b>mikrozytär-hypochrom</b> (MCV/MCH ↓), <b>Ferritin ↓</b> (Eisenspeicher). Klinik: Blässe, Müdigkeit, Mundwinkelrhagaden, brüchige Nägel.","id":"k0316"},{"cat":"haema","topic":"Hämolytische Anämie","freq":5,"type":"qa","q":"Woran erkennt man eine hämolytische Anämie?","a":"Gesteigerter Erythrozytenabbau: <b>indirektes Bilirubin ↑</b> (Ikterus), LDH ↑, <b>Haptoglobin ↓</b>, Retikulozyten ↑, Splenomegalie. Ursachen: Autoimmun, Erythrozytendefekte (z. B. Kugelzellanämie, Sichelzell), mechanisch, Infektionen.","id":"k0317"},{"cat":"haema","topic":"Polyglobulie","freq":10,"type":"qa","q":"Was ist eine Polyglobulie und was unterscheidet sie von der Polycythaemia vera?","a":"<b>Polyglobulie:</b> reaktive Vermehrung der Erythrozyten (Hkt ↑) durch chronischen <b>Sauerstoffmangel</b> (COPD, Höhe, Rauchen) → EPO ↑.<br><b>Polycythaemia vera:</b> <b>myeloproliferative</b> Erkrankung mit autonomer Überproduktion aller Zellreihen; EPO ↓. Gefahr: Thrombosen.","id":"k0318"},{"cat":"haema","topic":"Leukämieformen","freq":5,"type":"qa","q":"Wie werden Leukämien grob eingeteilt und wen betreffen sie typischerweise?","a":"Nach Verlauf (akut/chronisch) und Zellreihe (myeloisch/lymphatisch): <b>ALL</b> (v. a. Kinder), <b>AML</b> (Erwachsene), <b>CLL</b> (ältere Menschen, oft Zufallsbefund), <b>CML</b> (Philadelphia-Chromosom). Akute Formen: rasch, mit Panzytopenie; chronische: schleichend.","id":"k0319"},{"cat":"haema","topic":"Multiples Myelom","freq":5,"type":"qa","q":"Was ist das Multiple Myelom (Plasmozytom)?","a":"Maligne Entartung von <b>Plasmazellen</b> im Knochenmark mit Bildung monoklonaler Antikörper (Paraprotein). Trias: <b>Knochenschmerzen/Osteolysen</b> („Schrotschussschädel“), <b>Hyperkalzämie</b>, <b>Niereninsuffizienz</b>. BSG stark ↑ („Sturzsenkung“).","id":"k0320"},{"cat":"haema","topic":"Non-Hodgkin-Lymphom","freq":5,"type":"qa","q":"Was unterscheidet Non-Hodgkin-Lymphome vom Hodgkin-Lymphom?","a":"Heterogene Gruppe maligner Lymphome <b>ohne</b> Sternberg-Reed-Zellen; können B- oder T-Zell-Ursprung haben, oft schon bei Diagnose disseminiert. Klinik: schmerzlose Lymphknotenschwellung, B-Symptomatik. Prognose variabel (indolent bis hochaggressiv).","id":"k0321"},{"cat":"haema","topic":"ITP","freq":5,"type":"qa","q":"Was ist die Immunthrombozytopenie (Morbus Werlhof)?","a":"Autoimmun­bedingter Abbau von Thrombozyten → <b>Thrombopenie</b> mit Blutungsneigung: <b>Petechien</b>, Hämatome, Nasen-/Zahnfleischbluten. Oft nach Virusinfekt (bei Kindern). Plasmatische Gerinnung normal.","id":"k0322"},{"cat":"haema","topic":"DIC","freq":5,"type":"qa","q":"Was ist die Verbrauchskoagulopathie (DIC)?","a":"Massive, überschießende Gerinnungsaktivierung (z. B. bei Sepsis, Schock, Trauma) → <b>Verbrauch</b> von Gerinnungsfaktoren und Thrombozyten → paradoxe <b>Blutungsneigung</b> bei gleichzeitiger Mikrothrombosierung. Lebensbedrohlicher Notfall.","id":"k0323"},{"cat":"haema","topic":"Agranulozytose","freq":5,"type":"qa","q":"Was ist eine Agranulozytose und woran erkennt man sie?","a":"Starker Mangel an <b>Granulozyten</b> (<500/µl), oft medikamentös ausgelöst (z. B. Metamizol, Thyreostatika, Neuroleptika). Folge: hohe Infektanfälligkeit → <b>Fieber, Angina, Schleimhautulzera</b>. Notfall (Sepsisgefahr).","id":"k0324"},{"cat":"haema","topic":"Blutstillung","freq":5,"type":"qa","q":"Unterscheide primäre und sekundäre Hämostase.","a":"<b>Primäre Hämostase:</b> Gefäßverengung + <b>Thrombozytenpfropf</b> (weißer Thrombus) → schnelle, vorläufige Blutstillung.<br><b>Sekundäre Hämostase:</b> Gerinnungskaskade → <b>Fibrinnetz</b> stabilisiert den Thrombus (roter Thrombus). Fibrinolyse baut ihn später ab.","id":"k0325"},{"cat":"haema","topic":"Immunglobuline","freq":5,"type":"qa","q":"Nenne die Immunglobulinklassen und ihre Besonderheiten.","a":"<b>IgG</b> (häufigstes, Spätantwort, plazentagängig), <b>IgM</b> (Frühantwort, Erstkontakt), <b>IgA</b> (Schleimhäute, Sekrete), <b>IgE</b> (Allergie, Parasiten), <b>IgD</b> (Funktion unklar). Merke: IgM früh, IgG spät → wichtig für die Serologie.","id":"k0326"},{"cat":"bewegung","topic":"Osteomalazie/Rachitis","freq":5,"type":"qa","q":"Was ist die Osteomalazie bzw. Rachitis?","a":"Störung der Knochenmineralisierung durch <b>Vitamin-D-Mangel</b>. Beim Kind = <b>Rachitis</b> (Knochenverformungen, O-Beine, Auftreibungen), beim Erwachsenen = <b>Osteomalazie</b> (weiche, schmerzhafte Knochen, Frakturneigung). Abzugrenzen von der Osteoporose (Masseverlust).","id":"k0327"},{"cat":"bewegung","topic":"Fraktur","freq":5,"type":"qa","q":"Unterscheide sichere und unsichere Frakturzeichen.","a":"<b>Sichere Zeichen:</b> abnorme Beweglichkeit, Fehlstellung/Achsenknick, sichtbare Knochenfragmente, Krepitation (Knochenreiben).<br><b>Unsichere Zeichen:</b> Schmerz, Schwellung, Hämatom, Funktionseinschränkung. <b>Offene Fraktur:</b> Wunde mit Verbindung zum Knochen → Infektionsgefahr.","id":"k0328"},{"cat":"bewegung","topic":"Osteomyelitis","freq":2,"type":"qa","q":"Was ist eine Osteomyelitis?","a":"Infektion des Knochens/Knochenmarks (meist Staphylococcus aureus), hämatogen oder fortgeleitet (offene Fraktur). Akut: Fieber, lokale Entzündungszeichen, starke Schmerzen. Neigt zur Chronifizierung mit Fistelbildung.","id":"k0329"},{"cat":"bewegung","topic":"Fibromyalgie","freq":5,"type":"qa","q":"Was kennzeichnet das Fibromyalgie-Syndrom?","a":"Chronische Schmerzerkrankung mit <b>generalisierten Schmerzen</b> in mehreren Körperregionen, typischen <b>Druckpunkten (Tender Points)</b>, dazu Erschöpfung, Schlafstörungen, Konzentrationsprobleme. <b>Keine</b> entzündlichen/strukturellen Veränderungen nachweisbar.","id":"k0330"},{"cat":"bewegung","topic":"Karpaltunnelsyndrom","freq":5,"type":"qa","q":"Beschreibe das Karpaltunnelsyndrom.","a":"Kompression des <b>N. medianus</b> im Karpaltunnel. Klinik: nächtliche Schmerzen/Kribbeln in Daumen, Zeige- und Mittelfinger (<b>Brachialgia paraesthetica nocturna</b>), später Daumenballenatrophie. Provokationstests: Phalen, Hoffmann-Tinel.","id":"k0331"},{"cat":"bewegung","topic":"Bursitis/Tendovaginitis","freq":5,"type":"qa","q":"Unterscheide Bursitis und Tendovaginitis.","a":"<b>Bursitis</b> = Entzündung eines <b>Schleimbeutels</b> (z. B. Ellenbogen, Knie), Schwellung/Rötung über dem Gelenk.<br><b>Tendovaginitis</b> = Entzündung einer <b>Sehnenscheide</b> (Überlastung), bewegungsabhängiger Schmerz, ggf. Reiben (Crepitatio).","id":"k0332"},{"cat":"bewegung","topic":"Marfan-Syndrom","freq":2,"type":"qa","q":"Was ist das Marfan-Syndrom?","a":"Erbliche Bindegewebserkrankung. Typisch: <b>Hochwuchs, überlange Gliedmaßen/Finger (Arachnodaktylie)</b>, Überstreckbarkeit, Trichterbrust, Linsenluxation. Gefährlich: <b>Aortenaneurysma/-dissektion</b> (regelmäßige Kontrollen nötig).","id":"k0333"},{"cat":"neuro","topic":"Anatomie ZNS","freq":5,"type":"qa","q":"Nenne die Hirnhäute von außen nach innen.","a":"<b>Dura mater</b> (harte Hirnhaut), <b>Arachnoidea</b> (Spinnengewebshaut) und <b>Pia mater</b> (weiche Hirnhaut). Zwischen Arachnoidea und Pia liegt der <b>Subarachnoidalraum</b> mit dem Liquor cerebrospinalis.","id":"k0334"},{"cat":"neuro","topic":"Hirnblutungen","freq":5,"type":"qa","q":"Unterscheide Epi-, Subdural- und Subarachnoidalblutung.","a":"<b>Epiduralblutung:</b> arteriell (A. meningea media), nach Trauma, oft <b>freies Intervall</b> dann rasche Eintrübung.<br><b>Subduralblutung:</b> venös, langsamer (v. a. ältere Menschen/Antikoagulation).<br><b>Subarachnoidalblutung:</b> meist Aneurysmaruptur → <b>schlagartiger Vernichtungskopfschmerz</b>, Meningismus.","id":"k0335"},{"cat":"neuro","topic":"Hirntumor","freq":2,"type":"qa","q":"Nenne typische Symptome eines Hirntumors.","a":"Zeichen des <b>erhöhten Hirndrucks</b> (morgendliche Kopfschmerzen, Nüchternerbrechen, Stauungspapille), <b>fokal-neurologische Ausfälle</b> (je nach Lokalisation), erstmalige <b>epileptische Anfälle</b> im Erwachsenenalter, Wesensänderung. Gutartig (Meningeom) bis bösartig (Glioblastom).","id":"k0336"},{"cat":"neuro","topic":"Trigeminusneuralgie","freq":2,"type":"qa","q":"Was ist die Trigeminusneuralgie?","a":"<b>Blitzartig einschießende, extrem heftige</b> Gesichtsschmerzen im Versorgungsgebiet des N. trigeminus (meist V2/V3), Sekunden dauernd, durch Trigger (Kauen, Sprechen, Berührung, Kälte) auslösbar. Zwischen den Attacken meist beschwerdefrei.","id":"k0337"},{"cat":"neuro","topic":"Polyneuropathie","freq":5,"type":"qa","q":"Nenne Ursachen und Symptome einer Polyneuropathie.","a":"Schädigung mehrerer peripherer Nerven. Häufige Ursachen: <b>Diabetes mellitus</b> und <b>Alkohol</b>. Klinik: symmetrisch, distal betont (<b>„socken-/handschuhförmig“</b>): Kribbeln, Taubheit, brennende Schmerzen, abgeschwächte Reflexe, später Paresen.","id":"k0338"},{"cat":"neuro","topic":"Chorea Huntington","freq":2,"type":"qa","q":"Was ist die Chorea Huntington?","a":"Erbliche, fortschreitende ZNS-Erkrankung (autosomal-dominant). Trias: <b>Bewegungsstörung (choreatische Hyperkinesen)</b>, <b>psychische Veränderungen</b> und <b>Demenz</b>. Beginn meist im mittleren Erwachsenenalter.","id":"k0339"},{"cat":"neuro","topic":"Interkostalneuralgie","freq":2,"type":"qa","q":"Was ist eine Interkostalneuralgie und warum ist sie als DD wichtig?","a":"Schmerzen entlang eines <b>Interkostalnervs</b> (gürtelförmig, atem-/bewegungsabhängig). Wichtige <b>Differenzialdiagnose bei Thoraxschmerz</b> (Abgrenzung vom Herzinfarkt). Ursache u. a. Wirbelsäulenblockade, Herpes zoster.","id":"k0340"},{"cat":"neuro","topic":"Glaukom","freq":2,"type":"qa","q":"Was ist ein Glaukom und was kennzeichnet den Glaukomanfall?","a":"<b>„Grüner Star“</b>: Schädigung des Sehnervs, meist durch erhöhten Augeninnendruck. <b>Akuter Glaukomanfall:</b> plötzlicher heftiger Augen-/Kopfschmerz, hartes Auge, rotes Auge, Sehverschlechterung, Übelkeit, weite lichtstarre Pupille → <b>augenärztlicher Notfall</b> (Erblindungsgefahr).","id":"k0341"},{"cat":"neuro","topic":"Katarakt","freq":2,"type":"qa","q":"Was ist die Katarakt?","a":"<b>„Grauer Star“</b>: Trübung der Augenlinse, meist altersbedingt. Klinik: langsam zunehmende, schmerzlose Sehverschlechterung, Blendempfindlichkeit, „Sehen wie durch Nebel“. Therapie: operativer Linsenersatz.","id":"k0342"},{"cat":"neuro","topic":"Netzhautablösung","freq":2,"type":"qa","q":"Welche Warnsymptome deuten auf eine Netzhautablösung hin?","a":"<b>Lichtblitze, „Rußregen“/schwarze Punkte</b> und ein von der Peripherie aufsteigender <b>„Vorhang/Schatten“</b> im Gesichtsfeld, schmerzlos. Augenärztlicher Notfall – rasche Behandlung nötig, um Erblindung zu verhindern.","id":"k0343"},{"cat":"neuro","topic":"Makuladegeneration","freq":2,"type":"qa","q":"Was ist die altersbedingte Makuladegeneration (AMD)?","a":"Degeneration der Makula (Stelle des schärfsten Sehens). Folge: Verlust des <b>zentralen Sehens</b> (Gesichter/Lesen), <b>verzerrtes Sehen</b> (Metamorphopsien), zentraler Fleck; das periphere Sehen bleibt erhalten. Häufigste Erblindungsursache im Alter.","id":"k0344"},{"cat":"neuro","topic":"Otitis media","freq":2,"type":"qa","q":"Beschreibe die akute Otitis media.","a":"Mittelohrentzündung, v. a. bei Kindern nach Atemwegsinfekt. Klinik: heftige <b>Ohrenschmerzen</b>, Fieber, Hörminderung, gerötetes/vorgewölbtes Trommelfell. Komplikation: <b>Mastoiditis</b> (abstehendes Ohr, Druckschmerz hinter dem Ohr).","id":"k0345"},{"cat":"neuro","topic":"Menière","freq":2,"type":"qa","q":"Nenne die Symptomtrias der Menière-Krankheit.","a":"<b>Drehschwindel-Attacken</b>, <b>einseitiger Tinnitus</b> und <b>Hörminderung</b> (Innenohr). Ursache: Endolymphstau im Innenohr. Attacken mit Übelkeit/Erbrechen, Minuten bis Stunden.","id":"k0346"},{"cat":"neuro","topic":"Hörsturz","freq":2,"type":"qa","q":"Was ist ein Hörsturz?","a":"Plötzliche, meist <b>einseitige Innenohrschwerhörigkeit</b> ohne erkennbare Ursache, oft mit Tinnitus und Druckgefühl, <b>ohne Schwindel/Schmerz</b>. „Watte im Ohr“-Gefühl. Ursache unklar (Durchblutungsstörung diskutiert).","id":"k0347"},{"cat":"derma","topic":"Ekzem","freq":5,"type":"qa","q":"Was unterscheidet ein allergisches Kontaktekzem vom toxischen Kontaktekzem?","a":"<b>Allergisches Kontaktekzem</b> (Typ-IV-Reaktion): tritt <b>verzögert</b> nach Sensibilisierung auf, breitet sich über die Kontaktstelle hinaus aus (z. B. Nickel).<br><b>Toxisch-irritatives Ekzem</b>: direkte Hautschädigung durch Reizstoffe, scharf auf die Kontaktstelle begrenzt, dosisabhängig.","id":"k0348"},{"cat":"derma","topic":"Urtikaria","freq":5,"type":"qa","q":"Was ist eine Urtikaria und was ist ein Angioödem?","a":"<b>Urtikaria (Nesselsucht):</b> flüchtige, stark juckende <b>Quaddeln</b> (Typ-I-Reaktion, Histamin).<br><b>Angioödem (Quincke-Ödem):</b> tiefe Schwellung von Haut/Schleimhaut (Lippen, Lider, Zunge, Kehlkopf) → bei Kehlkopfbeteiligung <b>Erstickungsgefahr</b>.","id":"k0349"},{"cat":"derma","topic":"Rosazea","freq":2,"type":"qa","q":"Was kennzeichnet die Rosazea?","a":"Chronisch-entzündliche Gesichtsdermatose (Wangen, Nase, Stirn): <b>Rötung, Teleangiektasien, Papeln/Pusteln</b>, getriggert durch Sonne, Alkohol, Hitze. Spätform: <b>Rhinophym</b> („Knollennase“). Keine Komedonen (Unterschied zur Akne).","id":"k0350"},{"cat":"derma","topic":"Basaliom/Spinaliom","freq":5,"type":"qa","q":"Unterscheide Basalzellkarzinom und Spinaliom.","a":"<b>Basaliom (Basalzellkarzinom):</b> häufigster Hautkrebs, <b>lokal destruierend</b>, aber <b>metastasiert praktisch nie</b>; perlschnurartiger Randwall, Teleangiektasien.<br><b>Spinaliom (Plattenepithelkarzinom):</b> kann <b>metastasieren</b>; entsteht oft auf lichtgeschädigter Haut (aktinische Keratose), hyperkeratotisch/ulzeriert.","id":"k0351"},{"cat":"derma","topic":"Verbrennungen","freq":5,"type":"qa","q":"Wie schätzt man die Ausdehnung einer Verbrennung ab (Neuner-Regel)?","a":"<b>Neuner-Regel nach Wallace</b> (Erwachsene): Kopf 9 %, jeder Arm 9 %, Rumpf vorn 18 %, Rumpf hinten 18 %, jedes Bein 18 %, Genital 1 %. Alternativ: Handfläche des Patienten ≈ 1 % KOF. Ab ~10–20 % verbrannter Körperoberfläche droht ein Verbrennungsschock.","id":"k0352"},{"cat":"derma","topic":"Verbrennungsgrade","freq":5,"type":"qa","q":"Nenne die Verbrennungsgrade.","a":"<b>Grad 1:</b> nur Epidermis, Rötung, schmerzhaft (Sonnenbrand), heilt folgenlos.<br><b>Grad 2:</b> bis Dermis, <b>Blasen</b>, sehr schmerzhaft.<br><b>Grad 3:</b> gesamte Haut zerstört, weiß/lederartig, <b>schmerzlos</b> (Nerven zerstört).<br><b>Grad 4:</b> Verkohlung bis auf Muskel/Knochen.","id":"k0353"},{"cat":"psych","topic":"Alkoholabhängigkeit","freq":5,"type":"qa","q":"Nenne die Kriterien einer Abhängigkeitserkrankung (ICD-10).","a":"Mind. 3 von 6: <b>starker Wunsch/Zwang</b> zu konsumieren, verminderte <b>Kontrollfähigkeit</b>, <b>Toleranzentwicklung</b>, <b>Entzugssymptome</b>, Vernachlässigung anderer Interessen, anhaltender Konsum trotz schädlicher Folgen.","id":"k0354"},{"cat":"psych","topic":"Alkoholentzug","freq":5,"type":"qa","q":"Was ist das Delirium tremens?","a":"Schweres <b>Alkoholentzugsdelir</b> (lebensbedrohlich!). Symptome: Bewusstseins-/Orientierungsstörung, <b>optische Halluzinationen</b> (z. B. „weiße Mäuse“), grobschlägiger Tremor, vegetative Entgleisung (Schwitzen, Tachykardie, Hypertonie), Krampfanfälle. Notfall – ärztliche Behandlung!","id":"k0355"},{"cat":"psych","topic":"Demenzformen","freq":5,"type":"qa","q":"Unterscheide Alzheimer-Demenz und vaskuläre Demenz.","a":"<b>Alzheimer:</b> häufigste Form, <b>schleichender</b> Beginn, kontinuierlich fortschreitend, früh Gedächtnisstörung (Kurzzeitgedächtnis).<br><b>Vaskuläre Demenz:</b> durch Durchblutungsstörungen, oft <b>stufenweiser</b> Verlauf, fokale neurologische Zeichen, kardiovaskuläre Risikofaktoren.","id":"k0356"},{"cat":"psych","topic":"Zwangsstörung","freq":5,"type":"qa","q":"Was kennzeichnet eine Zwangsstörung (F42)?","a":"Wiederkehrende <b>Zwangsgedanken</b> (aufdrängend, als unsinnig erkannt) und/oder <b>Zwangshandlungen</b> (Rituale, z. B. Waschen, Kontrollieren), die als ich-dyston erlebt werden; Widerstand erzeugt Angst. Erheblicher Zeitaufwand und Leidensdruck.","id":"k0357"},{"cat":"psych","topic":"Belastungsstörungen","freq":5,"type":"qa","q":"Unterscheide akute Belastungsreaktion, PTBS und Anpassungsstörung.","a":"<b>Akute Belastungsreaktion:</b> unmittelbar nach Trauma, Stunden bis Tage.<br><b>PTBS:</b> nach Latenz (Wochen–Monate), mit <b>Flashbacks</b>, Übererregung, Vermeidung.<br><b>Anpassungsstörung:</b> Reaktion auf belastende Lebensveränderung (z. B. Trennung), depressiv/ängstlich gefärbt.","id":"k0358"},{"cat":"psych","topic":"Somatoforme Störung","freq":5,"type":"qa","q":"Was ist eine somatoforme Störung?","a":"Anhaltende <b>körperliche Beschwerden ohne (ausreichenden) organischen Befund</b>, verbunden mit dem Drängen auf immer neue Untersuchungen. Formen: Somatisierungsstörung, hypochondrische Störung, somatoforme autonome Funktionsstörung.","id":"k0359"},{"cat":"psych","topic":"Dissoziative Störung","freq":5,"type":"qa","q":"Was sind dissoziative (Konversions-)Störungen?","a":"Teilweiser oder völliger Verlust der normalen Integration von Erinnerung, Identität, Wahrnehmung oder Körperkontrolle – <b>ohne organische Ursache</b>, meist nach psychischer Belastung. Beispiele: dissoziative Amnesie, Fugue, Bewegungs-/Sensibilitätsstörungen (Konversion).","id":"k0360"},{"cat":"psych","topic":"Persönlichkeitsstörungen","freq":5,"type":"qa","q":"Nenne Beispiele spezifischer Persönlichkeitsstörungen.","a":"<b>Emotional instabil (Borderline):</b> Instabilität von Beziehungen/Affekten, Impulsivität, Selbstverletzung.<br><b>Ängstlich-vermeidend, abhängig, zwanghaft (anankastisch), histrionisch, dissozial (antisozial), paranoid, schizoid, narzisstisch.</b> Tief verwurzelte, unflexible Verhaltensmuster.","id":"k0361"},{"cat":"psych","topic":"Schlafstörungen","freq":5,"type":"qa","q":"Was versteht man unter einer nichtorganischen Insomnie?","a":"Ein- und/oder Durchschlafstörungen bzw. nicht erholsamer Schlaf <b>ohne organische Ursache</b>, über mind. 1 Monat, mit Beeinträchtigung am Tag. Häufig durch Stress, Grübeln, schlechte Schlafhygiene. Behandlung: Schlafhygiene, Verhaltenstherapie.","id":"k0362"},{"cat":"psych","topic":"ADHS","freq":5,"type":"qa","q":"Was kennzeichnet die hyperkinetische Störung (ADHS)?","a":"Kernsymptome: <b>Unaufmerksamkeit, Hyperaktivität und Impulsivität</b> – situationsübergreifend, Beginn vor dem 6.–7. Lebensjahr. Führt zu Schwierigkeiten in Schule/Sozialverhalten. Kann bis ins Erwachsenenalter fortbestehen.","id":"k0363"},{"cat":"psych","topic":"Autismus","freq":5,"type":"qa","q":"Was kennzeichnet eine Autismus-Spektrum-Störung?","a":"Tiefgreifende Entwicklungsstörung mit Beeinträchtigung der <b>sozialen Interaktion und Kommunikation</b> sowie <b>eingeschränkten, repetitiven Verhaltensmustern/Interessen</b> (Rituale, Routinen). Beginn in der frühen Kindheit; Ausprägung sehr variabel.","id":"k0364"},{"cat":"psych","topic":"Psychotherapie","freq":5,"type":"qa","q":"Nenne die anerkannten Psychotherapie-Grundverfahren.","a":"<b>Verhaltenstherapie</b> (VT), <b>tiefenpsychologisch fundierte Psychotherapie</b>, <b>analytische Psychotherapie</b> (Psychoanalyse) und die <b>systemische Therapie</b>. Der Heilpraktiker für Psychotherapie darf Psychotherapie im Rahmen seiner Erlaubnis ausüben.","id":"k0365"},{"cat":"niere","topic":"Schwangerschaft","freq":5,"type":"qa","q":"Wie berechnet man den Geburtstermin (Naegele-Regel)?","a":"<b>1. Tag der letzten Regel + 7 Tage − 3 Monate + 1 Jahr</b> (bei 28-tägigem Zyklus). Die Schwangerschaft dauert ~40 Wochen (280 Tage) post menstruationem. Bei abweichender Zykluslänge wird korrigiert.","id":"k0366"},{"cat":"niere","topic":"Schwangerschaftszeichen","freq":5,"type":"qa","q":"Unterscheide unsichere, wahrscheinliche und sichere Schwangerschaftszeichen.","a":"<b>Unsicher:</b> Übelkeit, Brustspannen, Müdigkeit.<br><b>Wahrscheinlich:</b> Ausbleiben der Regel, positiver <b>HCG-Test</b>, Gebärmuttervergrößerung, livide Scheide.<br><b>Sicher:</b> Nachweis kindlicher <b>Herztöne</b>, Kindsbewegungen (fühlbar), Ultraschall/Tasten von Kindsteilen.","id":"k0367"},{"cat":"niere","topic":"Präeklampsie","freq":5,"type":"qa","q":"Was ist eine Präeklampsie (EPH-Gestose)?","a":"Schwangerschaftserkrankung mit <b>Hypertonie und Proteinurie</b> (früher Trias mit Ödemen). Warnzeichen für die <b>Eklampsie</b> (Krampfanfälle): Kopfschmerzen, Augenflimmern, Oberbauchschmerz. Lebensbedrohlich für Mutter und Kind.","id":"k0368"},{"cat":"niere","topic":"Klimakterium","freq":2,"type":"qa","q":"Was passiert im Klimakterium?","a":"Übergangsphase mit nachlassender Ovarialfunktion → <b>Östrogenmangel</b>. Beschwerden: <b>Hitzewallungen</b>, Schweißausbrüche, Schlafstörungen, Stimmungsschwankungen, Zyklusunregelmäßigkeiten. <b>Menopause</b> = letzte Regelblutung. Langfristig: Osteoporoserisiko ↑.","id":"k0369"},{"cat":"niere","topic":"Mammakarzinom","freq":5,"type":"qa","q":"Nenne Warnzeichen und Früherkennung des Mammakarzinoms.","a":"<b>Warnzeichen:</b> tastbarer, harter, verschieblicher/fixierter Knoten, Hauteinziehung, <b>Orangenhaut</b> (Peau d'orange), Sekretion/Einziehung der Mamille, Lymphknoten in der Achsel.<br><b>Früherkennung:</b> Selbstuntersuchung, Tastuntersuchung, <b>Mammografie-Screening</b>. Häufigster Krebs der Frau.","id":"k0370"},{"cat":"niere","topic":"Prostatakarzinom","freq":5,"type":"qa","q":"Wie werden Prostatakarzinom und benignes Prostatasyndrom unterschieden?","a":"<b>Benignes Prostatasyndrom (BPH):</b> gutartige Vergrößerung → Blasenentleerungsstörungen (Nykturie, abgeschwächter Strahl, Restharn).<br><b>Prostatakarzinom:</b> lange symptomlos, wächst peripher; Diagnostik: rektale Untersuchung (harter Knoten), <b>PSA</b>, Biopsie. Häufigster Krebs des Mannes.","id":"k0371"},{"cat":"niere","topic":"Endometriose","freq":5,"type":"qa","q":"Was ist Endometriose?","a":"Vorkommen von <b>Gebärmutterschleimhaut außerhalb der Gebärmutterhöhle</b> (z. B. Eierstöcke, Bauchfell). Zyklusabhängige Beschwerden: starke <b>Menstruations-/Unterbauchschmerzen</b>, Schmerzen beim Verkehr, mögliche <b>Unfruchtbarkeit</b>.","id":"k0372"},{"cat":"niere","topic":"PCOS","freq":2,"type":"qa","q":"Was kennzeichnet das PCO-Syndrom?","a":"Häufige hormonelle Störung der Frau: <b>Zyklusstörungen/Anovulation</b>, <b>Hyperandrogenismus</b> (Hirsutismus, Akne) und <b>polyzystische Ovarien</b>. Oft mit Insulinresistenz/Übergewicht verbunden; häufige Ursache für unerfüllten Kinderwunsch.","id":"k0373"},{"cat":"endo","topic":"Tumor Grundlagen","freq":5,"type":"qa","q":"Was unterscheidet einen benignen von einem malignen Tumor?","a":"<b>Benigne:</b> langsam wachsend, <b>verdrängend</b>, scharf begrenzt/gekapselt, differenziert, <b>metastasiert nicht</b>.<br><b>Maligne:</b> schnell/<b>infiltrierend-destruierend</b> wachsend, unscharf begrenzt, entdifferenziert, <b>metastasiert</b> (lymphogen/hämatogen), Rezidivneigung.","id":"k0374"},{"cat":"endo","topic":"TNM","freq":5,"type":"qa","q":"Wofür steht die TNM-Klassifikation?","a":"<b>T</b> = Größe/Ausdehnung des <b>Primärtumors</b> (T1–T4).<br><b>N</b> = regionale <b>Lymphknoten</b> (N0–N3).<br><b>M</b> = <b>Fernmetastasen</b> (M0/M1). Dient der einheitlichen Stadieneinteilung und Prognoseabschätzung solider Tumoren.","id":"k0375"},{"cat":"endo","topic":"Metastasierung","freq":5,"type":"qa","q":"Welche Organe sind häufige Ziele der hämatogenen Metastasierung?","a":"<b>Leber, Lunge, Knochen und Gehirn</b>. Der Weg richtet sich nach dem venösen Abfluss: z. B. Kolonkarzinom → über Pfortader in die <b>Leber</b>; ossäre Metastasen häufig bei Prostata-, Mamma-, Bronchial-, Nierenkarzinom.","id":"k0376"},{"cat":"endo","topic":"Früherkennung","freq":5,"type":"qa","q":"Nenne wichtige gesetzliche Krebsfrüherkennungsuntersuchungen.","a":"<b>Darm:</b> Test auf okkultes Blut, Koloskopie ab 50/55.<br><b>Brust:</b> Tastuntersuchung, Mammografie-Screening (50–69).<br><b>Gebärmutterhals:</b> Zytologie (Pap)/HPV-Test.<br><b>Prostata:</b> Tastuntersuchung ab 45.<br><b>Haut:</b> Hautkrebs-Screening ab 35.","id":"k0377"},{"cat":"endo","topic":"Frailty","freq":2,"type":"qa","q":"Was versteht man unter Frailty (Gebrechlichkeit)?","a":"Altersassoziiertes Syndrom mit verminderter Reservekapazität und erhöhter Vulnerabilität. Zeichen u. a.: <b>ungewollter Gewichtsverlust, Erschöpfung, Muskelschwäche (Sarkopenie), langsames Gehen, geringe Aktivität</b>. Erhöht das Risiko für Stürze, Krankenhausaufenthalte, Abhängigkeit.","id":"k0378"},{"cat":"endo","topic":"Geriatrische Syndrome","freq":2,"type":"qa","q":"Nenne die „geriatrischen I“ (typische Altersprobleme).","a":"Häufige geriatrische Syndrome: <b>Immobilität, Instabilität (Stürze), Inkontinenz, intellektueller Abbau (kognitive Störung/Demenz)</b> sowie iatrogene Probleme (Polypharmazie). Erfordern ein ganzheitliches, funktionsorientiertes Vorgehen.","id":"k0379"},{"cat":"notfall","topic":"Bewusstlosigkeit","freq":26,"type":"qa","q":"Wie geht man bei einer bewusstlosen Person mit erhaltener Atmung vor?","a":"Bewusstsein und Atmung prüfen → bei vorhandener normaler Atmung <b>stabile Seitenlage</b> (freie Atemwege, Aspirationsschutz), <b>Notruf 112</b>, regelmäßige Kontrolle von Atmung/Bewusstsein, Wärmeerhalt. Bei Atemstillstand → Reanimation.","id":"k0380"},{"cat":"notfall","topic":"Reanimation Kind","freq":5,"type":"qa","q":"Was ist bei der Reanimation von Kindern/Säuglingen anders?","a":"Da bei Kindern meist ein <b>Atemproblem</b> Ursache ist, beginnt man mit <b>5 initialen Beatmungen</b>, dann Verhältnis <b>15:2</b> (Laien 30:2). Drucktiefe ~⅓ des Brustkorbdurchmessers. Beim Säugling Kompression mit 2 Fingern/umgreifenden Daumen.","id":"k0381"},{"cat":"notfall","topic":"Defibrillation","freq":5,"type":"qa","q":"Wann wird ein AED eingesetzt und bei welchen Rhythmen ist eine Defibrillation sinnvoll?","a":"Der AED wird bei jedem Kreislaufstillstand eingesetzt und analysiert selbst. Defibrillierbar sind <b>Kammerflimmern</b> und <b>pulslose ventrikuläre Tachykardie</b>. <b>Nicht</b> schockbar: Asystolie und pulslose elektrische Aktivität (dann nur Herzdruckmassage/Medikamente).","id":"k0382"},{"cat":"notfall","topic":"Hitzeschäden","freq":2,"type":"qa","q":"Unterscheide Hitzeerschöpfung und Hitzschlag.","a":"<b>Hitzeerschöpfung:</b> Flüssigkeits-/Salzverlust → Schwäche, Schwindel, Übelkeit, <b>blasse feuchte Haut</b>, meist normale/leicht erhöhte Temperatur.<br><b>Hitzschlag:</b> Versagen der Temperaturregulation → <b>heiße trockene Haut</b>, Temperatur >40 °C, Bewusstseinsstörung → <b>lebensbedrohlicher Notfall</b>.","id":"k0383"},{"cat":"notfall","topic":"Unterkühlung","freq":2,"type":"qa","q":"Was ist bei einer Unterkühlung (Hypothermie) zu beachten?","a":"Vorsichtiger Umgang – <b>keine ruckartigen Bewegungen</b> (Gefahr von Herzrhythmusstörungen/„Bergungstod“). Nasse Kleidung entfernen, langsam wärmeerhalten, keine aktive Erwärmung der Extremitäten. Bei Kreislaufstillstand: Reanimation (Wiederbelebung auch nach längerer Zeit möglich – „niemand ist tot, bis er warm und tot ist“).","id":"k0384"},{"cat":"notfall","topic":"Vergiftung","freq":5,"type":"qa","q":"Was ist bei einer Vergiftung zu tun und was sollte man unterlassen?","a":"<b>Giftinformationszentrale</b> anrufen, Giftreste/Verpackung sichern, Vitalfunktionen sichern, Notruf. <b>Kein pauschales Erbrechen</b> auslösen (bei Säuren/Laugen und Schaumbildnern gefährlich!), keine Milch geben. Bei Bewusstlosigkeit: stabile Seitenlage/Reanimation.","id":"k0385"},{"cat":"notfall","topic":"Synkope-Notfall","freq":26,"type":"qa","q":"Wie handelt man bei einer einfachen (vasovagalen) Synkope?","a":"Patient <b>flach lagern und Beine hochlegern</b> (verbessert die Hirndurchblutung), für frische Luft sorgen, beengende Kleidung öffnen. Meist rasche Erholung. Bei fehlender Erholung, Verletzung oder Verdacht auf kardiale Ursache: Notruf.","id":"k0386"},{"cat":"dd","topic":"DD Schwindel","freq":5,"type":"qa","q":"Wie unterscheidet man systematischen von unsystematischem Schwindel?","a":"<b>Systematischer Schwindel</b> (gerichtet): <b>Drehschwindel</b> (vestibulär: Lagerungsschwindel, Menière, Neuritis vestibularis) oder Schwankschwindel.<br><b>Unsystematischer Schwindel</b> (ungerichtet): Benommenheit, Schwarzwerden vor den Augen – oft kreislaufbedingt (Orthostase, Hypoglykämie, Anämie, Herzrhythmusstörung, psychogen).","id":"k0387"},{"cat":"dd","topic":"DD Bauchschmerzen","freq":5,"type":"qa","q":"Wie ordnet man Bauchschmerzen nach Lokalisation ein?","a":"<b>Rechter Oberbauch:</b> Galle, Leber, Duodenum.<br><b>Epigastrium:</b> Magen, Pankreas, Herz(!).<br><b>Linker Oberbauch:</b> Milz, Magen, Pankreasschwanz.<br><b>Rechter Unterbauch:</b> Appendix, Adnexe.<br><b>Linker Unterbauch:</b> Sigmadivertikulitis, Adnexe.<br><b>Unterbauch mittig:</b> Blase, Uterus. Wichtig: das akute Abdomen abgrenzen.","id":"k0388"},{"cat":"dd","topic":"DD Obstipation","freq":16,"type":"qa","q":"Nenne Ursachen einer Obstipation und die Alarmzeichen.","a":"<b>Ursachen:</b> ballaststoffarme Ernährung/Bewegungsmangel, Medikamente (Opioide), Hypothyreose, Hypokaliämie, neurogen, mechanisch (Tumor, Stenose).<br><b>Alarmzeichen:</b> neu aufgetretene Obstipation im Alter, Blut im Stuhl, Gewichtsverlust, Bleistiftstuhl, Wechsel mit Diarrhö → <b>Verdacht auf kolorektales Karzinom</b>.","id":"k0389"},{"cat":"dd","topic":"DD Sodbrennen","freq":9,"type":"qa","q":"Was ist die gastroösophageale Refluxkrankheit (GERD)?","a":"Rückfluss von saurem Mageninhalt in die Speiseröhre durch Insuffizienz des unteren Ösophagussphinkters. Leitsymptom: <b>Sodbrennen</b> (retrosternales Brennen), saures Aufstoßen, v. a. im Liegen/nach dem Essen. Komplikation: Refluxösophagitis, <b>Barrett-Ösophagus</b> (Präkanzerose).","id":"k0390"},{"cat":"dd","topic":"DD Miktionsstörungen","freq":8,"type":"qa","q":"Nenne Ursachen von Miktionsstörungen bzw. Harninkontinenz.","a":"<b>Blasenentleerungsstörung:</b> Prostatavergrößerung (Mann), Harnröhrenstenose, neurogen.<br><b>Inkontinenz:</b> Belastungs-/Stressinkontinenz (Beckenboden), Dranginkontinenz (überaktive Blase), Überlaufinkontinenz (Abflusshindernis). Dazu: Harnwegsinfekt, Reizblase.","id":"k0391"},{"cat":"dd","topic":"DD Rückenschmerzen","freq":5,"type":"qa","q":"Welche Warnzeichen (red flags) bei Rückenschmerzen erfordern Abklärung?","a":"<b>Neurologische Ausfälle</b> (Lähmung, Reithosenanästhesie, Blasen-/Mastdarmstörung → Kaudasyndrom!), B-Symptomatik/Tumoranamnese, Fieber (Spondylodiszitis), Trauma/Osteoporose (Fraktur), nächtlicher/ruheunabhängiger Schmerz, sehr junges/hohes Alter, viszerale Ursachen (Aortenaneurysma, Niere, Pankreas).","id":"k0392"},{"cat":"dd","topic":"DD Gelenkschmerzen","freq":9,"type":"qa","q":"Wie unterscheidet man Mono-, Oligo- und Polyarthritis differenzialdiagnostisch?","a":"<b>Monarthritis:</b> Gicht, septische Arthritis, aktivierte Arthrose, reaktiv.<br><b>Oligoarthritis:</b> reaktive Arthritis, Psoriasisarthritis, M. Bechterew.<br><b>Polyarthritis (symmetrisch):</b> rheumatoide Arthritis, Kollagenosen, virale Arthritiden. Wichtig: entzündlich (Ruheschmerz, Morgensteife) vs. degenerativ (Belastungsschmerz).","id":"k0393"},{"cat":"dd","topic":"DD Lymphknotenschwellung","freq":5,"type":"qa","q":"Nenne Ursachen einer Lymphknotenschwellung.","a":"<b>Entzündlich/reaktiv</b> (häufig, schmerzhaft, weich): lokale/systemische Infektionen (Mononukleose, HIV, Tuberkulose, Toxoplasmose).<br><b>Maligne</b> (derb, indolent, fixiert): Lymphome, Leukämie, Metastasen. Generalisiert → v. a. an systemische Erkrankungen denken.","id":"k0394"},{"cat":"dd","topic":"DD Splenomegalie","freq":5,"type":"qa","q":"Nenne Ursachen einer Milzvergrößerung (Splenomegalie).","a":"<b>Stauung:</b> portale Hypertension (Leberzirrhose).<br><b>Infektion:</b> Mononukleose, Malaria, Endokarditis.<br><b>Hämatologisch:</b> Leukämien, Lymphome, hämolytische Anämien, Polycythaemia vera.<br><b>Speicherkrankheiten</b>. Massive Splenomegalie v. a. bei CML/Malaria.","id":"k0395"},{"cat":"dd","topic":"DD Aszites","freq":5,"type":"qa","q":"Nenne die wichtigsten Ursachen von Aszites.","a":"<b>Portale Hypertension</b> (Leberzirrhose – häufigste Ursache), <b>Rechtsherzinsuffizienz</b>, <b>nephrotisches Syndrom</b> (Hypalbuminämie), <b>Peritonealkarzinose/Malignom</b>, Peritonitis (auch tuberkulös). Unterscheidung Transsudat/Exsudat durch Punktion.","id":"k0396"},{"cat":"dd","topic":"DD Pruritus","freq":5,"type":"qa","q":"An welche systemischen Ursachen muss man bei chronischem Juckreiz denken?","a":"<b>Cholestase</b> (Gallenstau, Leber), <b>Niereninsuffizienz</b> (urämischer Juckreiz), <b>Diabetes mellitus</b>, <b>Schilddrüsenerkrankungen</b>, <b>Eisenmangel/Polycythaemia vera</b>, <b>Lymphome</b> (v. a. Hodgkin), Medikamente, psychogen – neben Hauterkrankungen (Ekzem, Skabies, Urtikaria).","id":"k0397"},{"cat":"dd","topic":"DD Ikterus Neugeborenes","freq":2,"type":"qa","q":"Was unterscheidet den physiologischen vom pathologischen Neugeborenenikterus?","a":"<b>Physiologisch:</b> tritt ab dem 3. Lebenstag auf, harmlos, spontan rückläufig.<br><b>Pathologisch:</b> Beginn vor 24 h, sehr hohe Bilirubinwerte, verlängerter Verlauf → Gefahr des <b>Kernikterus</b> (Bilirubinenzephalopathie). Ursachen u. a. Blutgruppenunverträglichkeit.","id":"k0398"},{"cat":"dd","topic":"DD Hämaturie","freq":5,"type":"qa","q":"Nenne Ursachen einer Hämaturie (Blut im Urin).","a":"<b>Urologisch:</b> Harnwegsinfekt, Steine, Tumoren (Blasen-/Nierenkarzinom), Prostata.<br><b>Nephrologisch:</b> Glomerulonephritis (bräunlicher Urin, Akanthozyten).<br>Weitere: Trauma, Gerinnungsstörung/Antikoagulation. Schmerzlose Makrohämaturie ist immer <b>tumorverdächtig</b>.","id":"k0399"},{"cat":"dd","topic":"DD Dysphagie","freq":5,"type":"qa","q":"Nenne Ursachen einer Schluckstörung (Dysphagie).","a":"<b>Mechanisch/obstruktiv:</b> Ösophaguskarzinom, Stenose, Divertikel, Struma.<br><b>Motorisch/neuromuskulär:</b> Achalasie, Schlaganfall, Parkinson, MS, Myasthenie.<br>Warnzeichen: rasch progrediente Dysphagie für feste Speisen + Gewichtsverlust → <b>Tumorverdacht</b>.","id":"k0400"},{"cat":"dd","topic":"DD Halsschmerzen","freq":5,"type":"qa","q":"Wie unterscheidet man virale von bakterieller Tonsillitis?","a":"<b>Viral</b> (häufig): begleitender Schnupfen/Husten, mäßige Beschwerden.<br><b>Bakteriell (Streptokokken A):</b> hohes Fieber, starke Halsschmerzen, eitrige Beläge, Lymphknotenschwellung, KEIN Husten. <b>Cave:</b> einseitige Schwellung mit Kieferklemme → Peritonsillarabszess.","id":"k0401"},{"cat":"pharma","topic":"WHO-Stufenschema","freq":5,"type":"qa","q":"Erkläre das WHO-Stufenschema der Schmerztherapie.","a":"<b>Stufe 1:</b> Nicht-Opioide (NSAR, Paracetamol, Metamizol).<br><b>Stufe 2:</b> schwache Opioide (Tramadol, Tilidin) + Nicht-Opioid.<br><b>Stufe 3:</b> starke Opioide (Morphin) + Nicht-Opioid.<br>Ergänzend: Koanalgetika (z. B. Antidepressiva, Antikonvulsiva bei Nervenschmerz).","id":"k0402"},{"cat":"pharma","topic":"Opioide","freq":5,"type":"qa","q":"Nenne Wirkung und Nebenwirkungen von Opioiden.","a":"Starke <b>analgetische</b> Wirkung über Opioidrezeptoren.<br><b>NW:</b> Atemdepression (gefährlichste!), <b>Obstipation</b>, Übelkeit, Sedierung, Miosis (enge Pupillen), Abhängigkeit/Toleranz. Antidot bei Überdosis: <b>Naloxon</b>. Opioide unterliegen dem BtMG.","id":"k0403"},{"cat":"pharma","topic":"Diuretika","freq":25,"type":"qa","q":"Unterscheide die Diuretika-Gruppen und ihre Angriffspunkte.","a":"<b>Schleifendiuretika</b> (Furosemid): stark, wirken an der Henle-Schleife (z. B. bei Ödemen/Herzinsuffizienz).<br><b>Thiazide</b> (HCT): mild, distaler Tubulus (Hypertonie).<br><b>Kaliumsparende</b> (Spironolacton/Aldosteronantagonist): sparen Kalium. Cave: Elektrolytstörungen (K⁺!), Exsikkose.","id":"k0404"},{"cat":"pharma","topic":"Insulin","freq":126,"type":"qa","q":"Welche Insulinarten werden nach Wirkdauer unterschieden?","a":"<b>Kurzwirksame</b> (Normal-/Analoginsulin) – zu den Mahlzeiten (Bolus).<br><b>Verzögerungs-/Basalinsuline</b> (NPH, langwirksame Analoga) – Grundbedarf.<br><b>Mischinsuline</b>. Gefahr jeder Insulintherapie: <b>Hypoglykämie</b>. Applikation: subkutan.","id":"k0405"},{"cat":"pharma","topic":"Schilddrüsenmedikamente","freq":8,"type":"qa","q":"Welche Medikamente werden bei Hypo- und Hyperthyreose eingesetzt?","a":"<b>Hypothyreose:</b> <b>L-Thyroxin</b> (Levothyroxin) als Hormonersatz.<br><b>Hyperthyreose:</b> <b>Thyreostatika</b> (z. B. Thiamazol, Carbimazol) hemmen die Hormonsynthese. Cave Thyreostatika: <b>Agranulozytose</b> (Blutbildkontrolle!).","id":"k0406"},{"cat":"pharma","topic":"PPI","freq":5,"type":"qa","q":"Wie wirken Protonenpumpenhemmer (PPI) und wann werden sie eingesetzt?","a":"…prazole (z. B. Omeprazol, Pantoprazol) hemmen die <b>Protonenpumpe</b> der Magenbelegzellen → weniger Magensäure. Einsatz: Reflux/GERD, Ulkus, Magenschutz bei NSAR/Kortison. NW bei Langzeit: B12-/Magnesium-Mangel, Osteoporose.","id":"k0407"},{"cat":"pharma","topic":"Bakterizid/-statisch","freq":5,"type":"qa","q":"Was unterscheidet bakterizide von bakteriostatischen Antibiotika?","a":"<b>Bakterizid:</b> töten Bakterien ab (z. B. Penicilline, Cephalosporine, Aminoglykoside, Gyrasehemmer).<br><b>Bakteriostatisch:</b> hemmen die Vermehrung, die Abtötung übernimmt das Immunsystem (z. B. Tetrazykline, Makrolide, Sulfonamide).","id":"k0408"},{"cat":"pharma","topic":"Antibiotika NW","freq":5,"type":"qa","q":"Nenne wichtige Nebenwirkungen/Risiken von Antibiotika.","a":"Allergien (bis Anaphylaxie, v. a. Penicilline), gastrointestinale Beschwerden, <b>Störung der Darmflora</b> (Diarrhö, pseudomembranöse Kolitis durch C. difficile), Pilzinfektionen, <b>Resistenzentwicklung</b>, Wirkabschwächung der Pille. Tetrazykline: nicht bei Kindern/Schwangeren (Zähne/Knochen).","id":"k0409"},{"cat":"pharma","topic":"Calciumantagonisten","freq":25,"type":"qa","q":"Wie wirken Calciumantagonisten?","a":"Hemmen den Calciumeinstrom in Muskelzellen. <b>Dihydropyridine</b> (…dipin) wirken v. a. gefäßerweiternd (Hypertonie). <b>Verapamil/Diltiazem</b> wirken zusätzlich am Herzen (Frequenz-/Erregungsleitung ↓ → Herzrhythmusstörungen, Angina). NW: Ödeme, Flush, Kopfschmerz.","id":"k0410"},{"cat":"pharma","topic":"Antikoagulation NW","freq":5,"type":"qa","q":"Was ist die wichtigste Nebenwirkung aller Gerinnungshemmer und was ist das Antidot von Cumarinen?","a":"Wichtigste NW: <b>Blutungen</b> (auch innerlich). Antidot bei Cumarin-Überdosis/Blutung: <b>Vitamin K</b> (und ggf. Gerinnungsfaktoren/PPSB). Bei Heparin: Protamin. DOAK haben spezifische Antidote (z. B. Idarucizumab für Dabigatran).","id":"k0411"},{"cat":"infekt","topic":"Shigellose","freq":2,"type":"qa","q":"Beschreibe die Shigellose (bakterielle Ruhr).","a":"Erreger: Shigellen (hoch ansteckend, kleine Infektionsdosis), fäkal-oral. Klinik: Fieber, krampfartige Bauchschmerzen, <b>blutig-schleimige Durchfälle</b> mit Tenesmen (schmerzhafter Stuhldrang). Erregernachweis §7-meldepflichtig.","id":"k0412"},{"cat":"infekt","topic":"Rotavirus","freq":2,"type":"qa","q":"Warum ist das Rotavirus bei Kleinkindern bedeutsam?","a":"Häufigster Erreger schwerer Durchfallerkrankungen bei <b>Säuglingen/Kleinkindern</b>: wässrige Diarrhö, Erbrechen, Fieber → Gefahr der Dehydratation. <b>Schluckimpfung</b> verfügbar (STIKO-Empfehlung). §7-meldepflichtig.","id":"k0413"},{"cat":"infekt","topic":"Gasbrand","freq":2,"type":"qa","q":"Was ist der Gasbrand?","a":"Erreger: Clostridium perfringens (anaerobe Sporenbildner) in tiefen, verschmutzten Wunden. Toxine zerstören Gewebe unter <b>Gasbildung</b> (Knistern/Krepitation), rasch fortschreitende Muskelnekrose, süßlicher Geruch, schwerste Allgemeinsymptome. Lebensbedrohlicher Notfall.","id":"k0414"},{"cat":"infekt","topic":"Lepra","freq":2,"type":"qa","q":"Was ist die Lepra?","a":"Chronische Infektion durch Mycobacterium leprae. Befällt Haut und periphere Nerven → <b>Sensibilitätsverlust</b>, Hautveränderungen, Verstümmelungen. Formen: tuberkuloid (milde) bis lepromatös (schwer). Lange Inkubationszeit.","id":"k0415"},{"cat":"infekt","topic":"Leptospirose","freq":2,"type":"qa","q":"Was ist die Leptospirose (Morbus Weil)?","a":"Zoonose durch Leptospiren (Nagerurin, kontaminiertes Wasser). Verlauf: grippeähnlich, dann bei schwerer Form (M. Weil) <b>Ikterus, Nierenversagen, Blutungen</b>. §7-meldepflichtig.","id":"k0416"},{"cat":"infekt","topic":"Listeriose","freq":2,"type":"qa","q":"Warum ist Listeriose in der Schwangerschaft gefährlich?","a":"Erreger: Listeria monocytogenes (Rohmilchkäse, rohes Fleisch). Bei Gesunden meist mild. In der <b>Schwangerschaft</b> → Übertragung aufs Kind (Fehl-/Frühgeburt, Neugeborenensepsis/-meningitis). Auch bei Immunschwäche/älteren Menschen gefährlich. §7-meldepflichtig.","id":"k0417"},{"cat":"infekt","topic":"Brucellose","freq":2,"type":"qa","q":"Was ist die Brucellose?","a":"Zoonose durch Brucellen (Rohmilch, Nutztiere). Leitsymptom: <b>undulierendes (wellenförmiges) Fieber</b> (Maltafieber), Nachtschweiß, Gelenk-/Muskelschmerzen, Hepatosplenomegalie. Chronifizierungsneigung. §7-meldepflichtig.","id":"k0418"},{"cat":"infekt","topic":"Trichinellose","freq":2,"type":"qa","q":"Was ist die Trichinellose?","a":"Wurmerkrankung durch Trichinella (rohes/unzureichend gegartes Schweine-/Wildfleisch). Larven wandern in die Muskulatur → <b>Muskelschmerzen</b>, Fieber, <b>Lidödeme</b>, Eosinophilie. Fleischbeschau dient der Prophylaxe.","id":"k0419"},{"cat":"infekt","topic":"Echinokokkose","freq":2,"type":"qa","q":"Was ist die Echinokokkose?","a":"Bandwurmerkrankung (Fuchs-/Hundebandwurm). Larven bilden <b>Zysten</b> v. a. in der <b>Leber</b> (auch Lunge). Lange symptomlos; Beschwerden durch Verdrängung. Erregernachweis <b>nichtnamentlich</b> ans RKI.","id":"k0420"},{"cat":"infekt","topic":"Dengue-Fieber","freq":2,"type":"qa","q":"Beschreibe das Dengue-Fieber.","a":"Erreger: Dengue-Virus, Übertragung durch <b>Aedes-Mücken</b> (Tropen). Klinik: hohes Fieber, starke Kopf-, Muskel-, Knochenschmerzen (breakbone fever), Exanthem. Schwere Form: hämorrhagisches Fieber/Schock. §7-meldepflichtig.","id":"k0421"},{"cat":"infekt","topic":"Virale hämorrhagische Fieber","freq":2,"type":"qa","q":"Was kennzeichnet virale hämorrhagische Fieber (z. B. Ebola)?","a":"Schwere fieberhafte Erkrankungen mit <b>Blutungsneigung</b> (innere/äußere Blutungen), Multiorganversagen, hoher Letalität. Erreger u. a. Ebola-, Marburg-, Lassa-, Gelbfieber-Virus. Hochkontagiös → strenge Isolation. §6/§7 meldepflichtig, HP-Behandlungsverbot.","id":"k0422"},{"cat":"infekt","topic":"FSME vs Zecken","freq":2,"type":"qa","q":"Welche zwei wichtigen Erkrankungen überträgt die Zecke – und was ist der Unterschied in der Prävention?","a":"<b>Borreliose</b> (Bakterium) – keine Impfung, aber antibiotisch behandelbar; und <b>FSME</b> (Virus) – <b>Impfung möglich</b>, aber keine kausale Therapie. Prophylaxe generell: Zecken meiden/rasch entfernen, Körper absuchen.","id":"k0423"},{"cat":"infekt","topic":"Mykosen","freq":16,"type":"qa","q":"Welche Arten von Pilzinfektionen (Mykosen) unterscheidet man?","a":"<b>Dermatophyten</b> (Fadenpilze): Haut, Haare, Nägel (Tinea, Fußpilz).<br><b>Hefen</b> (Candida): Schleimhäute, Haut (Soor).<br><b>Schimmelpilze</b> (Aspergillus): v. a. Lunge bei Immunschwäche. Systemmykosen sind bei Immunsupprimierten gefährlich.","id":"k0424"},{"cat":"herz","topic":"Erregungsleitung","freq":5,"type":"qa","q":"Beschreibe das Erregungsleitungssystem des Herzens.","a":"<b>Sinusknoten</b> (primärer Schrittmacher, ~60–80/min) → <b>AV-Knoten</b> (~40–60/min, Verzögerung) → <b>His-Bündel</b> → Tawara-Schenkel → <b>Purkinje-Fasern</b>. Der Sinusknoten gibt normalerweise den Takt vor (Hierarchie der Schrittmacher).","id":"k0425"},{"cat":"herz","topic":"Blutkreislauf","freq":5,"type":"qa","q":"Erkläre den Unterschied zwischen Körper- und Lungenkreislauf.","a":"<b>Körperkreislauf (großer Kreislauf):</b> linkes Herz → Aorta → Körper → obere/untere Hohlvene → rechter Vorhof. Führt O₂-reiches Blut.<br><b>Lungenkreislauf (kleiner Kreislauf):</b> rechtes Herz → Lungenarterie (O₂-arm!) → Lunge → Lungenvene (O₂-reich) → linker Vorhof.","id":"k0426"},{"cat":"niere","topic":"Nephron","freq":5,"type":"qa","q":"Nenne die Funktionseinheit der Niere und ihre Hauptaufgaben.","a":"Das <b>Nephron</b> (Nierenkörperchen + Tubulussystem). Aufgaben: <b>Filtration</b> (Primärharn im Glomerulus), <b>Rückresorption</b> (Wasser, Glukose, Elektrolyte) und <b>Sekretion</b>. Weitere Nierenfunktionen: Blutdruckregulation (RAAS), EPO-Bildung, Vitamin-D-Aktivierung, Säure-Basen-Haushalt.","id":"k0427"},{"cat":"endo","topic":"RAAS","freq":5,"type":"qa","q":"Erkläre das Renin-Angiotensin-Aldosteron-System (RAAS).","a":"Bei Blutdruckabfall/Volumenmangel setzt die Niere <b>Renin</b> frei → Angiotensinogen → Angiotensin I → (ACE) → <b>Angiotensin II</b> (Vasokonstriktion) → fördert <b>Aldosteron</b> (Na⁺-/Wasserretention) → Blutdruck ↑. Angriffspunkt von ACE-Hemmern und Sartanen.","id":"k0428"},{"cat":"gastro","topic":"Leberfunktionen","freq":5,"type":"qa","q":"Nenne die wichtigsten Funktionen der Leber.","a":"<b>Stoffwechsel</b> (Glukose, Fett, Eiweiß), <b>Entgiftung</b> (Ammoniak → Harnstoff, Medikamente, Alkohol), <b>Synthese</b> (Albumin, Gerinnungsfaktoren, Galle), <b>Speicherung</b> (Glykogen, Vitamine, Eisen), Abbau von Hormonen und Bilirubin.","id":"k0429"},{"cat":"neuro","topic":"Nervensystem Gliederung","freq":5,"type":"qa","q":"Wie ist das Nervensystem gegliedert?","a":"<b>ZNS</b> (Gehirn + Rückenmark) und <b>PNS</b> (peripheres Nervensystem).<br>Funktionell: <b>somatisches</b> (willkürlich) und <b>vegetatives/autonomes</b> Nervensystem mit <b>Sympathikus</b> (Aktivierung) und <b>Parasympathikus</b> (Erholung).","id":"k0430"},{"cat":"neuro","topic":"Sympathikus/Parasympathikus","freq":5,"type":"qa","q":"Nenne gegensätzliche Wirkungen von Sympathikus und Parasympathikus.","a":"<b>Sympathikus:</b> Herzfrequenz ↑, Pupillen weit, Bronchien weit, Verdauung ↓, Schwitzen.<br><b>Parasympathikus:</b> Herzfrequenz ↓, Pupillen eng, Bronchien eng, Verdauung ↑ (Speichel, Peristaltik). Überträgerstoffe: Sympathikus v. a. Noradrenalin, Parasympathikus Acetylcholin.","id":"k0431"},{"cat":"labor","topic":"Säure-Basen-Haushalt","freq":5,"type":"qa","q":"Was unterscheidet respiratorische von metabolischer Azidose?","a":"<b>Respiratorische Azidose:</b> CO₂-Anstieg durch <b>Hypoventilation</b> (COPD, Atemdepression).<br><b>Metabolische Azidose:</b> durch Säureanhäufung/Bikarbonatverlust (diabet. Ketoazidose, Niereninsuffizienz, Laktatazidose, Diarrhö). Kompensation: metabolisch über die Niere, respiratorisch über die Atmung (Kußmaul-Atmung).","id":"k0432"},{"cat":"endo","topic":"Hormonachse","freq":5,"type":"qa","q":"Erkläre das Prinzip der hypothalamisch-hypophysären Regelkreise.","a":"<b>Hypothalamus</b> (Releasing-/Inhibiting-Hormone) → <b>Hypophysenvorderlappen</b> (z. B. TSH, ACTH, FSH/LH) → <b>periphere Drüse</b> (z. B. Schilddrüse, Nebenniere). Die peripheren Hormone hemmen über <b>negative Rückkopplung</b> die übergeordneten Zentren.","id":"k0433"},{"cat":"psych","topic":"MMST","freq":5,"type":"qa","q":"Wozu dient der Mini-Mental-Status-Test (MMST)?","a":"Screening-Test zur Einschätzung <b>kognitiver Funktionen</b> (Orientierung, Merkfähigkeit, Aufmerksamkeit, Rechnen, Sprache, Praxie). Max. 30 Punkte; niedrigere Werte deuten auf eine <b>Demenz</b> hin. Grobe Orientierung, ersetzt keine ausführliche Diagnostik.","id":"k0434"},{"cat":"psych","topic":"Halluzinationen","freq":5,"type":"qa","q":"Was unterscheidet Halluzination, Illusion und Wahn?","a":"<b>Halluzination:</b> Sinneswahrnehmung <b>ohne</b> realen Reiz (z. B. Stimmenhören).<br><b>Illusion:</b> <b>Verkennung</b> eines real vorhandenen Reizes.<br><b>Wahn:</b> unkorrigierbare <b>falsche Überzeugung</b> (Denkstörung, nicht Wahrnehmung), z. B. Verfolgungs-, Größenwahn.","id":"k0435"},{"cat":"psych","topic":"Ich-Störungen","freq":5,"type":"qa","q":"Was sind Ich-Störungen (typisch für Schizophrenie)?","a":"Störung der Grenze zwischen Ich und Umwelt: <b>Gedankeneingebung, Gedankenentzug, Gedankenausbreitung, Gedankenlautwerden</b>, Depersonalisation (Fremdheit der eigenen Person) und Derealisation (Fremdheit der Umwelt), Fremdbeeinflussungserleben.","id":"k0436"},{"cat":"psych","topic":"Affektstörungen","freq":5,"type":"qa","q":"Definiere Affektlabilität, Affektinkontinenz und Parathymie.","a":"<b>Affektlabilität:</b> rascher, situationsabhängiger Stimmungswechsel.<br><b>Affektinkontinenz:</b> Affekte können nicht kontrolliert werden (überschießend, z. B. bei Demenz).<br><b>Parathymie:</b> Gefühlsausdruck passt nicht zum Inhalt (z. B. Lächeln beim Bericht über Trauriges) – typisch bei Schizophrenie.","id":"k0437"},{"cat":"psych","topic":"ICD-10 F-Kapitel","freq":5,"type":"qa","q":"Wie sind die psychischen Störungen im ICD-10 (F-Kapitel) grob gegliedert?","a":"<b>F0</b> organische Störungen (Demenz), <b>F1</b> Sucht, <b>F2</b> Schizophrenie/Wahn, <b>F3</b> affektive Störungen (Depression/Manie), <b>F4</b> neurotische/Belastungs-/somatoforme Störungen, <b>F5</b> Verhaltensauffälligkeiten (Ess-/Schlafstörungen), <b>F6</b> Persönlichkeitsstörungen, <b>F7</b> Intelligenzminderung, <b>F8</b> Entwicklungsstörungen, <b>F9</b> Kindes-/Jugendstörungen.","id":"k0438"},{"cat":"psych","topic":"Suizidalität Stadien","freq":5,"type":"qa","q":"Nenne die Stadien der Suizidalität nach Pöldinger.","a":"1. <b>Erwägung</b> (Suizid als möglicher Ausweg), 2. <b>Ambivalenz</b> (Für und Wider, Hilferufe, Ankündigungen), 3. <b>Entschluss</b> (scheinbare Ruhe, konkrete Planung – trügerische Beruhigung). Wichtig: Suizidalität stets direkt ansprechen und ernst nehmen.","id":"k0439"},{"cat":"psych","topic":"Entspannungsverfahren","freq":5,"type":"qa","q":"Nenne anerkannte Entspannungsverfahren.","a":"<b>Autogenes Training</b> (Autosuggestion, z. B. Arme schwer/warm), <b>progressive Muskelrelaxation nach Jacobson</b> (An-/Entspannen von Muskelgruppen), zudem Biofeedback, Atemtechniken. Eingesetzt bei Angst, Stress, psychosomatischen Beschwerden.","id":"k0440"},{"cat":"psych","topic":"Verhaltenstherapie","freq":5,"type":"qa","q":"Auf welchen Prinzipien beruht die Verhaltenstherapie?","a":"Auf <b>Lerntheorien</b> (klassische/operante Konditionierung) und Kognitionen. Techniken: <b>Konfrontation/Exposition</b> (z. B. bei Phobien), <b>kognitive Umstrukturierung</b> (Denkmuster ändern), Verstärkung. Ziel: konkretes, gegenwartsbezogenes Verändern von Verhalten und Denken.","id":"k0441"},{"cat":"unters","topic":"EKG","freq":5,"type":"qa","q":"Was stellen die Wellen und Zacken im EKG dar (P, QRS, T)?","a":"<b>P-Welle:</b> Vorhoferregung.<br><b>QRS-Komplex:</b> Kammererregung (Depolarisation).<br><b>T-Welle:</b> Kammer-Rückbildung (Repolarisation).<br>Die PQ-Zeit = Überleitungszeit Vorhof→Kammer. Bei Infarkt: ST-Hebung/-Senkung, pathologisches Q.","id":"k0442"},{"cat":"notfall","topic":"Anaphylaxie Stadien","freq":27,"type":"qa","q":"Nenne die Schweregrade der anaphylaktischen Reaktion.","a":"<b>Grad I:</b> Haut/Schleimhaut (Juckreiz, Flush, Urtikaria).<br><b>Grad II:</b> zusätzlich Kreislauf/Atmung (Tachykardie, leichte Dyspnoe, Übelkeit).<br><b>Grad III:</b> Bronchospasmus, Larynxödem, Schock.<br><b>Grad IV:</b> Atem-/Kreislaufstillstand. Wichtigste Maßnahme ab Grad II–III: <b>Adrenalin i.m.</b>","id":"k0443"},{"cat":"notfall","topic":"Erste Hilfe Blutung","freq":5,"type":"qa","q":"Wie versorgt man eine stark blutende Wunde?","a":"<b>Druckverband</b> anlegen (keimarme Auflage + Druckpolster), betroffene Extremität <b>hochhalten</b>, Ruhigstellung, Schocklage/Wärmeerhalt, Notruf. Nur im äußersten Notfall (nicht stillbare lebensbedrohliche Blutung) abbinden (Tourniquet). Eigenschutz (Handschuhe) beachten.","id":"k0444"},{"cat":"labor","topic":"Blutbild Übersicht","freq":8,"type":"qa","q":"Was gehört zum großen Blutbild?","a":"Das <b>kleine Blutbild</b> (Erythrozyten, Hb, Hkt, Indizes, Leukozyten gesamt, Thrombozyten) plus das <b>Differenzialblutbild</b> (Aufschlüsselung der Leukozyten: neutrophile/eosinophile/basophile Granulozyten, Lymphozyten, Monozyten).","id":"k0445"},{"cat":"recht","topic":"Heilpraktikergesetz","freq":30,"type":"qa","q":"Was regelt das Heilpraktikergesetz (HeilprG) in §1?","a":"§1 HeilprG definiert die <b>Ausübung der Heilkunde</b> und schreibt vor, dass wer die Heilkunde ausüben will, <b>ohne als Arzt bestallt zu sein</b>, der <b>Erlaubnis</b> bedarf (Heilpraktikererlaubnis). Ziel: Schutz der Bevölkerung vor gesundheitlichen Schäden.","id":"k0446"},{"cat":"recht","topic":"Bestallung/Erlaubnis","freq":5,"type":"qa","q":"Ist die Heilpraktikererlaubnis eine Berufsausübungs- oder Berufszulassungserlaubnis?","a":"Sie ist eine <b>Erlaubnis zur Berufsausübung</b>, keine staatlich geregelte Ausbildung mit Prüfung im klassischen Sinn. Erteilt wird sie nach einer <b>Überprüfung</b> beim Gesundheitsamt, ob der Bewerber keine Gefahr für die Volksgesundheit darstellt. Sie gilt bundesweit.","id":"k0447"},{"cat":"recht","topic":"Werbeverbot HWG","freq":8,"type":"qa","q":"Was regelt das Heilmittelwerbegesetz (HWG) für Heilpraktiker?","a":"Das HWG verbietet <b>irreführende und unlautere Werbung</b> für Heilmittel/Behandlungen, u. a. Heilversprechen, Werbung mit Krankengeschichten, Angst erzeugende Aussagen, Werbung für bestimmte schwere Krankheiten. Sachliche Information ist erlaubt, marktschreierische Werbung nicht.","id":"k0448"},{"cat":"recht","topic":"Schweigepflicht §203","freq":9,"type":"qa","q":"Unterliegt der Heilpraktiker der Schweigepflicht?","a":"Ja. Nach <b>§203 StGB</b> ist die Verletzung von Privatgeheimnissen strafbar. Der Heilpraktiker muss über alles, was ihm in seiner beruflichen Eigenschaft anvertraut wird, <b>schweigen</b>. Ausnahme: Entbindung durch den Patienten oder gesetzliche Offenbarungspflicht/-befugnis (z. B. Meldepflicht nach IfSG).","id":"k0449"},{"cat":"recht","topic":"Dokumentationspflicht","freq":5,"type":"qa","q":"Muss der Heilpraktiker eine Behandlungsdokumentation führen?","a":"Ja, aus dem <b>Behandlungsvertrag (§630f BGB)</b> ergibt sich die Pflicht zur <b>Dokumentation</b> (Anamnese, Diagnosen, Behandlungen, Aufklärung). Aufbewahrung i. d. R. <b>10 Jahre</b>. Der Patient hat ein Einsichtsrecht in seine Unterlagen.","id":"k0450"},{"cat":"recht","topic":"Aufklärungspflicht","freq":5,"type":"qa","q":"Worüber muss der Heilpraktiker den Patienten aufklären?","a":"Über <b>Art, Umfang, Risiken und Erfolgsaussichten</b> der Behandlung sowie Behandlungsalternativen, damit der Patient wirksam <b>einwilligen</b> kann (informierte Einwilligung). Ohne wirksame Einwilligung ist die Behandlung eine Körperverletzung.","id":"k0451"},{"cat":"recht","topic":"Kassenzulassung","freq":5,"type":"qa","q":"Darf der Heilpraktiker über die gesetzliche Krankenkasse abrechnen?","a":"Nein. Heilpraktiker rechnen als <b>Privatbehandler</b> direkt mit dem Patienten ab (meist nach dem Gebührenverzeichnis für Heilpraktiker, GebüH). Gesetzliche Kassen erstatten HP-Leistungen grundsätzlich nicht; private Zusatzversicherungen ggf. anteilig.","id":"k0452"},{"cat":"ifsg","topic":"§34 IfSG","freq":25,"type":"qa","q":"Was regelt §34 IfSG (Gemeinschaftseinrichtungen)?","a":"§34 regelt Tätigkeits-/Besuchsverbote in <b>Gemeinschaftseinrichtungen</b> (Schulen, Kitas) bei bestimmten Infektionskrankheiten oder Verlausung. Betroffene bzw. Krankheitsverdächtige dürfen die Einrichtung nicht betreten. Eltern haben eine <b>Benachrichtigungspflicht</b> gegenüber der Einrichtung.","id":"k0453"},{"cat":"ifsg","topic":"§42 IfSG","freq":8,"type":"qa","q":"Was regelt §42 IfSG (Tätigkeitsverbot Lebensmittel)?","a":"§42 verbietet Personen mit bestimmten Infektionen (z. B. infektiöse Gastroenteritis, Hepatitis A/E, offene TBC, eitrige Hautkrankheiten an den Händen) das <b>Arbeiten mit Lebensmitteln</b>. Vor Tätigkeitsaufnahme ist eine Belehrung nach §43 erforderlich.","id":"k0454"},{"cat":"ifsg","topic":"Nosokomiale Infektion","freq":8,"type":"qa","q":"Was ist eine nosokomiale Infektion?","a":"Eine <b>im Zusammenhang mit medizinischer Behandlung erworbene Infektion</b> (Krankenhausinfektion), die bei Aufnahme noch nicht vorlag. Häufig Wund-, Harnwegs-, Atemwegs- und Kathetersepsis-Infektionen; problematisch durch <b>multiresistente Erreger</b> (z. B. MRSA).","id":"k0455"},{"cat":"ifsg","topic":"Meldung wohin/wann","freq":20,"type":"qa","q":"An wen und in welcher Frist muss der Heilpraktiker melden?","a":"Meldung an das zuständige <b>Gesundheitsamt</b> (des Aufenthaltsorts des Betroffenen), <b>unverzüglich, spätestens innerhalb von 24 Stunden</b>. Namentliche Meldung nach §6 (Krankheiten) bzw. §7 (Erregernachweise, meist durch Labore).","id":"k0456"},{"cat":"ifsg","topic":"Behandlungsverbote HP","freq":30,"type":"qa","q":"Welche Krankheiten darf ein Heilpraktiker nicht behandeln?","a":"Insbesondere <b>meldepflichtige übertragbare Krankheiten</b> nach IfSG, <b>Geschlechtskrankheiten</b>, <b>Zahn-/Kieferheilkunde</b>, <b>Geburtshilfe</b> (Entbindung), Verschreibung verschreibungspflichtiger Arzneimittel/Betäubungsmittel und das Ausstellen bestimmter Bescheinigungen. Grundsatz: keine Tätigkeit, die Ärzten/Zahnärzten vorbehalten ist.","id":"k0457"},{"cat":"hygiene","topic":"Aktive vs passive Impfung","freq":9,"type":"qa","q":"Was unterscheidet aktive von passiver Immunisierung?","a":"<b>Aktive Impfung:</b> Gabe von abgeschwächten/abgetöteten Erregern oder Antigenen → der Körper bildet <b>selbst Antikörper</b> (langer Schutz, verzögerter Aufbau).<br><b>Passive Impfung:</b> Gabe fertiger <b>Antikörper</b> (sofortiger, aber kurzer Schutz, z. B. bei Tetanus-Verdacht ohne Impfschutz).","id":"k0458"},{"cat":"hygiene","topic":"Lebend- vs Totimpfstoff","freq":5,"type":"qa","q":"Was unterscheidet Lebend- von Totimpfstoffen?","a":"<b>Lebendimpfstoffe:</b> abgeschwächte, vermehrungsfähige Erreger (z. B. MMR, Varizellen) – nicht in Schwangerschaft/bei Immunschwäche.<br><b>Totimpfstoffe:</b> abgetötete Erreger/Bestandteile (z. B. Tetanus, Hepatitis B) – oft mehrere Dosen/Auffrischung nötig.","id":"k0459"},{"cat":"hygiene","topic":"Sterilisation vs Desinfektion","freq":12,"type":"qa","q":"Was unterscheidet Sterilisation von Desinfektion?","a":"<b>Desinfektion:</b> Keimreduktion auf ein unschädliches Maß (Erreger werden abgetötet/inaktiviert, aber nicht zwingend Sporen).<br><b>Sterilisation:</b> Abtötung <b>aller</b> Mikroorganismen inkl. <b>Sporen</b> → Keimfreiheit (z. B. Autoklav mit gespanntem, gesättigtem Wasserdampf 121–134 °C).","id":"k0460"},{"cat":"hygiene","topic":"Hygienische Händedesinfektion","freq":9,"type":"qa","q":"Wann ist eine hygienische Händedesinfektion nötig?","a":"Vor und nach Patientenkontakt, vor aseptischen Tätigkeiten (z. B. Injektion), nach Kontakt mit potenziell infektiösem Material und nach Ablegen von Handschuhen. Wichtigste Einzelmaßnahme zur Vermeidung von Infektionsübertragungen. Einwirkzeit des alkoholischen Präparats beachten.","id":"k0461"},{"cat":"hygiene","topic":"Impfkomplikation","freq":5,"type":"qa","q":"Was ist bei Impfreaktionen meldepflichtig?","a":"Der Verdacht auf eine über das übliche Maß hinausgehende <b>Impfkomplikation</b> (gesundheitliche Schädigung) ist nach IfSG <b>namentlich an das Gesundheitsamt</b> zu melden. Normale, harmlose Impfreaktionen (Rötung, leichtes Fieber) sind nicht meldepflichtig.","id":"k0462"},{"cat":"herz","topic":"Endokarditis","freq":8,"type":"qa","q":"Was ist eine infektiöse Endokarditis?","a":"Entzündung der <b>Herzinnenhaut/Herzklappen</b>, meist bakteriell. Symptome: Fieber, neues/verändertes Herzgeräusch, Abgeschlagenheit, Embolien. Gefahr der Klappenzerstörung. Risiko bei vorgeschädigten Klappen/Klappenersatz.","id":"k0463"},{"cat":"herz","topic":"Herzklappenfehler","freq":8,"type":"qa","q":"Was unterscheidet eine Klappenstenose von einer Klappeninsuffizienz?","a":"<b>Stenose:</b> verengte Klappe → Behinderung des Blutflusses (Druckbelastung).<br><b>Insuffizienz:</b> undichte Klappe → Rückfluss (Pendelblut, Volumenbelastung). Häufig betroffen: Aortenklappe und Mitralklappe. Auskultation: typische Herzgeräusche.","id":"k0464"},{"cat":"herz","topic":"Perikarditis","freq":5,"type":"qa","q":"Was kennzeichnet eine Perikarditis?","a":"Entzündung des <b>Herzbeutels</b>. Leitsymptom: <b>atemabhängiger, lageabhängiger Brustschmerz</b> (Besserung beim Vornüberbeugen). Auskultation: Perikardreiben. Komplikation: <b>Perikarderguss</b> bis zur Herzbeuteltamponade (Notfall).","id":"k0465"},{"cat":"herz","topic":"pAVK","freq":9,"type":"qa","q":"Was ist die periphere arterielle Verschlusskrankheit (pAVK)?","a":"Arteriosklerotische Verengung der Beinarterien → Durchblutungsstörung. Leitsymptom: <b>Claudicatio intermittens</b> (Schaufensterkrankheit: belastungsabhängiger Wadenschmerz, der zum Stehenbleiben zwingt). Stadieneinteilung nach Fontaine; Endstadium: Ruheschmerz, Nekrose.","id":"k0466"},{"cat":"herz","topic":"Aortenaneurysma","freq":5,"type":"qa","q":"Was ist ein Aortenaneurysma und warum ist es gefährlich?","a":"Krankhafte <b>Aussackung der Aortenwand</b>. Meist symptomlos, Gefahr der <b>Ruptur</b> (lebensbedrohliche innere Blutung, plötzliche heftige Bauch-/Rückenschmerzen, Schock). Bauchaortenaneurysma tastbar als pulsierender Tumor.","id":"k0467"},{"cat":"atmung","topic":"Pneumothorax","freq":8,"type":"qa","q":"Was ist ein Pneumothorax?","a":"Luftansammlung im <b>Pleuraspalt</b> → die Lunge kollabiert. Symptome: plötzlicher stechender Brustschmerz, Atemnot, einseitig fehlendes Atemgeräusch. <b>Spannungspneumothorax</b> (Ventilmechanismus) ist ein lebensbedrohlicher Notfall mit Kreislaufversagen.","id":"k0468"},{"cat":"atmung","topic":"Lungenödem","freq":8,"type":"qa","q":"Was ist ein Lungenödem und wie äußert es sich?","a":"Flüssigkeitsansammlung in Lunge/Alveolen, meist bei <b>Linksherzinsuffizienz</b>. Symptome: schwere Atemnot, Orthopnoe, <b>brodelnde Rasselgeräusche</b>, schaumiges (ggf. rötliches) Sputum, Erstickungsangst. Notfall.","id":"k0469"},{"cat":"atmung","topic":"Sarkoidose","freq":5,"type":"qa","q":"Was ist die Sarkoidose (M. Boeck)?","a":"Systemische entzündliche Erkrankung mit <b>Granulombildung</b>, v. a. in der Lunge und den Lymphknoten (bihiläre Lymphadenopathie). Verlauf oft schubweise; akute Form (Löfgren-Syndrom) mit Erythema nodosum, Sprunggelenkarthritis und Fieber.","id":"k0470"},{"cat":"atmung","topic":"Schlafapnoe","freq":5,"type":"qa","q":"Was kennzeichnet das obstruktive Schlafapnoe-Syndrom?","a":"Wiederholte <b>Atemaussetzer im Schlaf</b> durch Kollaps der oberen Atemwege. Folgen: lautes Schnarchen, Sauerstoffabfälle, unruhiger Schlaf, <b>Tagesmüdigkeit</b>, erhöhtes Herz-Kreislauf-Risiko. Therapie u. a. CPAP-Beatmung.","id":"k0471"},{"cat":"gastro","topic":"Divertikulitis","freq":8,"type":"qa","q":"Was ist eine Divertikulitis?","a":"Entzündung von <b>Darmwandausstülpungen (Divertikeln)</b>, v. a. im <b>Sigma</b>. Symptome: Schmerzen im <b>linken Unterbauch</b>, Fieber, Stuhlveränderung (oft als 'Linksappendizitis' bezeichnet). Komplikationen: Perforation, Abszess, Blutung.","id":"k0472"},{"cat":"gastro","topic":"Zöliakie","freq":5,"type":"qa","q":"Was ist die Zöliakie?","a":"Chronische <b>Glutenunverträglichkeit</b> (Autoimmunreaktion) mit Zottenatrophie des Dünndarms → <b>Malabsorption</b>: Durchfall, Gewichtsverlust, Mangelerscheinungen, bei Kindern Gedeihstörung. Therapie: lebenslang <b>glutenfreie</b> Ernährung.","id":"k0473"},{"cat":"gastro","topic":"Ileus","freq":9,"type":"qa","q":"Was unterscheidet einen mechanischen von einem paralytischen Ileus?","a":"<b>Mechanischer Ileus:</b> Darmverschluss durch Hindernis (Tumor, Verwachsung, Hernie) – anfangs lebhafte, hochgestellte Darmgeräusche.<br><b>Paralytischer Ileus:</b> Darmlähmung (z. B. bei Peritonitis) – 'Totenstille' bei Auskultation. Beides ist ein akutes Abdomen.","id":"k0474"},{"cat":"gastro","topic":"Hämorrhoiden","freq":5,"type":"qa","q":"Was sind Hämorrhoiden?","a":"Krankhafte Vergrößerung der <b>arteriovenösen Gefäßpolster</b> im Analkanal. Symptome: <b>hellrote Blutauflagerungen</b> auf dem Stuhl, Juckreiz, Nässen, ggf. Vorfall. Wichtige DD bei rektaler Blutung: immer auch an ein Karzinom denken.","id":"k0475"},{"cat":"gastro","topic":"Reizdarmsyndrom","freq":5,"type":"qa","q":"Was kennzeichnet das Reizdarmsyndrom?","a":"Funktionelle Darmstörung <b>ohne organisches Korrelat</b>: Bauchschmerzen, Blähungen, Stuhlunregelmäßigkeiten (Durchfall/Verstopfung), Besserung nach Stuhlgang. <b>Ausschlussdiagnose</b> – Warnzeichen (Blut, Gewichtsverlust, Anämie) müssen fehlen.","id":"k0476"},{"cat":"endo","topic":"Cushing-Syndrom","freq":8,"type":"qa","q":"Was kennzeichnet das Cushing-Syndrom?","a":"Folge von <b>Cortisolüberschuss</b> (endogen oder durch Kortisontherapie). Typisch: <b>Stammfettsucht, Vollmondgesicht, Stiernacken</b>, Striae, Muskelschwäche, Bluthochdruck, Diabetes, Osteoporose, dünne Haut.","id":"k0477"},{"cat":"endo","topic":"Morbus Addison","freq":8,"type":"qa","q":"Was ist der Morbus Addison?","a":"<b>Nebennierenrindeninsuffizienz</b> (Cortisol-/Aldosteronmangel). Symptome: Schwäche, Gewichtsverlust, niedriger Blutdruck, <b>Hyperpigmentierung</b> der Haut, Hypoglykämie, Salzhunger. Lebensbedrohlich: <b>Addison-Krise</b> (Schock).","id":"k0478"},{"cat":"endo","topic":"Diabetes insipidus","freq":5,"type":"qa","q":"Was ist der Diabetes insipidus?","a":"Störung des <b>ADH</b> (antidiuretisches Hormon) → die Niere kann Wasser nicht rückhalten. Folge: <b>massive Urinausscheidung</b> (Polyurie) und starker Durst (Polydipsie). Kein Zusammenhang mit Blutzucker – trotz des Namens keine 'Zuckerkrankheit'.","id":"k0479"},{"cat":"endo","topic":"Struma","freq":8,"type":"qa","q":"Was ist eine Struma und welche Ursache ist klassisch?","a":"<b>Vergrößerung der Schilddrüse</b> (Kropf). Klassische Ursache: <b>Jodmangel</b>. Eine Struma kann mit normaler (euthyreoter), erhöhter oder erniedrigter Hormonlage einhergehen. Komplikation bei großer Struma: mechanische Verdrängung (Luftröhre, Schlucken).","id":"k0480"},{"cat":"endo","topic":"Metabolisches Syndrom","freq":9,"type":"qa","q":"Was versteht man unter dem metabolischen Syndrom?","a":"Kombination von <b>(1) stammbetonter Adipositas, (2) Bluthochdruck, (3) gestörtem Zuckerstoffwechsel/Insulinresistenz und (4) Fettstoffwechselstörung</b>. Hohes Risiko für Diabetes Typ 2 und Herz-Kreislauf-Erkrankungen ('tödliches Quartett').","id":"k0481"},{"cat":"neuro","topic":"Meningitis Zeichen","freq":20,"type":"qa","q":"Welche klinischen Zeichen sprechen für eine Meningitis?","a":"<b>Meningismus</b> (schmerzhafte Nackensteife), starke Kopfschmerzen, Fieber, Lichtscheu, Erbrechen. Prüfzeichen: positives <b>Brudzinski-</b> und <b>Kernig-Zeichen</b>. Bei Meningokokken zusätzlich Petechien/Hautblutungen (Notfall, meldepflichtig).","id":"k0482"},{"cat":"neuro","topic":"Migräne vs Spannungskopfschmerz","freq":9,"type":"qa","q":"Wie unterscheiden sich Migräne und Spannungskopfschmerz?","a":"<b>Migräne:</b> anfallsartig, meist <b>einseitig, pulsierend</b>, mittel-stark, mit Übelkeit, Licht-/Lärmempfindlichkeit, ggf. Aura; Verstärkung durch Bewegung.<br><b>Spannungskopfschmerz:</b> beidseitig, dumpf-drückend ('Schraubstock'), leicht-mittel, keine Begleitsymptome.","id":"k0483"},{"cat":"neuro","topic":"Epilepsie","freq":9,"type":"qa","q":"Was unterscheidet fokale von generalisierten epileptischen Anfällen?","a":"<b>Fokal:</b> Anfall beginnt in einer umschriebenen Hirnregion (Symptome je nach Ort, Bewusstsein kann erhalten sein).<br><b>Generalisiert:</b> betrifft von Beginn an beide Hirnhälften (z. B. <b>tonisch-klonischer Grand-mal-Anfall</b> mit Bewusstlosigkeit). Notfall: <b>Status epilepticus</b>.","id":"k0484"},{"cat":"neuro","topic":"Bandscheibenvorfall","freq":8,"type":"qa","q":"Wie äußert sich ein Bandscheibenvorfall?","a":"Vorfall von Bandscheibengewebe mit Druck auf Nervenwurzeln → <b>ausstrahlende Schmerzen</b> (z. B. Ischialgie ins Bein), Sensibilitätsstörungen, ggf. Lähmungen. <b>Notfall</b> bei Kaudasyndrom: Blasen-/Mastdarmstörung, Reithosenanästhesie.","id":"k0485"},{"cat":"neuro","topic":"Polyneuropathie","freq":8,"type":"qa","q":"Was ist eine Polyneuropathie und was sind häufige Ursachen?","a":"Erkrankung <b>mehrerer peripherer Nerven</b>: symmetrische, <b>socken-/handschuhförmige</b> Sensibilitätsstörungen (Kribbeln, Taubheit, Brennen), später Muskelschwäche. Häufigste Ursachen: <b>Diabetes mellitus</b> und <b>Alkohol</b>.","id":"k0486"},{"cat":"haema","topic":"Leukämie Formen","freq":9,"type":"qa","q":"Wie werden Leukämien grob eingeteilt?","a":"Nach Verlauf in <b>akut</b> (rasch, unreifzellig: AML, ALL) und <b>chronisch</b> (langsam, reifzellig: CML, CLL) sowie nach Zellreihe (myeloisch/lymphatisch). Leitbefund: unkontrollierte Vermehrung weißer Blutzellen mit Verdrängung der normalen Blutbildung (Anämie, Infektanfälligkeit, Blutungsneigung).","id":"k0487"},{"cat":"haema","topic":"Hodgkin vs NHL","freq":8,"type":"qa","q":"Was unterscheidet das Hodgkin-Lymphom von Non-Hodgkin-Lymphomen?","a":"<b>Hodgkin-Lymphom:</b> charakteristische <b>Sternberg-Reed-Riesenzellen</b>, meist geordnete Ausbreitung von Lymphknotenstation zu Station, oft junge Erwachsene, B-Symptomatik.<br><b>NHL:</b> heterogene Gruppe, häufig disseminiert, sehr unterschiedliche Aggressivität.","id":"k0488"},{"cat":"haema","topic":"Hämophilie","freq":5,"type":"qa","q":"Was ist die Hämophilie?","a":"Angeborener <b>Mangel an Gerinnungsfaktoren</b> (Faktor VIII = Hämophilie A, Faktor IX = Hämophilie B), <b>X-chromosomal</b> vererbt (v. a. Männer betroffen). Folge: verstärkte Blutungsneigung, typisch <b>Gelenkeinblutungen</b>.","id":"k0489"},{"cat":"haema","topic":"B-Symptomatik","freq":16,"type":"qa","q":"Was versteht man unter B-Symptomatik?","a":"Die Trias <b>Fieber (unklar), Nachtschweiß und ungewollter Gewichtsverlust</b> (>10 % in 6 Monaten). Sie ist ein wichtiges Warnzeichen für <b>maligne Erkrankungen</b> (v. a. Lymphome/Leukämien) und für Tuberkulose.","id":"k0490"},{"cat":"notfall","topic":"Reanimation Ablauf","freq":30,"type":"qa","q":"Wie ist der Basisablauf der Herz-Lungen-Wiederbelebung beim Erwachsenen?","a":"Bewusstsein/Atmung prüfen → Notruf (112) → <b>Herzdruckmassage</b> in der Mitte des Brustkorbs, <b>Frequenz 100–120/min</b>, Drucktiefe 5–6 cm → Verhältnis <b>30 Kompressionen : 2 Beatmungen</b>. Möglichst früh einen <b>AED</b> einsetzen. Ununterbrochen bis Eintreffen des Rettungsdienstes.","id":"k0491"},{"cat":"notfall","topic":"Schlaganfall FAST","freq":27,"type":"qa","q":"Wofür steht das FAST-Schema beim Schlaganfall?","a":"<b>F</b>ace (hängender Mundwinkel), <b>A</b>rms (einseitige Armschwäche), <b>S</b>peech (Sprachstörung), <b>T</b>ime (sofort Notruf!). Zeit ist entscheidend ('time is brain') – rasche Klinikeinweisung, da ein Zeitfenster für die Therapie besteht.","id":"k0492"},{"cat":"notfall","topic":"Herzinfarkt Sofortmaßnahmen","freq":27,"type":"qa","q":"Welche Sofortmaßnahmen ergreift man beim Verdacht auf Herzinfarkt?","a":"<b>Notruf 112</b>, Patienten beruhigen und mit <b>erhöhtem Oberkörper</b> lagern, körperliche Anstrengung vermeiden, beengende Kleidung öffnen. Auf Reanimationsbereitschaft achten (Gefahr Kammerflimmern). Keine eigenmächtige Medikamentengabe durch Laien.","id":"k0493"},{"cat":"notfall","topic":"Hypoglykämie Notfall","freq":16,"type":"qa","q":"Wie erkennt und behandelt man eine schwere Unterzuckerung?","a":"Zeichen: Heißhunger, Schwitzen, Zittern, Unruhe, Verwirrtheit bis Bewusstlosigkeit/Krampf. <b>Bei ansprechbarem Patienten:</b> schnelle Kohlenhydrate (Traubenzucker, Saft). <b>Bei Bewusstlosigkeit:</b> nichts einflößen (Aspirationsgefahr), stabile Seitenlage, Notruf.","id":"k0494"},{"cat":"notfall","topic":"Krampfanfall Verhalten","freq":9,"type":"qa","q":"Wie verhält man sich bei einem generalisierten Krampfanfall?","a":"<b>Ruhe bewahren</b>, Verletzungen verhindern (Umgebung polstern, nichts in den Mund stecken!), Anfall nicht gewaltsam unterbrechen, Dauer beobachten. Nach dem Anfall stabile Seitenlage. Notruf bei Anfall >5 min, Serienanfällen oder erstem Anfall (<b>Status epilepticus</b>).","id":"k0495"},{"cat":"notfall","topic":"Verbrennung Erstversorgung","freq":8,"type":"qa","q":"Wie versorgt man eine Verbrennung erstversorgend?","a":"Kleinflächige Verbrennungen kurz mit <b>handwarmem/lauwarmem Wasser</b> kühlen (nicht eiskalt, nicht großflächig – Unterkühlungsgefahr). Wunde keimfrei/locker bedecken, keine Hausmittel, Blasen nicht öffnen. Ausdehnung nach <b>Neuner-Regel</b> abschätzen; bei großflächigen/tiefen Verbrennungen Notruf.","id":"k0496"},{"cat":"notfall","topic":"Schockformen","freq":16,"type":"qa","q":"Nenne die wichtigsten Schockformen.","a":"<b>Hypovolämischer</b> Schock (Blut-/Flüssigkeitsverlust), <b>kardiogener</b> Schock (Herzversagen), <b>anaphylaktischer</b> Schock (Allergie), <b>septischer</b> Schock (Infektion) und <b>neurogener</b> Schock. Gemeinsam: Missverhältnis zwischen Sauerstoffangebot und -bedarf mit Kreislaufversagen.","id":"k0497"},{"cat":"labor","topic":"Entzündungswerte","freq":16,"type":"qa","q":"Welche Laborwerte zeigen eine Entzündung an?","a":"<b>CRP</b> (C-reaktives Protein, rascher Anstieg), <b>BSG</b> (Blutsenkung, träger), <b>Leukozytose</b> (bei bakteriellen Infekten) und <b>Procalcitonin</b> (v. a. bei bakterieller Sepsis). Linksverschiebung im Differenzialblutbild spricht für eine akute bakterielle Infektion.","id":"k0498"},{"cat":"labor","topic":"Nierenwerte","freq":16,"type":"qa","q":"Welche Laborwerte beurteilen die Nierenfunktion?","a":"<b>Kreatinin</b> und die daraus berechnete <b>GFR</b> (glomeruläre Filtrationsrate) sowie <b>Harnstoff</b>. Kreatinin steigt allerdings erst bei deutlichem Funktionsverlust an ('kreatininblinder Bereich'). Ergänzend: Cystatin C, Urinuntersuchung.","id":"k0499"},{"cat":"labor","topic":"Leberwerte","freq":16,"type":"qa","q":"Welche Laborwerte gehören zur Leberdiagnostik?","a":"<b>Transaminasen GOT (AST) und GPT (ALT)</b> zeigen Leberzellschäden an, <b>Gamma-GT und AP</b> weisen auf Cholestase (Gallenstau) hin, <b>Bilirubin</b> steigt bei Ikterus. Syntheseleistung: Albumin und Gerinnung (Quick/INR).","id":"k0500"},{"cat":"labor","topic":"Elektrolyte Kalium","freq":9,"type":"qa","q":"Warum sind Kaliumstörungen gefährlich?","a":"Kalium ist entscheidend für die Erregbarkeit von Nerven und <b>Herzmuskel</b>. Sowohl <b>Hyperkaliämie</b> als auch <b>Hypokaliämie</b> können lebensbedrohliche <b>Herzrhythmusstörungen</b> auslösen. Normbereich im Serum etwa 3,5–5,0 mmol/l.","id":"k0501"},{"cat":"labor","topic":"Tumormarker","freq":5,"type":"qa","q":"Wofür werden Tumormarker verwendet – und wofür nicht?","a":"Tumormarker (z. B. PSA, CEA, CA 19-9, AFP) dienen v. a. der <b>Verlaufs- und Therapiekontrolle</b> bekannter Tumoren. Sie sind wegen geringer Spezifität <b>nicht zur Früherkennung/Diagnose</b> als alleiniges Kriterium geeignet (auch bei Gesunden/gutartig erhöht).","id":"k0502"}];
</script>
<script>
/* ============================================================
   FIT FÜR DIE HEILPRAKTIKERPRÜFUNG – App-Logik
   Kern: Spaced Repetition (SM-2, Anki-Prinzip) + Lernmodi.
   Fortschritt wird lokal im Browser gespeichert (localStorage).
   ============================================================ */
(function(){
"use strict";

/* ---------- Kategorien: Anzeigenamen + Farben ---------- */
const CAT = {
  recht:   {name:"Gesetzeskunde & Recht",         color:"#6E56CF"},
  ifsg:    {name:"Infektionsschutz & Meldewesen", color:"#C0413A"},
  hygiene: {name:"Hygiene & Injektionen",         color:"#128C8E"},
  unters:  {name:"Untersuchungsmethoden",         color:"#2F7FB0"},
  labor:   {name:"Labor",                          color:"#6C8F1F"},
  pharma:  {name:"Pharmakologie",                  color:"#C77E27"},
  dd:      {name:"Differenzialdiagnosen",          color:"#B0710F"},
  infekt:  {name:"Infektionskrankheiten",          color:"#D0553F"},
  herz:    {name:"Herz, Kreislauf & Gefäße",       color:"#D33B4E"},
  atmung:  {name:"Respirationstrakt",              color:"#2E9AA8"},
  gastro:  {name:"Verdauung, Leber & Galle",       color:"#A9762B"},
  niere:   {name:"Niere & Urologie",               color:"#3E74C9"},
  endo:    {name:"Endokrinologie & Stoffwechsel",  color:"#A85CB0"},
  haema:   {name:"Blut & Immunsystem",             color:"#B23A5A"},
  bewegung:{name:"Bewegungsapparat",               color:"#4E8C6A"},
  neuro:   {name:"Neurologie",                      color:"#5865C4"},
  derma:   {name:"Dermatologie",                    color:"#C56B9C"},
  psych:   {name:"Psychiatrie",                      color:"#7E5BC0"},
  notfall: {name:"Notfallmedizin",                  color:"#E0592E"}
};
const CAT_ORDER = Object.keys(CAT);
const ALL_CATS = CAT_ORDER.slice();

/* ---------- Persistenz ---------- */
const STORE_KEY = "hp_fit_v1";
const DAY = 86400000;

function defaultState(){
  return {
    v:1,
    progress:{},                 // id -> {ef,interval,reps,due,lapses,last,state}
    daily:{date:today(), newDone:0, revDone:0},
    streak:{count:0, lastDay:null},
    totals:{answered:0, again:0}, // Lebenszeit-Statistik
    history:{},                   // 'YYYY-MM-DD' -> Anzahl Wiederholungen
    settings:{newPerDay:15, revPerDay:120, cats:ALL_CATS.slice(), theme:"light", flipAnim:true}
  };
}
let state = load();

function load(){
  try{
    const raw = localStorage.getItem(STORE_KEY);
    if(!raw) return defaultState();
    const s = JSON.parse(raw);
    const d = defaultState();
    // sanftes Zusammenführen (falls neue Felder dazukommen)
    return Object.assign(d, s, {
      settings:Object.assign(d.settings, s.settings||{}),
      daily:Object.assign(d.daily, s.daily||{}),
      streak:Object.assign(d.streak, s.streak||{}),
      totals:Object.assign(d.totals, s.totals||{})
    });
  }catch(e){ return defaultState(); }
}
let saveTimer=null;
function save(){
  clearTimeout(saveTimer);
  saveTimer=setTimeout(()=>{ try{ localStorage.setItem(STORE_KEY, JSON.stringify(state)); }catch(e){} }, 120);
}

/* ---------- Datum/Helfer ---------- */
function today(){ const d=new Date(); return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate()); }
function pad(n){ return n<10?"0"+n:""+n; }
function ensureDaily(){
  if(state.daily.date!==today()){ state.daily={date:today(), newDone:0, revDone:0}; save(); }
}
function $(sel,root){ return (root||document).querySelector(sel); }
function $$(sel,root){ return Array.prototype.slice.call((root||document).querySelectorAll(sel)); }
function el(html){ const t=document.createElement("template"); t.innerHTML=html.trim(); return t.content.firstElementChild; }
function esc(s){ return String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
function stripHTML(html){ const d=document.createElement("div"); d.innerHTML=html; return (d.textContent||"").replace(/\s+/g," ").trim(); }
function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
function snippet(html, max){ max=max||140; let t=stripHTML(html); if(t.length<=max) return t; t=t.slice(0,max); const cut=t.lastIndexOf(" "); return (cut>60?t.slice(0,cut):t)+"…"; }
function toast(msg){ const t=$("#toast"); t.textContent=msg; t.classList.add("show"); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove("show"),2200); }

/* ---------- Karten-Helfer ---------- */
const BY_ID = {}; KARTEN.forEach(c=>BY_ID[c.id]=c);
const HIGH_YIELD_MIN = 30;               // Schwelle "Prüfungsklassiker"
function isSeen(c){ return !!state.progress[c.id]; }
function isDue(c){ const p=state.progress[c.id]; return p && p.due<=Date.now(); }
function isMature(c){ const p=state.progress[c.id]; return p && p.interval>=21; }
function newProgress(){ return {ef:2.5, interval:0, reps:0, due:Date.now(), lapses:0, last:0, state:"new"}; }
