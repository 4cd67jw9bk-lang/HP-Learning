/* ---------- SM-2 Scheduler (4 Tasten wie Anki) ---------- */
function schedule(id, rating){
  const now=Date.now();
  let p = state.progress[id] ? Object.assign({},state.progress[id]) : newProgress();
  if(rating==="again"){
    p.lapses=(p.lapses||0)+1;
    p.reps=0; p.interval=0;
    p.ef=Math.max(1.3,p.ef-0.2);
    p.due=now+6*60000;           // in ~6 Min erneut (bleibt in der Sitzung)
    p.state="learn";
  }else{
    const q = rating==="hard"?3 : rating==="good"?4 : 5;
    p.ef=Math.max(1.3, p.ef + (0.1-(5-q)*(0.08+(5-q)*0.02)));
    if(p.reps===0)      p.interval = rating==="hard"?1 : rating==="good"?1 : 3;
    else if(p.reps===1) p.interval = rating==="hard"?3 : rating==="good"?6 : 9;
    else{
      const mult = rating==="hard"?1.2 : rating==="good"?p.ef : p.ef*1.3;
      p.interval = Math.max(p.interval+1, Math.round(p.interval*mult));
    }
    p.reps+=1;
    p.due=now+p.interval*DAY;
    p.state = p.interval>=21?"mature":"review";
  }
  p.last=now;
  state.progress[id]=p;
  // Lebenszeit + Verlauf
  state.totals.answered++; if(rating==="again") state.totals.again++;
  const t=today(); state.history[t]=(state.history[t]||0)+1;
  updateStreak();
  save();
}
function intervalLabel(id){
  const p=state.progress[id]; if(!p) return "";
  if(p.interval<1) return "<1 Tag";
  if(p.interval===1) return "1 Tag";
  if(p.interval<30) return p.interval+" Tage";
  const m=Math.round(p.interval/30); return m+" Mon.";
}
function nextIntervalPreview(id, rating){
  // grobe Vorschau für die Tastenbeschriftung
  const p=state.progress[id];
  if(rating==="again") return "6 Min";
  if(!p||p.reps===0){ const v=rating==="hard"?1:rating==="good"?1:3; return v+" T"; }
  if(p.reps===1){ const v=rating==="hard"?3:rating==="good"?6:9; return v+" T"; }
  const mult=rating==="hard"?1.2:rating==="good"?p.ef:p.ef*1.3;
  const v=Math.max(p.interval+1,Math.round(p.interval*mult));
  return v<30? v+" T" : Math.round(v/30)+" M";
}

/* ---------- Streak ---------- */
function updateStreak(){
  const t=today(); const s=state.streak;
  if(s.lastDay===t) return;
  const y=new Date(Date.now()-DAY); const yStr=y.getFullYear()+"-"+pad(y.getMonth()+1)+"-"+pad(y.getDate());
  if(s.lastDay===yStr) s.count++;
  else s.count=1;
  s.lastDay=t;
}

/* ---------- Leitner-Fächer (für Visualisierung) ---------- */
function leitnerBox(c){
  const p=state.progress[c.id];
  if(!p||p.reps===0) return 0;         // Fach 1: neu/lernend
  if(p.interval<4) return 1;           // Fach 2
  if(p.interval<10) return 2;          // Fach 3
  if(p.interval<30) return 3;          // Fach 4
  return 4;                            // Fach 5: gefestigt
}
function leitnerCounts(){
  const b=[0,0,0,0,0];
  KARTEN.forEach(c=>{ if(isSeen(c)) b[leitnerBox(c)]++; });
  // neue (ungesehene) zählen zu Fach 1 als "wartend"? -> separat
  return b;
}

/* ---------- Zählen für Übersicht ---------- */
function counts(){
  ensureDaily();
  const now=Date.now();
  let dueRev=0, newAvail=0, seen=0, mature=0;
  KARTEN.forEach(c=>{
    const p=state.progress[c.id];
    if(p){ seen++; if(p.due<=now) dueRev++; if(p.interval>=21) mature++; }
    else newAvail++;
  });
  const newCap=Math.max(0,state.settings.newPerDay-state.daily.newDone);
  const revCap=Math.max(0,state.settings.revPerDay-state.daily.revDone);
  const dueToday = Math.min(dueRev,revCap) + Math.min(newAvail,newCap);
  return {dueRev,newAvail,seen,mature,dueToday,total:KARTEN.length,
          newToStudy:Math.min(newAvail,newCap), revToStudy:Math.min(dueRev,revCap)};
}

function bindChips(root, sel, onChange){

let session=null;
let studyRevealed=false;

function interleave(rev, nw){
  if(!nw.length) return rev.slice();
  if(!rev.length) return nw.slice();
  const out=[]; const gap=Math.max(1, Math.floor(rev.length/nw.length)); let ni=0;
  for(let i=0;i<rev.length;i++){ out.push(rev[i]); if((i+1)%gap===0 && ni<nw.length) out.push(nw[ni++]); }
  while(ni<nw.length) out.push(nw[ni++]);
  return out;
}

window.startStudy=function(opts){
  opts=opts||{};
  ensureDaily();
  const cats = opts.cats || state.settings.cats;
  const filter = opts.filter || (()=>true);
  const now=Date.now();
  let pool = KARTEN.filter(c=>cats.indexOf(c.cat)>-1 && filter(c));

  if(opts.cram){
    const q=pool.slice().sort((a,b)=>b.freq-a.freq);
    session={ ids:q.map(c=>c.id), newIds:new Set(pool.filter(c=>!isSeen(c)).map(c=>c.id)),
      i:0, counted:new Set(), cram:true, title:opts.title||"Wiederholung", again:0, done:0, startTotal:q.length };
  }else{
    let reviews=pool.filter(c=>state.progress[c.id]&&state.progress[c.id].due<=now)
                    .sort((a,b)=>state.progress[a.id].due-state.progress[b.id].due);
    const revCap=Math.max(0,state.settings.revPerDay-state.daily.revDone);
    reviews=reviews.slice(0,revCap);
    let news=pool.filter(c=>!isSeen(c)).sort((a,b)=>b.freq-a.freq);
    const newCap=Math.max(0,state.settings.newPerDay-state.daily.newDone);
    news=news.slice(0,newCap);
    const order=interleave(reviews,news);
    session={ ids:order.map(c=>c.id), newIds:new Set(news.map(c=>c.id)),
      i:0, counted:new Set(), cram:false, title:opts.title||"Karteikarten", again:0, done:0, startTotal:order.length };
  }
  studyRevealed=false;
  go("study");
};

window.studyAnswer=function(rating){
  if(!studyRevealed) return;
  const id=session.ids[session.i];
  if(!session.cram && !session.counted.has(id)){
    if(session.newIds.has(id)) state.daily.newDone++; else state.daily.revDone++;
    session.counted.add(id);
  }
  schedule(id,rating);
  session.done++;
  if(rating==="again"){ session.again++; const at=Math.min(session.ids.length, session.i+4); session.ids.splice(at,0,id); }
  session.i++;
  studyRevealed=false;
  save(); refreshBadges();
  renderStudy();
};

function weightedPick(pool){
  let total=0; pool.forEach(c=>total+=(c.freq||0)+3);
  let r=Math.random()*total;
  for(const c of pool){ r-=((c.freq||0)+3); if(r<=0) return c; }
  return pool[pool.length-1];
}

function renderQuizSetup(v){

function buildOptions(card){
  const correct=snippet(card.a,130);
  let same=quiz.pool.filter(c=>c.id!==card.id && c.cat===card.cat);
  let src = same.length>=3?same:quiz.pool.filter(c=>c.id!==card.id);
  let picks=shuffle(src).slice(0,6);
  let opts=[], seen=new Set([correct]);
  for(const c of picks){ const t=snippet(c.a,130); if(!seen.has(t)){ seen.add(t); opts.push({t,ok:false}); } if(opts.length>=3) break; }
  while(opts.length<3){ opts.push({t:"— keine der Aussagen —",ok:false}); }
  opts.push({t:correct,ok:true});
  return shuffle(opts);
}

function ring(pct,color){

let match=null;
reg("match", function(v){
  if(!match){ renderMatchSetup(v); return; }
  renderMatchBoard(v);
});
function renderMatchSetup(v){
  const sel=new Set(state.settings.cats);
  v.innerHTML=`
    <div class="eyebrow">Zuordnen</div>

    <h2 class="sec">Themen</h2>
    <div class="chips" id="matchChips">${chipRow(sel)}</div>
    <button class="btn btn-primary btn-lg" id="matchStart" style="margin-top:22px">Runde starten</button>`;
  bindChips($("#matchChips",v),sel);
  $("#matchStart",v).onclick=()=>{
    if(!sel.size){toast("Bitte mindestens ein Thema wählen");return;}
    startMatch([...sel]);
  };
}
function startMatch(cats){
  let pool=KARTEN.filter(c=>cats.indexOf(c.cat)>-1);
  // distinct topics bevorzugen
  const byTopic={}; shuffle(pool).forEach(c=>{ if(!byTopic[c.topic]) byTopic[c.topic]=c; });
  let picks=shuffle(Object.values(byTopic)).slice(0,5);
  if(picks.length<5) picks=shuffle(pool).slice(0,5);
  match={ pairs:picks.map(c=>({id:c.id,q:snippet(c.q,90),a:snippet(c.a,90)})),
    left:shuffle(picks.map(c=>c.id)), right:shuffle(picks.map(c=>c.id)),
    sel:null, done:new Set(), attempts:0, start:Date.now() };
  go("match");
}
function renderMatchBoard(v){
  const P={}; match.pairs.forEach(p=>P[p.id]=p);
  const item=(id,side)=>{
    const done=match.done.has(id);
    const isSel=match.sel && match.sel.id===id && match.sel.side===side;
    return `<button class="match-item ${done?'done':''} ${isSel?'sel':''}" data-id="${id}" data-side="${side}" ${done?'disabled':''}>${esc(side==='left'?P[id].q:P[id].a)}</button>`;
  };
  v.innerHTML=`
    <div class="mc-stage" style="max-width:760px">
      <div class="study-top">
        <button class="btn btn-ghost" style="padding:9px 14px" onclick="quitMatch()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M15 18l-6-6 6-6"/></svg> Beenden
        </button>
        <div class="study-counts"><span>Paare <b>${match.done.size}/5</b></span> <span>· Versuche <b>${match.attempts}</b></span></div>
      </div>
      <p style="font-size:13.5px;color:var(--ink-soft);margin-bottom:14px">Tippe eine <b>Frage</b> und dann die passende <b>Antwort</b> (oder umgekehrt).</p>
      <div class="match-grid" id="matchGrid">
        <div><div class="match-col-h">Frage</div>${match.left.map(id=>item(id,'left')).join("")}</div>
        <div><div class="match-col-h">Antwort</div>${match.right.map(id=>item(id,'right')).join("")}</div>
      </div>
    </div>`;
  $("#matchGrid",v).onclick=onMatchClick;
}
function onMatchClick(e){
  const b=e.target.closest(".match-item"); if(!b||b.classList.contains("done")) return;
  const id=b.dataset.id, side=b.dataset.side;
  if(!match.sel){ match.sel={id,side,el:b}; b.classList.add("sel"); return; }
  if(match.sel.side===side){ // Auswahl wechseln
    match.sel.el.classList.remove("sel"); match.sel={id,side,el:b}; b.classList.add("sel"); return;
  }
  // Paar prüfen
  match.attempts++;
  if(match.sel.id===id){
    match.done.add(id);
    match.sel.el.classList.add("flash-ok"); b.classList.add("flash-ok");
    match.sel=null;
    setTimeout(()=>{ if(match.done.size>=5) renderMatchDone(); else renderMatchBoard($("#view-match")); },350);
  }else{
    const a=match.sel.el;
    a.classList.add("flash-no"); b.classList.add("flash-no");
    match.sel=null;
    setTimeout(()=>{ a.classList.remove("flash-no","sel"); b.classList.remove("flash-no"); renderMatchBoard($("#view-match")); },450);
  }
}
function renderMatchDone(){
  const secs=Math.round((Date.now()-match.start)/1000);
  const att=match.attempts;
  match=null;
  $("#view-match").innerHTML=`<div class="result">
    <div class="empty-ic" style="margin:0 auto 22px"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg></div>
    <h2>Alle Paare gefunden!</h2>
    <p>In <b>${secs}s</b> mit <b>${att}</b> Versuchen.</p>
    <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
      <button class="btn btn-primary btn-lg" onclick="go('match')">Neue Runde</button>
      <button class="btn btn-ghost btn-lg" onclick="go('home')">Zur Übersicht</button>
    </div></div>`;
}

function topTopics(n){
  const m={};
  KARTEN.forEach(c=>{ const k=c.cat+"|"+c.topic; if(!m[k]||c.freq>m[k].freq) m[k]={topic:c.topic,cat:c.cat,freq:c.freq,count:0}; });
  KARTEN.forEach(c=>{ m[c.cat+"|"+c.topic].count++; });
  return Object.values(m).filter(t=>t.freq>0).sort((a,b)=>b.freq-a.freq).slice(0,n);
}

      <div class="tile"><b>${state.totals.answered}</b><span>Bewertungen insgesamt</span></div>
      <div class="tile"><b>${c.dueToday}</b><span>heute noch fällig</span></div>
      <div class="tile"><b>${state.daily.newDone}</b><span>neue Karten heute</span></div>
      <div class="tile"><b>${state.daily.revDone}</b><span>Wiederholungen heute</span></div>
    </div>

    <h2 class="sec">Aktivität (7 Tage)</h2>
    <div class="panel" style="padding:22px 24px">
      <div style="display:flex;align-items:flex-end;gap:10px;height:120px">
        ${days.map(d=>`<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:8px;height:100%;justify-content:flex-end">
          <div style="font-family:var(--mono);font-size:11px;color:var(--ink-soft)">${d.n||""}</div>
          <div style="width:100%;max-width:38px;height:${Math.max(4,Math.round(d.n/maxD*90))}px;background:${d.n?'linear-gradient(180deg,var(--brand),#15a0a0)':'var(--line-soft)'};border-radius:6px 6px 0 0"></div>
          <div style="font-size:11.5px;color:var(--ink-faint)">${d.lbl}</div>
        </div>`).join("")}
      </div>
    </div>

    <h2 class="sec">Leitner-Verteilung</h2>
    <div class="leitner">
      ${boxes.map((n,i)=>`<div class="fach ${i===4?'mature':''}"><div class="fach-tag">F${i+1}</div>
        <div class="fach-n" style="margin-top:6px">${n}</div>
        <div class="fach-l">${["neu · lernend","1–3 T","4–9 T","10–29 T","30+ T"][i]}</div></div>`).join("")}
    </div>

    <h2 class="sec">Abdeckung nach Thema</h2>
    <div class="panel" style="padding:16px 22px">
      ${CAT_ORDER.map(k=>{
        const cs=KARTEN.filter(c=>c.cat===k); const seen=cs.filter(isSeen).length;
        const pct=Math.round(seen/cs.length*100);
        return `<div class="cov-row">
          <div class="cov-name"><span class="cat-dot" style="background:${CAT[k].color}"></span>${CAT[k].name}</div>
          <div class="cov-bar"><i style="width:${pct}%;background:${CAT[k].color}"></i></div>
          <div class="cov-pct">${seen}/${cs.length}</div>
        </div>`;
      }).join("")}
    </div>`;
});

/* ============================================================
   EINSTELLUNGEN
   ============================================================ */
reg("settings", function(v){
  const s=state.settings;
  const catToggles=CAT_ORDER.map(k=>{
    const on=s.cats.indexOf(k)>-1; const n=KARTEN.filter(c=>c.cat===k).length;
    return `<button class="chip ${on?'on':''}" data-setcat="${k}"><span class="cat-dot" style="background:${CAT[k].color}"></span>${CAT[k].name}<span class="c-n">${n}</span></button>`;
  }).join("");
  v.innerHTML=`
    <div class="eyebrow">Konfiguration</div>
    <h1 class="page">Einstellungen</h1>
    <p class="page-sub">Passe das Lerntempo an und sichere deinen Fortschritt. Alle Daten bleiben lokal auf diesem Gerät.</p>

    <h2 class="sec">Lerntempo</h2>
    <div class="panel" style="padding:4px 22px">
      <div class="set-row">
        <div class="set-info"><label>Neue Karten pro Tag</label><p>Wie viele bisher ungelernte Karten täglich neu dazukommen.</p></div>
        <div class="stepper"><button data-step="newPerDay:-5">–</button><span class="val" id="valNew">${s.newPerDay}</span><button data-step="newPerDay:5">+</button></div>
      </div>
      <div class="set-row">
        <div class="set-info"><label>Wiederholungen pro Tag</label><p>Obergrenze der fälligen Wiederholungen pro Tag.</p></div>
        <div class="stepper"><button data-step="revPerDay:-20">–</button><span class="val" id="valRev">${s.revPerDay}</span><button data-step="revPerDay:20">+</button></div>
      </div>
    </div>

    <h2 class="sec">Darstellung</h2>
    <div class="panel" style="padding:4px 22px">
      <div class="set-row">
        <div class="set-info"><label>Dunkles Design</label><p>Augenschonender Modus für abends.</p></div>
        <button class="switch ${s.theme==='dark'?'on':''}" id="swTheme"></button>
      </div>
      <div class="set-row">
        <div class="set-info"><label>Karten-Umdreh-Animation</label><p>3D-Effekt beim Aufdecken der Antwort.</p></div>
        <button class="switch ${s.flipAnim?'on':''}" id="swFlip"></button>
      </div>
    </div>

    <h2 class="sec">Standard-Themen</h2>
    <p style="font-size:13px;color:var(--ink-soft);margin-bottom:10px">Diese Themen sind in neuen Lernsitzungen vorausgewählt.</p>
    <div class="chips" id="setCats">${catToggles}</div>

    <h2 class="sec">Eigene Karten hinzufügen</h2>
    <div class="panel" style="padding:20px 22px">
      <p style="font-size:13.5px;color:var(--ink-soft);margin-bottom:12px">Füge eigene Karten als JSON ein – ein Array von Objekten mit <span class="mono" style="font-size:12px">cat, topic, q, a</span> (optional <span class="mono" style="font-size:12px">freq</span>). Gültige Kategorien: ${CAT_ORDER.map(k=>`<span class="mono" style="font-size:11px">${k}</span>`).join(", ")}.</p>
      <textarea id="cardJson" placeholder='[{"cat":"recht","topic":"Beispiel","q":"Frage?","a":"Antwort","freq":0}]' style="width:100%;min-height:90px;border:1px solid var(--line);border-radius:10px;padding:12px;font-family:var(--mono);font-size:12.5px;background:var(--surface-2);color:var(--ink);resize:vertical"></textarea>
      <button class="btn btn-ghost" style="margin-top:12px" id="addCards">Karten hinzufügen</button>
      ${countCustom()>0?`<p style="font-size:12.5px;color:var(--ink-faint);margin-top:10px;font-family:var(--mono)">${countCustom()} eigene Karten geladen</p>`:""}
    </div>

    <h2 class="sec">Fortschritt sichern</h2>
    <div class="panel" style="padding:20px 22px;display:flex;gap:10px;flex-wrap:wrap">
      <button class="btn btn-ghost" id="btnExport">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12m0 0l-4-4m4 4l4-4M4 17v2a2 2 0 002 2h12a2 2 0 002-2v-2"/></svg> Exportieren (Backup)
      </button>
      <button class="btn btn-ghost" id="btnImport">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 15V3m0 0l-4 4m4-4l4 4M4 17v2a2 2 0 002 2h12a2 2 0 002-2v-2"/></svg> Importieren
      </button>
      <input type="file" id="fileImport" accept="application/json" style="display:none">
    </div>

    <div class="danger-zone">
      <h3>Fortschritt zurücksetzen</h3>
      <p>Löscht alle Lernstände, Statistiken und Einstellungen unwiderruflich. Eigene Karten bleiben erhalten.</p>
      <button class="btn btn-danger" id="btnReset">Alles zurücksetzen</button>
    </div>

    <p style="font-size:12px;color:var(--ink-faint);margin-top:26px;line-height:1.6">
      Inhaltliche Grundlage: „Fit für die Heilpraktikerprüfung“ (Version Heilbronn). Diese App ist ein privates Lernwerkzeug und ersetzt keine ärztliche/juristische Beratung. Ohne Gewähr auf Richtigkeit und Vollständigkeit.
    </p>`;

  // Stepper
  v.querySelectorAll("[data-step]").forEach(b=>b.addEventListener("click",()=>{
    const [key,delta]=b.dataset.step.split(":"); const d=parseInt(delta,10);
    if(key==="newPerDay") s.newPerDay=Math.max(0,Math.min(100,s.newPerDay+d));
    if(key==="revPerDay") s.revPerDay=Math.max(20,Math.min(999,s.revPerDay+d));
    $("#valNew").textContent=s.newPerDay; $("#valRev").textContent=s.revPerDay;
    save(); refreshBadges();
  }));
  // Switches
  $("#swTheme",v).onclick=()=>{ toggleTheme(); $("#swTheme").classList.toggle("on",s.theme==="dark"); };
  $("#swFlip",v).onclick=()=>{ s.flipAnim=!s.flipAnim; $("#swFlip").classList.toggle("on",s.flipAnim); save(); };
  // Cat toggles
  $("#setCats",v).addEventListener("click",e=>{
    const b=e.target.closest("[data-setcat]"); if(!b) return;
    const k=b.dataset.setcat; const idx=s.cats.indexOf(k);
    if(idx>-1){ if(s.cats.length>1) s.cats.splice(idx,1); else {toast("Mindestens ein Thema muss aktiv bleiben");return;} }
    else s.cats.push(k);
    b.classList.toggle("on",s.cats.indexOf(k)>-1); save(); refreshBadges();
  });
  // Custom cards
  $("#addCards",v).onclick=()=>{
    const txt=$("#cardJson").value.trim(); if(!txt) return;
    try{
      const arr=JSON.parse(txt); if(!Array.isArray(arr)) throw 0;
      let added=0;
      arr.forEach((c,i)=>{
        if(CAT[c.cat] && c.q && c.a){
          const card={cat:c.cat,topic:c.topic||"Eigene Karte",q:String(c.q),a:String(c.a),freq:+c.freq||0,id:"u"+Date.now()+"_"+i,custom:true};
          KARTEN.push(card); BY_ID[card.id]=card; state.customCards.push(card); added++;
        }
      });
      save(); refreshBadges();
      toast(added?`${added} Karte${added===1?"":"n"} hinzugefügt`:"Keine gültigen Karten gefunden");
      if(added) go("settings");
    }catch(e){ toast("Ungültiges JSON – bitte Format prüfen"); }
  };
  // Export / Import / Reset
  $("#btnExport",v).onclick=exportProgress;
  $("#btnImport",v).onclick=()=>$("#fileImport").click();
  $("#fileImport",v).onchange=e=>{ const f=e.target.files[0]; if(!f) return;
    const r=new FileReader();
    r.onload=()=>{ try{
      const data=JSON.parse(r.result);
      if(!data||typeof data!=="object"||!data.progress) throw 0;
      state=Object.assign(defaultState(),data,{settings:Object.assign(defaultState().settings,data.settings||{})});
      (state.customCards||[]).forEach(c=>{ if(!BY_ID[c.id]){KARTEN.push(c);BY_ID[c.id]=c;} });
      save(); applyTheme(); refreshBadges(); toast("Fortschritt importiert"); go("home");
    }catch(err){ toast("Datei konnte nicht gelesen werden"); } };
    r.readAsText(f);
  };
  $("#btnReset",v).onclick=()=>{
    if(confirm("Wirklich den gesamten Fortschritt löschen? Das kann nicht rückgängig gemacht werden.")){
      const custom=state.customCards||[];
      try{ localStorage.removeItem(STORE_KEY); }catch(e){}
      state=defaultState(); state.customCards=custom;
      save(); applyTheme(); refreshBadges(); toast("Fortschritt zurückgesetzt"); go("home");
    }
  };
});
function countCustom(){ return (state.customCards||[]).length; }
function exportProgress(){
  try{
    const blob=new Blob([JSON.stringify(state)],{type:"application/json"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a"); a.href=url; a.download="hp-fortschritt-"+today()+".json"; document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(url),1000);
    toast("Fortschritt exportiert");
  }catch(e){ toast("Export fehlgeschlagen"); }
}

/* ============================================================
   INIT
   ============================================================ */
// eigene Karten aus Speicher wieder einhängen
(state.customCards||[]).forEach(c=>{ if(!BY_ID[c.id]){ KARTEN.push(c); BY_ID[c.id]=c; } });
applyTheme();
refreshBadges();
go("home");


})();

</script>
</body>
</html>
