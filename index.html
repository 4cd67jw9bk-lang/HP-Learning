ohne Sensibilitätsausfall. Postpolio-Syndrom Jahrzehnte später möglich. Impfpräventabel; §6-meldepflichtig.","id":"k0119"},{"cat":"infekt","topic":"Erysipel","freq":22,"type":"qa","q":"Beschreibe das Erysipel (Wundrose).","a":"<b>Erreger:</b> meist β-hämolysierende Streptokokken A. Akute Infektion der oberen Dermis/Lymphspalten über kleine Hautläsionen.<br><b>Klinik:</b> scharf begrenzte, flammend-rote, überwärmte, schmerzhafte Hautrötung mit Fieber und Schüttelfrost, oft am Unterschenkel/Gesicht. Therapie: Antibiotika (Penicillin).","id":"k0120"},{"cat":"infekt","topic":"Botulismus","freq":7,"type":"qa","q":"Beschreibe den Botulismus.","a":"<b>Erreger:</b> Clostridium botulinum, Toxin in verdorbenen Konserven. Das Neurotoxin blockiert die Acetylcholinfreisetzung → <b>schlaffe Lähmungen</b>: Doppelbilder, Ptosis, Schluck-/Sprechstörungen, absteigende Lähmung bis Atemlähmung. Kein Fieber, Bewusstsein klar. §6-meldepflichtig, HP-Behandlungsverbot.","id":"k0121"},{"cat":"infekt","topic":"Norovirus","freq":19,"type":"qa","q":"Was ist typisch für eine Norovirus-Gastroenteritis?","a":"Hochkontagiös (Schmierinfektion, Aerosole), sehr kurze IZ (6–50 h). <b>Schwallartiges Erbrechen</b> + wässrige Diarrhö, oft explosionsartige Ausbrüche in Gemeinschaftseinrichtungen. Meist selbstlimitierend (1–3 Tage); wichtigste Therapie: Flüssigkeitsersatz. Erregernachweis §7-meldepflichtig.","id":"k0122"},{"cat":"infekt","topic":"Diphtherie","freq":8,"type":"qa","q":"Beschreibe die Diphtherie.","a":"<b>Erreger:</b> Corynebacterium diphtheriae (Toxin). Rachendiphtherie mit <b>grau-weißen, festhaftenden Pseudomembranen</b> auf den Tonsillen, süßlich-fauliger Mundgeruch, „Cäsarenhals“ (Lymphknotenschwellung). Toxin schädigt Herz/Nerven. Komplikation: Kehlkopf-„echter Krupp“ mit Erstickungsgefahr. Impfpräventabel.","id":"k0123"},{"cat":"infekt","topic":"Mononukleose","freq":17,"type":"qa","q":"Beschreibe das Pfeiffersche Drüsenfieber (Mononukleose).","a":"<b>Erreger:</b> Epstein-Barr-Virus (EBV), „kissing disease“. Klinik: Fieber, <b>Angina tonsillaris</b> mit grau-weißen Belägen, generalisierte <b>Lymphknotenschwellung</b>, Splenomegalie. Labor: lymphomonozytäres Blutbild mit atypischen Lymphozyten (Pfeiffer-Zellen). Cave: bei Ampicillin-Gabe Arzneimittelexanthem.","id":"k0124"},{"cat":"herz","topic":"KHK","freq":152,"type":"qa","q":"Was ist die koronare Herzkrankheit (KHK) und was ist die Hauptursache?","a":"Manifestation der <b>Arteriosklerose der Herzkranzgefäße</b> → Missverhältnis zwischen O₂-Angebot und -Bedarf des Myokards (Koronarinsuffizienz). Hauptursache: Arteriosklerose. Risikofaktoren: Rauchen, Hypertonie, Diabetes, Fettstoffwechselstörung, Adipositas, Bewegungsmangel, Stress, familiäre Belastung, Alter, männl. Geschlecht.","id":"k0125"},{"cat":"herz","topic":"Angina pectoris","freq":152,"type":"qa","q":"Unterscheide stabile und instabile Angina pectoris.","a":"<b>Stabile AP:</b> reproduzierbar bei Belastung, Besserung in Ruhe/auf Nitro, <20 min.<br><b>Instabile AP:</b> neu aufgetreten, zunehmend, in Ruhe, auf Nitro schlechter ansprechend → Teil des <b>akuten Koronarsyndroms (ACS)</b>, Vorbote des Infarkts → Notfall!","id":"k0126"},{"cat":"herz","topic":"Herzinfarkt","freq":152,"type":"qa","q":"Nenne die Leitsymptome des Herzinfarkts.","a":"Anhaltender (>20 min) <b>retrosternaler Vernichtungsschmerz</b>, Ausstrahlung in li. Arm, Hals, Kiefer, Rücken, Oberbauch; <b>Nitro-refraktär</b>; Todesangst, Vernichtungsgefühl; Kaltschweißigkeit, Übelkeit, Dyspnoe. Cave: <b>stumme Infarkte</b> (Diabetiker, Frauen, ältere Menschen).","id":"k0127"},{"cat":"herz","topic":"Herzinfarkt","freq":152,"type":"qa","q":"Welche Sofortmaßnahmen ergreift man beim Verdacht auf Herzinfarkt?","a":"<b>Notruf 112</b>, Patient beruhigen, <b>Oberkörper hoch</b> lagern, enge Kleidung öffnen, körperliche Ruhe, engmaschige Überwachung (Vitalzeichen), auf Reanimationsbereitschaft achten (Kammerflimmern häufigste frühe Todesursache). Keine i.m.-Injektionen (Lyse!).","id":"k0128"},{"cat":"herz","topic":"Herzinfarkt","freq":152,"type":"qa","q":"Welche Laborwerte (Biomarker) steigen beim Herzinfarkt?","a":"<b>Troponin T/I</b> (herzspezifisch, sensitivster Marker, Anstieg nach 3–4 h), CK und <b>CK-MB</b>, Myoglobin (früh, unspezifisch), LDH (spät). EKG-Zeichen: ST-Hebung (STEMI), R-Verlust, pathologisches Q, T-Negativierung.","id":"k0129"},{"cat":"herz","topic":"Herzinsuffizienz","freq":80,"type":"qa","q":"Unterscheide Links- und Rechtsherzinsuffizienz anhand der Symptome.","a":"<b>Linksherzinsuffizienz:</b> Rückstau in die Lunge → <b>Dyspnoe</b>, Orthopnoe, nächtlicher Husten, Lungenödem, Asthma cardiale.<br><b>Rechtsherzinsuffizienz:</b> Rückstau in den Körperkreislauf → <b>periphere Ödeme</b> (Knöchel), Halsvenenstauung, Stauungsleber, Aszites, Nykturie. <b>Globalinsuffizienz</b> = beides.","id":"k0130"},{"cat":"herz","topic":"Herzinsuffizienz","freq":80,"type":"qa","q":"Wie werden die NYHA-Stadien der Herzinsuffizienz eingeteilt?","a":"<b>NYHA I:</b> keine Beschwerden bei normaler Belastung.<br><b>NYHA II:</b> Beschwerden bei stärkerer Belastung.<br><b>NYHA III:</b> Beschwerden bei leichter Belastung.<br><b>NYHA IV:</b> Beschwerden in <b>Ruhe</b>.","id":"k0131"},{"cat":"herz","topic":"Hypertonie","freq":22,"type":"qa","q":"Ab welchen Werten spricht man von arterieller Hypertonie und welche Formen gibt es?","a":"<b>Hypertonie ab ≥140/90 mmHg</b> (Praxismessung). Normal <120/80.<br><b>Primär/essenziell</b> (~90 %, keine fassbare Ursache) und <b>sekundär</b> (renal, endokrin – z. B. Phäochromozytom, Conn-, Cushing-Syndrom, Nierenarterienstenose). Folgeschäden: Herz, Hirn (Schlaganfall), Niere, Augen, Gefäße.","id":"k0132"},{"cat":"herz","topic":"Hypertensive Krise","freq":22,"type":"qa","q":"Was ist der Unterschied zwischen hypertensiver Krise und hypertensivem Notfall?","a":"<b>Hypertensive Krise:</b> stark erhöhter Blutdruck (>180/120) <b>ohne</b> akute Organschäden.<br><b>Hypertensiver Notfall:</b> stark erhöhter Blutdruck <b>mit</b> akuten Organschäden (Hirnblutung, Lungenödem, Angina, Aortendissektion, Sehstörungen) → sofortige ärztliche/notärztliche Behandlung.","id":"k0133"},{"cat":"herz","topic":"Phlebothrombose","freq":24,"type":"qa","q":"Nenne Risikofaktoren (Virchow-Trias) und Klinik der tiefen Beinvenenthrombose.","a":"<b>Virchow-Trias:</b> 1. Gefäßwandschaden, 2. verlangsamte Strömung (Immobilität), 3. erhöhte Gerinnungsneigung.<br><b>Klinik:</b> einseitige Schwellung, Überwärmung, livide Verfärbung, Schmerz (Wade), Spannungsgefühl; klassische (unsichere) Zeichen: Homans-, Payr-, Meyer-Zeichen. <b>Größte Gefahr: Lungenembolie!</b>","id":"k0134"},{"cat":"herz","topic":"pAVK","freq":32,"type":"qa","q":"Was ist die pAVK und wie wird sie nach Fontaine eingeteilt?","a":"<b>Periphere arterielle Verschlusskrankheit</b>: Stenose/Verschluss der Extremitätenarterien (v. a. Beine), meist arteriosklerotisch.<br><b>Fontaine:</b> I beschwerdefrei · II Claudicatio intermittens (Schaufensterkrankheit; IIa >200 m, IIb <200 m) · III Ruheschmerz · IV Nekrose/Gangrän.","id":"k0135"},{"cat":"herz","topic":"Herzklappenfehler","freq":5,"type":"qa","q":"Was unterscheidet eine Klappenstenose von einer Klappeninsuffizienz?","a":"<b>Stenose:</b> Klappe öffnet nicht ausreichend → Behinderung des Vorwärtsflusses, Druckbelastung.<br><b>Insuffizienz:</b> Klappe schließt nicht dicht → Rückfluss (Regurgitation), Volumenbelastung. Häufigster erworbener Klappenfehler: <b>Aortenklappenstenose</b> (Trias: Angina, Synkope, Dyspnoe).","id":"k0136"},{"cat":"atmung","topic":"Asthma bronchiale","freq":24,"type":"qa","q":"Beschreibe Pathophysiologie und Klinik des Asthma bronchiale.","a":"Chronisch-entzündliche Atemwegserkrankung mit <b>reversibler</b> Bronchialobstruktion durch Bronchospasmus, Schleimhautödem und Dyskrinie.<br><b>Klinik:</b> anfallsweise <b>exspiratorische Dyspnoe</b>, Giemen/Pfeifen, verlängertes Exspirium, trockener Husten, Engegefühl. Formen: allergisch (extrinsic) und nicht-allergisch (intrinsic).","id":"k0137"},{"cat":"atmung","topic":"COPD","freq":45,"type":"qa","q":"Was ist die COPD und wie unterscheidet sie sich vom Asthma?","a":"<b>Chronic obstructive pulmonary disease</b>: chronische, <b>nicht (vollständig) reversible</b> Atemwegsobstruktion, meist durch Rauchen; umfasst chronische Bronchitis + Emphysem.<br>Unterschied: Asthma = anfallsweise/reversibel, oft allergisch, jung; COPD = dauerhaft/progredient, Raucher, ältere Menschen.","id":"k0138"},{"cat":"atmung","topic":"Chronische Bronchitis","freq":45,"type":"qa","q":"Wie ist die chronische Bronchitis definiert (WHO)?","a":"Husten und Auswurf an den meisten Tagen während mindestens <b>3 Monaten in 2 aufeinanderfolgenden Jahren</b>. Häufigste Ursache: <b>Rauchen</b>. Kann in COPD übergehen.","id":"k0139"},{"cat":"atmung","topic":"Pneumonie","freq":25,"type":"qa","q":"Nenne Leitsymptome und typischen Erreger der Lobärpneumonie.","a":"<b>Erreger:</b> häufig Pneumokokken (Streptococcus pneumoniae).<br><b>Leitsymptome:</b> plötzliches hohes Fieber, Schüttelfrost, produktiver Husten (rostbrauner Auswurf), Dyspnoe, atemabhängige Thoraxschmerzen (Begleitpleuritis). Befund: feinblasige RG, gedämpfter Klopfschall, Bronchialatmen.","id":"k0140"},{"cat":"atmung","topic":"Lungenembolie","freq":22,"type":"qa","q":"Beschreibe Ursache und Leitsymptome der Lungenembolie.","a":"Meist Verschleppung eines <b>Thrombus aus einer Beinvenenthrombose</b> in die Lungenarterien.<br><b>Leitsymptome:</b> plötzliche <b>Dyspnoe</b>, Tachypnoe, atemabhängiger Thoraxschmerz, Tachykardie, Husten (ggf. Hämoptyse), Angst; bei großer Embolie Schock/Rechtsherzbelastung. <b>Notfall!</b>","id":"k0141"},{"cat":"atmung","topic":"Pneumothorax","freq":5,"type":"qa","q":"Was ist ein (Spannungs-)Pneumothorax?","a":"Luftansammlung im <b>Pleuraspalt</b> → Kollaps der Lunge. <b>Spannungspneumothorax</b> (Ventilmechanismus): zunehmender Druck verdrängt Mediastinum → Kreislaufversagen, <b>lebensbedrohlicher Notfall</b>. Klinik: plötzliche Dyspnoe, einseitig fehlendes Atemgeräusch, hypersonorer Klopfschall, gestaute Halsvenen.","id":"k0142"},{"cat":"atmung","topic":"Lungenödem","freq":47,"type":"qa","q":"Beschreibe Ursache und Klinik des kardialen Lungenödems.","a":"Flüssigkeitsaustritt in Alveolen durch Rückstau bei <b>Linksherzinsuffizienz</b>.<br><b>Klinik:</b> schwere Ruhedyspnoe, Orthopnoe, <b>brodelnde/rasselnde Atmung</b>, schaumiger (ggf. blutig-tingierter) Auswurf, Zyanose, Todesangst. Maßnahmen: sitzende Lagerung mit herabhängenden Beinen, Notruf.","id":"k0143"},{"cat":"atmung","topic":"Bronchialkarzinom","freq":68,"type":"qa","q":"Nenne Risikofaktoren und Warnsymptome des Bronchialkarzinoms.","a":"<b>Hauptrisiko: Rauchen</b> (auch Asbest, Radon). Lange symptomarm.<br><b>Warnsymptome:</b> anhaltender Husten/Änderung des Hustens, <b>Hämoptysen</b>, rezidivierende Pneumonien, Gewichtsverlust, B-Symptomatik, Heiserkeit (Recurrensparese), obere Einflussstauung. Einteilung: kleinzellig (SCLC) vs. nicht-kleinzellig (NSCLC).","id":"k0144"},{"cat":"gastro","topic":"Akutes Abdomen","freq":16,"type":"qa","q":"Was versteht man unter einem akuten Abdomen und welche Leitsymptome gibt es?","a":"Symptomkomplex mit akuten, heftigen <b>Bauchschmerzen</b> + <b>Abwehrspannung</b> + gestörter Peristaltik + Kreislaufbeeinträchtigung → potenziell lebensbedrohlich.<br>Ursachen: Perforation, Ileus, Appendizitis, Mesenterialinfarkt, Pankreatitis, Cholezystitis, rupturiertes Aortenaneurysma, Extrauteringravidität. <b>Sofort ärztlich abklären!</b>","id":"k0145"},{"cat":"gastro","topic":"Ileus","freq":27,"type":"qa","q":"Unterscheide mechanischen und paralytischen Ileus.","a":"<b>Mechanischer Ileus:</b> Passagehindernis (Tumor, Briden, Hernie, Kotstein) → <b>hochgestellte, klingende</b> Darmgeräusche, kolikartige Schmerzen.<br><b>Paralytischer Ileus:</b> Darmlähmung (nach OP, Peritonitis, Mesenterialinfarkt) → <b>„Totenstille“</b> (fehlende Darmgeräusche). Beide: Stuhl-/Windverhalt, Erbrechen (ggf. Miserere), Meteorismus.","id":"k0146"},{"cat":"gastro","topic":"Gastritis","freq":8,"type":"qa","q":"Nenne die Formen der Gastritis (A-B-C-Schema).","a":"<b>Typ A</b> – Autoimmun (Antikörper gegen Belegzellen → B12-Mangel, perniziöse Anämie).<br><b>Typ B</b> – Bakteriell (<b>Helicobacter pylori</b>, häufigste Form, Ulkusrisiko).<br><b>Typ C</b> – Chemisch (NSAR, Alkohol, Gallereflux).","id":"k0147"},{"cat":"gastro","topic":"Ulkuskrankheit","freq":2,"type":"qa","q":"Nenne Ursachen und Komplikationen des Magen-/Duodenalulkus.","a":"<b>Ursachen:</b> Helicobacter pylori, NSAR, Stress, Rauchen; Störung des Gleichgewichts aggressiv/protektiv.<br><b>Komplikationen:</b> Blutung (Teerstuhl, Hämatemesis), <b>Perforation</b> (akutes Abdomen), Penetration, Magenausgangsstenose, Karzinomentartung (v. a. Magen).","id":"k0148"},{"cat":"gastro","topic":"CED","freq":40,"type":"qa","q":"Unterscheide Morbus Crohn und Colitis ulcerosa.","a":"<b>Morbus Crohn:</b> gesamter GI-Trakt (Mund–After), <b>diskontinuierlich</b> („skip lesions“), <b>transmural</b>, Fisteln/Stenosen, terminales Ileum typisch; unblutige Diarrhö.<br><b>Colitis ulcerosa:</b> nur Kolon, <b>kontinuierlich</b> vom Rektum aufsteigend, nur Mukosa, <b>blutig-schleimige</b> Durchfälle; Karzinomrisiko ↑.","id":"k0149"},{"cat":"gastro","topic":"Reizdarmsyndrom","freq":8,"type":"qa","q":"Was kennzeichnet das Reizdarmsyndrom?","a":"Funktionelle Darmerkrankung ohne organisches Korrelat: chronische/wiederkehrende Bauchschmerzen mit <b>Stuhlunregelmäßigkeiten</b> (Diarrhö/Obstipation/Wechsel), Blähungen, Besserung nach Stuhlgang. <b>Ausschlussdiagnose</b> – Alarmsymptome (Blut, Gewichtsverlust, Anämie, Nachtsymptome) müssen fehlen.","id":"k0150"},{"cat":"gastro","topic":"Kolorektales Karzinom","freq":60,"type":"qa","q":"Nenne Risikofaktoren, Warnsymptome und Früherkennung des kolorektalen Karzinoms.","a":"<b>Risiko:</b> Alter, familiäre Belastung, Adenome/Polypen, CED (v. a. Colitis ulcerosa), ballaststoffarme/fleischreiche Ernährung.<br><b>Warnsymptome:</b> Blut im Stuhl, Änderung der Stuhlgewohnheiten, „Bleistiftstuhl“, Anämie, Gewichtsverlust.<br><b>Früherkennung:</b> Test auf okkultes Blut (iFOBT), <b>Koloskopie</b>.","id":"k0151"},{"cat":"gastro","topic":"Leberzirrhose","freq":2,"type":"qa","q":"Nenne Ursachen und Zeichen der Leberzirrhose.","a":"<b>Ursachen:</b> Alkohol, chronische Virushepatitis B/C, Fettleber (NASH).<br><b>Leberhautzeichen:</b> Spider naevi, Palmarerythem, Caput medusae, Weißnägel, Lackzunge, Gynäkomastie.<br><b>Folgen (Dekompensation):</b> portale Hypertension, Ösophagusvarizen, Aszites, hepatische Enzephalopathie, Ikterus, Gerinnungsstörung.","id":"k0152"},{"cat":"gastro","topic":"Pankreatitis","freq":14,"type":"qa","q":"Nenne Ursachen und Leitsymptome der akuten Pankreatitis.","a":"<b>Hauptursachen:</b> Gallensteine und Alkohol.<br><b>Leitsymptome:</b> heftiger <b>gürtelförmiger</b> Oberbauchschmerz mit Ausstrahlung in den Rücken, Übelkeit/Erbrechen, Meteorismus („Gummibauch“).<br><b>Labor:</b> Lipase und Amylase ↑. Komplikationen: Nekrose, Schock, Pseudozysten.","id":"k0153"},{"cat":"gastro","topic":"Cholelithiasis","freq":2,"type":"qa","q":"Beschreibe die Gallenkolik und die 6-F-Risikofaktoren.","a":"<b>Gallenkolik:</b> krampfartige Schmerzen im re. Oberbauch (Ausstrahlung Rücken/re. Schulter), oft nach fettem Essen, Übelkeit.<br><b>6 F</b> (Risikofaktoren Gallensteine): female, fair, fat, forty, fertile, family.","id":"k0154"},{"cat":"niere","topic":"Harnwegsinfekt","freq":8,"type":"qa","q":"Nenne Erreger und Symptome eines unteren Harnwegsinfekts (Zystitis).","a":"<b>Häufigster Erreger:</b> E. coli. Symptome: <b>Dysurie/Algurie</b> (Brennen), <b>Pollakisurie</b> (häufiges Wasserlassen kleiner Mengen), imperativer Harndrang, suprapubische Schmerzen, trüber Urin. Aufsteigend → Pyelonephritis (Fieber, Flankenschmerz).","id":"k0155"},{"cat":"niere","topic":"Miktionsstörungen","freq":8,"type":"qa","q":"Definiere Anurie, Oligurie, Polyurie, Dysurie, Pollakisurie und Nykturie.","a":"<b>Anurie:</b> <100 ml/Tag · <b>Oligurie:</b> <500 ml/Tag · <b>Polyurie:</b> >2,5–3 l/Tag · <b>Dysurie:</b> schmerzhaftes/erschwertes Wasserlassen · <b>Pollakisurie:</b> häufiges Wasserlassen kleiner Mengen · <b>Nykturie:</b> nächtliches Wasserlassen.","id":"k0156"},{"cat":"niere","topic":"Nierenversagen","freq":8,"type":"qa","q":"Nenne die Ursachengruppen des akuten Nierenversagens.","a":"<b>Prärenal</b> (Minderdurchblutung: Schock, Exsikkose, Herzinsuffizienz), <b>intrarenal/renal</b> (Nierengewebe geschädigt: Glomerulonephritis, toxisch, Tubulusnekrose) und <b>postrenal</b> (Abflussstörung: Steine, Tumor, Prostata). Leitzeichen: Oligurie/Anurie, Retentionswerte ↑, Elektrolytentgleisung.","id":"k0157"},{"cat":"niere","topic":"Nephrotisches Syndrom","freq":8,"type":"qa","q":"Was kennzeichnet das nephrotische Syndrom?","a":"Tetrade: große <b>Proteinurie</b> (>3,5 g/Tag), <b>Hypoproteinämie/Hypalbuminämie</b>, <b>Ödeme</b> (v. a. Lider), <b>Hyperlipidämie</b>. Folge glomerulärer Schädigung. Abzugrenzen vom nephritischen Syndrom (Hämaturie, Hypertonie, Nierenfunktion ↓).","id":"k0158"},{"cat":"niere","topic":"Nephrolithiasis","freq":8,"type":"qa","q":"Beschreibe die Nierenkolik.","a":"Heftige, <b>wellenförmige (kolikartige) Flankenschmerzen</b> mit Ausstrahlung in Unterbauch/Leiste/Genitale, Bewegungsdrang (Unruhe), Übelkeit, ggf. Hämaturie. Ursache: Harnstein mit Abflussbehinderung. Gefahr: Harnstau + Infektion (Urosepsis).","id":"k0159"},{"cat":"endo","topic":"Diabetes mellitus","freq":126,"type":"qa","q":"Unterscheide Diabetes mellitus Typ 1 und Typ 2.","a":"<b>Typ 1:</b> autoimmune Zerstörung der β-Zellen → <b>absoluter Insulinmangel</b>, meist jung/schlank, rascher Beginn, Insulinpflicht.<br><b>Typ 2:</b> <b>Insulinresistenz</b> + relativer Mangel, meist ältere Menschen/übergewichtig, langsamer Beginn, metabolisches Syndrom. Häufigste Form (~90 %).","id":"k0160"},{"cat":"endo","topic":"Diabetes mellitus","freq":126,"type":"qa","q":"Nenne die klassischen Symptome eines entgleisten Diabetes und die Akutkomplikationen.","a":"<b>Symptome:</b> Polyurie, Polydipsie, Gewichtsverlust, Müdigkeit, Infektanfälligkeit, Sehstörungen.<br><b>Akutkomplikationen:</b> <b>Hypoglykämie</b> (Heißhunger, Schweiß, Tremor, Verwirrtheit → Koma), <b>diabetische Ketoazidose</b> (Typ 1: Kußmaul-Atmung, Azetongeruch), <b>hyperosmolares Koma</b> (Typ 2).","id":"k0161"},{"cat":"endo","topic":"Diabetes mellitus","freq":126,"type":"qa","q":"Nenne die Spätkomplikationen des Diabetes mellitus.","a":"<b>Makroangiopathie:</b> KHK/Herzinfarkt, Schlaganfall, pAVK.<br><b>Mikroangiopathie:</b> Retinopathie (Erblindung), Nephropathie (Niereninsuffizienz), Neuropathie (Polyneuropathie, diabet. Fuß).<br>Weiter: schlechte Wundheilung, Infektanfälligkeit.","id":"k0162"},{"cat":"endo","topic":"Hypoglykämie","freq":126,"type":"qa","q":"Wie erkennt und behandelt man eine Hypoglykämie beim wachen Patienten?","a":"<b>Zeichen:</b> Heißhunger, Schwitzen, Zittern, Tachykardie, Blässe, Unruhe, Verwirrtheit, Aggressivität, Krampf/Bewusstlosigkeit.<br><b>Bei wachem Patienten:</b> schnell resorbierbare <b>Kohlenhydrate oral</b> (Traubenzucker, Saft). Bei Bewusstlosigkeit: nichts oral geben → Notruf (Glukose i.v. / Glukagon durch Rettungsdienst).","id":"k0163"},{"cat":"endo","topic":"Hyperthyreose","freq":8,"type":"qa","q":"Nenne Ursachen und Symptome der Hyperthyreose.","a":"<b>Ursachen:</b> Morbus Basedow (Autoimmun, TRAK-Antikörper), Schilddrüsenautonomie.<br><b>Symptome:</b> Gewichtsverlust trotz Heißhunger, Tachykardie/Herzrasen, Unruhe/Nervosität, Wärmeintoleranz/Schwitzen, Durchfall, Tremor, warme feuchte Haut. Bei Basedow: <b>Merseburger Trias</b> – Struma, Tachykardie, Exophthalmus.","id":"k0164"},{"cat":"endo","topic":"Hypothyreose","freq":8,"type":"qa","q":"Nenne Ursachen und Symptome der Hypothyreose.","a":"<b>Ursache:</b> häufig <b>Hashimoto-Thyreoiditis</b> (Autoimmun), Jodmangel, nach OP/Radiojod.<br><b>Symptome:</b> Gewichtszunahme, Kälteintoleranz, Müdigkeit/Antriebslosigkeit, Obstipation, Bradykardie, trockene Haut, Haarausfall, <b>Myxödem</b>, Verlangsamung. Labor: TSH ↑, fT4 ↓.","id":"k0165"},{"cat":"endo","topic":"Metabolisches Syndrom","freq":126,"type":"qa","q":"Welche Komponenten gehören zum metabolischen Syndrom („tödliches Quartett“)?","a":"1. <b>Stammbetonte Adipositas</b> (Bauchumfang ↑), 2. <b>Hypertonie</b>, 3. <b>gestörter Glukosestoffwechsel/Insulinresistenz</b>, 4. <b>Dyslipidämie</b> (Triglyzeride ↑, HDL ↓). Erhöht das Risiko für Diabetes Typ 2 und kardiovaskuläre Erkrankungen erheblich.","id":"k0166"},{"cat":"endo","topic":"Gicht","freq":5,"type":"qa","q":"Beschreibe die Gicht (Hyperurikämie).","a":"Ablagerung von <b>Harnsäurekristallen</b> bei erhöhtem Harnsäurespiegel.<br><b>Akuter Gichtanfall:</b> plötzlich, meist nachts, hochschmerzhafte Monarthritis, klassisch am <b>Großzehengrundgelenk (Podagra)</b>, gerötet/überwärmt/geschwollen, oft nach üppigem Essen/Alkohol. Chronisch: Tophi, Uratnephropathie.","id":"k0167"},{"cat":"endo","topic":"Cushing-Syndrom","freq":5,"type":"qa","q":"Nenne die typischen Symptome des Cushing-Syndroms.","a":"Folge von <b>Glukokortikoid-Überschuss</b> (endogen oder durch Kortisontherapie): <b>Stammfettsucht</b>, <b>Vollmondgesicht</b>, Stiernacken, rote Striae, Hautatrophie, Muskelabbau, Osteoporose, Hypertonie, Diabetes, Infektanfälligkeit, psychische Veränderungen.","id":"k0168"},{"cat":"haema","topic":"Anämie","freq":28,"type":"qa","q":"Wie werden Anämien nach Erythrozytenindices eingeteilt (mit Beispiel)?","a":"<b>Mikrozytär-hypochrom</b> (MCV/MCH ↓): Eisenmangelanämie (häufigste!), Thalassämie.<br><b>Normozytär-normochrom:</b> akute Blutung, renale/hämolytische Anämie, Anämie chronischer Erkrankung.<br><b>Makrozytär-hyperchrom</b> (MCV ↑): <b>Vitamin-B12-</b> oder Folsäuremangel (megaloblastär, perniziöse Anämie).","id":"k0169"},{"cat":"haema","topic":"Anämie","freq":28,"type":"qa","q":"Nenne allgemeine Symptome einer Anämie.","a":"<b>Blässe</b> (Haut/Schleimhäute), Müdigkeit/Leistungsschwäche, Belastungsdyspnoe, Tachykardie, Schwindel, Kopfschmerzen, Ohrensausen. Bei Eisenmangel zusätzlich: Mundwinkelrhagaden, Nagelveränderungen (Koilonychie), Haarausfall.","id":"k0170"},{"cat":"haema","topic":"Perniziöse Anämie","freq":28,"type":"qa","q":"Was ist die Ursache der perniziösen Anämie?","a":"<b>Vitamin-B12-Mangel</b> durch fehlenden <b>Intrinsic Factor</b> (autoimmune Typ-A-Gastritis, Belegzell-Antikörper) → gestörte B12-Resorption im terminalen Ileum. Folge: megaloblastäre Anämie + <b>neurologische Symptome</b> (funikuläre Myelose).","id":"k0171"},{"cat":"haema","topic":"Leukämie","freq":5,"type":"qa","q":"Was ist eine Leukämie und welche Leitsymptome entstehen durch die Knochenmarkverdrängung?","a":"Maligne Erkrankung der weißen Blutzellen mit unkontrollierter Vermehrung → Verdrängung der normalen Blutbildung.<br><b>Folgen:</b> Anämie (Blässe, Müdigkeit), <b>Thrombopenie</b> (Blutungen, Petechien), <b>Granulozytopenie</b> (Infektanfälligkeit). Dazu B-Symptomatik, Lymphknoten-/Milzschwellung. Einteilung: akut/chronisch, myeloisch/lymphatisch.","id":"k0172"},{"cat":"haema","topic":"Hodgkin-Lymphom","freq":5,"type":"qa","q":"Was ist typisch für das Hodgkin-Lymphom?","a":"Malignes Lymphom mit <b>Sternberg-Reed-Riesenzellen</b>. Klinik: schmerzlose <b>Lymphknotenschwellung</b> (v. a. zervikal), <b>B-Symptomatik</b>, ggf. Alkoholschmerz der Lymphknoten, Juckreiz. Gute Prognose bei früher Diagnose.","id":"k0173"},{"cat":"haema","topic":"Allergie","freq":5,"type":"qa","q":"Nenne die vier Typen der Allergie nach Coombs & Gell.","a":"<b>Typ I</b> (Soforttyp, IgE): Anaphylaxie, Heuschnupfen, allerg. Asthma.<br><b>Typ II</b> (zytotoxisch, IgG/IgM): Transfusionsreaktion, Autoimmunhämolyse.<br><b>Typ III</b> (Immunkomplex): Serumkrankheit, allerg. Alveolitis.<br><b>Typ IV</b> (Spättyp, T-Zellen): Kontaktekzem, Tuberkulinreaktion, Transplantatabstoßung.","id":"k0174"},{"cat":"bewegung","topic":"Arthrose vs. Arthritis","freq":9,"type":"qa","q":"Wie unterscheiden sich Arthrose und (rheumatoide) Arthritis klinisch?","a":"<b>Arthrose (degenerativ):</b> <b>Anlaufschmerz</b>, Besserung bei Bewegung, Verschlechterung bei Belastung, keine Entzündungszeichen im Schub gering; ältere Menschen.<br><b>Rheumatoide Arthritis (entzündlich-autoimmun):</b> <b>Morgensteifigkeit</b> >30–60 min, symmetrischer Befall kleiner Gelenke, Ruheschmerz, Schwellung/Überwärmung, systemisch.","id":"k0175"},{"cat":"bewegung","topic":"Rheumatoide Arthritis","freq":20,"type":"qa","q":"Nenne typische Befunde der rheumatoiden Arthritis.","a":"<b>Symmetrischer</b> Befall der kleinen Finger-/Handgelenke (MCP, PIP), <b>Morgensteifigkeit</b>, Rheumaknoten, im Verlauf Deformitäten (Ulnardeviation, Schwanenhals-/Knopflochdeformität). Labor: <b>Rheumafaktor</b>, Anti-CCP-Antikörper, BSG/CRP ↑.","id":"k0176"},{"cat":"bewegung","topic":"Osteoporose","freq":5,"type":"qa","q":"Was ist Osteoporose und welche Risikofaktoren/Folgen gibt es?","a":"Systemische Skeletterkrankung mit verminderter Knochendichte → erhöhte Frakturgefahr.<br><b>Risiko:</b> weiblich/postmenopausal (Östrogenmangel), Alter, Bewegungsmangel, Kortison, Kalzium-/Vitamin-D-Mangel, Rauchen.<br><b>Folgen:</b> Wirbelkörperfrakturen (Rundrücken, Größenverlust), Schenkelhalsfraktur, Radiusfraktur.","id":"k0177"},{"cat":"bewegung","topic":"Bandscheibenvorfall","freq":5,"type":"qa","q":"Nenne Klinik und Warnzeichen eines Bandscheibenvorfalls.","a":"Vorfall von Bandscheibengewebe → Nervenwurzelkompression: <b>radikuläre Schmerzen</b> (dermatombezogen), Sensibilitätsstörungen, ggf. Paresen; lumbal (Ischialgie) am häufigsten.<br><b>Notfall (Kaudasyndrom):</b> Reithosenanästhesie, Blasen-/Mastdarmstörung, beidseitige Paresen → sofortige OP-Indikation!","id":"k0178"},{"cat":"bewegung","topic":"Morbus Bechterew","freq":5,"type":"qa","q":"Was kennzeichnet den Morbus Bechterew (Spondylitis ankylosans)?","a":"Chronisch-entzündliche Wirbelsäulenerkrankung (HLA-B27-assoziiert). Beginn: <b>tiefsitzender Rückenschmerz/Sakroiliitis</b>, nächtlich, <b>Morgensteifigkeit</b>, Besserung bei Bewegung. Verlauf: zunehmende Versteifung („Bambusstab-Wirbelsäule“), Kyphose.","id":"k0179"},{"cat":"neuro","topic":"Schlaganfall","freq":61,"type":"qa","q":"Unterscheide ischämischen und hämorrhagischen Schlaganfall und nenne Leitsymptome.","a":"<b>Ischämisch</b> (~85 %, Gefäßverschluss) vs. <b>hämorrhagisch</b> (Blutung).<br><b>Leitsymptome (plötzlich):</b> halbseitige Lähmung/Taubheit, Sprach-/Sprechstörung (Aphasie/Dysarthrie), Sehstörung, Schwindel, Gangunsicherheit, stärkster Kopfschmerz (bei Blutung). <b>FAST</b>: Face, Arms, Speech, Time – Notruf!","id":"k0180"},{"cat":"neuro","topic":"Schlaganfall","freq":61,"type":"qa","q":"Warum ist beim Schlaganfall die Zeit so entscheidend („Time is brain“)?","a":"Beim ischämischen Schlaganfall stirbt Hirngewebe pro Minute ab. Eine <b>Lysetherapie/Thrombektomie</b> ist nur in einem engen Zeitfenster (wenige Stunden) sinnvoll → sofortiger <b>Notruf 112</b> und Transport in eine Stroke Unit. Der HP muss sofort den Rettungsdienst alarmieren.","id":"k0181"},{"cat":"neuro","topic":"Multiple Sklerose","freq":33,"type":"qa","q":"Beschreibe Pathophysiologie und typische Symptome der Multiplen Sklerose.","a":"Chronisch-entzündliche <b>Entmarkungserkrankung</b> (Demyelinisierung) des ZNS, autoimmun; Herde „<b>zeitlich und örtlich verteilt</b>“.<br><b>Symptome:</b> Sehstörungen (Retrobulbärneuritis), Sensibilitätsstörungen, Paresen, Spastik, Ataxie, Blasenstörung, Fatigue. Verlauf meist schubförmig.","id":"k0182"},{"cat":"neuro","topic":"Parkinson","freq":15,"type":"qa","q":"Nenne die Kardinalsymptome des Parkinson-Syndroms.","a":"<b>Trias/Tetrade:</b> 1. <b>Rigor</b> (Muskelsteife, Zahnradphänomen), 2. <b>Tremor</b> (Ruhetremor, „Pillendrehen“), 3. <b>Akinese/Bradykinese</b> (Bewegungsarmut), 4. <b>posturale Instabilität</b>. Ursache: Dopaminmangel (Degeneration der Substantia nigra). Weitere Zeichen: kleinschrittiger Gang, Maskengesicht, Mikrographie.","id":"k0183"},{"cat":"neuro","topic":"Epilepsie","freq":2,"type":"qa","q":"Unterscheide fokale und generalisierte Anfälle; was ist der Status epilepticus?","a":"<b>Fokal:</b> umschriebener Herd, ggf. mit/ohne Bewusstseinsstörung.<br><b>Generalisiert:</b> beide Hemisphären, z. B. Grand-Mal (tonisch-klonisch) mit Bewusstlosigkeit, Sturz, Zungenbiss, Einnässen, postiktale Umdämmerung; Absencen.<br><b>Status epilepticus:</b> Anfall >5 min oder Serie ohne Erholung → <b>Notfall</b>.","id":"k0184"},{"cat":"neuro","topic":"Fazialisparese","freq":5,"type":"qa","q":"Wie unterscheidet man zentrale und periphere Fazialisparese?","a":"<b>Periphere Fazialisparese:</b> gesamte Gesichtshälfte betroffen, <b>Stirnrunzeln nicht möglich</b>, Lidschluss gestört (Bell-Phänomen).<br><b>Zentrale Fazialisparese</b> (z. B. Schlaganfall): <b>Stirn bleibt beweglich</b> (bilaterale Innervation), untere Gesichtshälfte betroffen.","id":"k0185"},{"cat":"neuro","topic":"Hirndruck","freq":5,"type":"qa","q":"Nenne die Zeichen eines erhöhten Hirndrucks.","a":"<b>Kopfschmerzen</b> (v. a. morgens), <b>Nüchternerbrechen</b> (schwallartig, ohne Übelkeit), Stauungspapille, Bewusstseinsstörung, Pupillendifferenz. Cushing-Reflex: <b>Blutdruck ↑ + Bradykardie</b>. Gefahr: Einklemmung (Herniation) → lebensbedrohlich.","id":"k0186"},{"cat":"derma","topic":"Effloreszenzen","freq":5,"type":"qa","q":"Definiere Primäreffloreszenzen: Macula, Papula, Vesicula, Pustula, Urtica.","a":"<b>Macula</b> (Fleck): umschriebene Farbänderung, nicht tastbar.<br><b>Papula</b> (Knötchen): erhabene, tastbare Verdickung <5 mm.<br><b>Vesicula</b> (Bläschen): mit seröser Flüssigkeit.<br><b>Pustula:</b> mit Eiter gefüllt.<br><b>Urtica</b> (Quaddel): flüchtige ödematöse Erhabenheit (Nesselsucht).","id":"k0187"},{"cat":"derma","topic":"Malignes Melanom","freq":5,"type":"qa","q":"Nach welcher Regel beurteilt man verdächtige Pigmentmale (Melanom)?","a":"<b>ABCDE-Regel:</b><br><b>A</b>symmetrie · <b>B</b>egrenzung (unregelmäßig) · <b>C</b>olour (mehrfarbig) · <b>D</b>urchmesser (>5 mm) · <b>E</b>volution/Erhabenheit (Veränderung). Das maligne Melanom ist hochmaligne und metastasiert früh (lymphogen + hämatogen).","id":"k0188"},{"cat":"derma","topic":"Psoriasis","freq":5,"type":"qa","q":"Was ist typisch für die Psoriasis (Schuppenflechte)?","a":"Chronisch-entzündliche Hauterkrankung mit scharf begrenzten, geröteten Plaques und <b>silbrig-weißer Schuppung</b>, bevorzugt an Streckseiten (Ellenbogen, Knie), Kopfhaut, Sakralregion. Psoriasis-Phänomene: Kerzenwachs, letztes Häutchen, blutiger Tau (Auspitz). Nagelbefall (Tüpfel-/Ölnägel), ggf. Arthritis.","id":"k0189"},{"cat":"psych","topic":"Psychopathologischer Befund","freq":14,"type":"qa","q":"Welche Bereiche werden im psychopathologischen Befund erhoben?","a":"<b>Bewusstsein</b>, <b>Orientierung</b> (zeitlich/örtlich/situativ/zur Person), <b>Aufmerksamkeit/Gedächtnis</b>, <b>formales Denken</b> (Tempo, Zusammenhang), <b>inhaltliches Denken</b> (Wahn, Zwang), <b>Wahrnehmung</b> (Halluzinationen), <b>Ich-Störungen</b>, <b>Affekt/Stimmung</b>, <b>Antrieb</b>, Suizidalität.","id":"k0190"},{"cat":"psych","topic":"Bewusstseinsstörungen","freq":14,"type":"qa","q":"Unterscheide quantitative und qualitative Bewusstseinsstörungen.","a":"<b>Quantitativ</b> (Vigilanz): Benommenheit → Somnolenz → Sopor → Koma.<br><b>Qualitativ</b> (Bewusstseinsinhalt): Bewusstseinstrübung, -einengung, -verschiebung (z. B. bei Delir, Dämmerzustand).","id":"k0191"},{"cat":"psych","topic":"Depression","freq":9,"type":"qa","q":"Nenne die Haupt- und Zusatzsymptome einer depressiven Episode (ICD-10).","a":"<b>Hauptsymptome:</b> gedrückte Stimmung, Interessen-/Freudlosigkeit (Anhedonie), Antriebsminderung.<br><b>Zusatzsymptome:</b> verminderte Konzentration, geringes Selbstwertgefühl, Schuldgefühle, negative Zukunftssicht, <b>Suizidgedanken</b>, Schlafstörungen, verminderter Appetit. Diagnose ab ≥2 Wochen.","id":"k0192"},{"cat":"psych","topic":"Schizophrenie","freq":14,"type":"qa","q":"Unterscheide Positiv- und Negativsymptomatik der Schizophrenie.","a":"<b>Positivsymptome (Plussymptome):</b> Wahn, <b>Halluzinationen</b> (v. a. akustisch/Stimmenhören), Ich-Störungen (Gedankeneingebung/-entzug/-ausbreitung), Denkzerfahrenheit.<br><b>Negativsymptome (Minussymptome):</b> Affektverflachung, Antriebsmangel, sozialer Rückzug, Sprachverarmung (Alogie), Anhedonie.","id":"k0193"},{"cat":"psych","topic":"Manie","freq":5,"type":"qa","q":"Nenne die Leitsymptome einer manischen Episode.","a":"Gehobene/gereizte <b>Stimmung</b>, <b>Antriebssteigerung</b>, vermindertes Schlafbedürfnis, Rededrang/Ideenflucht, Größenideen, Distanzlosigkeit, wahllose Aktivität mit riskantem Verhalten (Geldausgeben, Sexualität), verminderte Krankheitseinsicht. Bei Wechsel mit Depression: <b>bipolare Störung</b>.","id":"k0194"},{"cat":"psych","topic":"Angststörungen","freq":5,"type":"qa","q":"Unterscheide Panikstörung, generalisierte Angststörung und Phobien.","a":"<b>Panikstörung:</b> plötzliche, unerwartete Angstattacken mit vegetativen Symptomen (Herzrasen, Atemnot, Todesangst).<br><b>Generalisierte Angststörung:</b> anhaltende, frei flottierende Sorgen/Ängste (>6 Monate).<br><b>Phobien:</b> Angst vor spezifischen Objekten/Situationen (Agora-, Sozial-, spezifische Phobie) mit Vermeidungsverhalten.","id":"k0195"},{"cat":"psych","topic":"Essstörungen","freq":18,"type":"qa","q":"Unterscheide Anorexia nervosa und Bulimia nervosa.","a":"<b>Anorexia nervosa:</b> selbst herbeigeführtes <b>Untergewicht</b> (BMI <17,5), Körperschema­störung, Angst vor Gewichtszunahme, Amenorrhö.<br><b>Bulimia nervosa:</b> meist <b>normalgewichtig</b>, Heißhungeranfälle mit anschließendem Erbrechen/Laxanzien, Kontrollverlust. Folgen: Elektrolytstörungen, Zahnschäden, Speicheldrüsenschwellung.","id":"k0196"},{"cat":"psych","topic":"Demenz","freq":5,"type":"qa","q":"Was kennzeichnet eine Demenz und wie grenzt man sie vom Delir ab?","a":"<b>Demenz:</b> chronische, fortschreitende Störung von <b>Gedächtnis</b> und weiteren kognitiven Funktionen bei <b>klarem Bewusstsein</b>, >6 Monate (z. B. Alzheimer).<br><b>Delir:</b> <b>akut</b>, fluktuierend, mit <b>Bewusstseins-/Aufmerksamkeitsstörung</b>, oft mit Ursache (Infekt, Medikamente, Entzug) → potenziell reversibel.","id":"k0197"},{"cat":"psych","topic":"Suizidalität","freq":5,"type":"qa","q":"Welche Faktoren erhöhen das Suizidrisiko und wie geht man damit um?","a":"<b>Risikofaktoren:</b> frühere Versuche, konkrete Pläne, Depression/psychische Erkrankung, Suchterkrankung, soziale Isolation, hohes Alter, männliches Geschlecht, chronische Krankheit.<br><b>Umgang:</b> Suizidalität <b>offen und direkt ansprechen</b> (erhöht das Risiko nicht!), ernst nehmen, bei akuter Gefahr für sofortige fachärztliche/klinische Hilfe sorgen.","id":"k0198"},{"cat":"notfall","topic":"Reanimation","freq":45,"type":"qa","q":"Beschreibe den Ablauf der Basisreanimation (BLS) beim Erwachsenen.","a":"1. Bewusstsein/Atmung prüfen (max. 10 s).<br>2. Keine normale Atmung → <b>Notruf 112</b>, AED holen.<br>3. <b>Herzdruckmassage</b>: Mitte des Brustkorbs, Tiefe <b>5–6 cm</b>, Frequenz <b>100–120/min</b>.<br>4. Verhältnis <b>30:2</b> (Kompression : Beatmung).<br>5. AED sofort einsetzen, weiter bis Rettungsdienst übernimmt.","id":"k0199"},{"cat":"notfall","topic":"Schock","freq":27,"type":"qa","q":"Nenne die Schockformen mit Ursache.","a":"<b>Hypovolämisch</b> (Blut-/Flüssigkeitsverlust), <b>kardiogen</b> (Herzpumpversagen, z. B. Infarkt), <b>distributiv</b> (Verteilungsstörung: <b>anaphylaktisch</b>, <b>septisch</b>, neurogen), <b>obstruktiv</b> (Lungenembolie, Spannungspneumothorax, Perikardtamponade).","id":"k0200"},{"cat":"notfall","topic":"Schock","freq":27,"type":"qa","q":"Nenne die allgemeinen Schockzeichen und den Schockindex.","a":"<b>Zeichen:</b> Blässe, kalter Schweiß, Tachykardie, Blutdruckabfall, flache/schnelle Atmung, Unruhe/Bewusstseinstrübung, Oligurie, verlängerte Rekapillarisierungszeit.<br><b>Schockindex</b> = Puls ÷ systol. Blutdruck; <b>>1</b> spricht für einen manifesten Schock. Lagerung: <b>Schocklage</b> (Beine hoch) – außer bei kardiogenem Schock/Dyspnoe.","id":"k0201"},{"cat":"notfall","topic":"Anaphylaxie","freq":27,"type":"qa","q":"Beschreibe die anaphylaktische Reaktion und die wichtigste Notfallmaßnahme.","a":"Allergische Sofortreaktion (Typ I): Haut (Urtikaria, Flush, Ödem), Atemwege (Bronchospasmus, Larynxödem), Kreislauf (Blutdruckabfall, Schock).<br><b>Wichtigste Maßnahme: Adrenalin i.m.</b> (Notfallmedikament), Notruf, Schocklage, ggf. Antihistaminika/Kortison. Bei Atemnot: sitzende Lagerung.","id":"k0202"},{"cat":"notfall","topic":"Lagerung","freq":5,"type":"qa","q":"Welche Lagerung ist bei welchem Notfall indiziert?","a":"<b>Schocklage</b> (Beine hoch): Volumenmangelschock.<br><b>Oberkörper hoch</b>: Atemnot, Herzinfarkt, Lungenödem.<br><b>Stabile Seitenlage</b>: Bewusstlose mit erhaltener Atmung.<br><b>Flach mit angezogenen Beinen</b>: akutes Abdomen.<br><b>Oberkörper hoch, Kopf gekühlt</b>: Schlaganfall.","id":"k0203"},{"cat":"notfall","topic":"Notfallmedikamente","freq":5,"type":"qa","q":"Nenne wichtige Notfallmedikamente und ihre Hauptindikation.","a":"<b>Adrenalin</b> (Anaphylaxie, Reanimation), <b>Nitro-Spray</b> (Angina pectoris), <b>Glukose</b> (Hypoglykämie), <b>Kortison/Antihistaminikum</b> (Allergie), <b>Salbutamol</b> (Asthmaanfall), <b>Diazepam</b> (Krampfanfall). Wichtig: HP-rechtliche Grenzen und Notkompetenz (§34 StGB) beachten.","id":"k0204"},{"cat":"notfall","topic":"Rettungskette","freq":45,"type":"qa","q":"Nenne die Glieder der Rettungskette.","a":"1. <b>Sofortmaßnahmen</b> (Absichern, Eigenschutz, lebensrettende Handgriffe).<br>2. <b>Notruf</b> 112.<br>3. <b>Erste Hilfe</b> (durch Laien/HP).<br>4. <b>Rettungsdienst</b>.<br>5. <b>Krankenhaus</b>. Beim Notruf: die 5 W – Wo, Was, Wie viele, Welche Verletzungen, Warten auf Rückfragen.","id":"k0205"},{"cat":"ifsg","topic":"§7 IfSG","freq":5,"type":"qa","q":"Nenne wichtige Erreger, die nach §7 IfSG namentlich gemeldet werden (Auswahl).","a":"Masern-, Mumps-, Rubella-, VZV-, Hepatitis-A–E-, Influenza- (zoonotisch), SARS-CoV-2-, Poliovirus; Bordetella pertussis, Corynebacterium diphtheriae, Neisseria meningitidis (steril), Mycobacterium tuberculosis, Salmonella, Shigella, Campylobacter, EHEC, Vibrio cholerae, Legionella, Borrelia recurrentis, Leptospira, Brucella, Coxiella, FSME-Virus u. v. m.","id":"k0206"},{"cat":"ifsg","topic":"§7 nichtnamentlich","freq":5,"type":"cloze","q":"Nichtnamentlich (ans RKI) meldepflichtige Erreger nach §7 Abs. 3: HIV, Treponema pallidum, ___, Echinococcus, Plasmodium.","a":"<b>Toxoplasma gondii</b> (nur bei konnatalen Infektionen). Merke: <b>„HELP-T“</b> – HIV, Echinococcus, Lues (Treponema), Plasmodium, Toxoplasma.","id":"k0207"},{"cat":"infekt","topic":"Erregerarten","freq":5,"type":"qa","q":"Was unterscheidet grampositive von gramnegativen Bakterien?","a":"Unterschied im Zellwandaufbau (Gram-Färbung): <b>grampositiv</b> = dicke Mureinschicht, färben sich <b>blau/violett</b> (z. B. Staphylo-, Streptokokken). <b>Gramnegativ</b> = dünne Mureinschicht + äußere Membran, färben sich <b>rot</b> (z. B. E. coli, Salmonellen, Neisserien).","id":"k0208"},{"cat":"infekt","topic":"Erregerarten","freq":5,"type":"qa","q":"Was sind Zoonosen? Nenne Beispiele.","a":"Infektionskrankheiten, die zwischen <b>Tier und Mensch</b> übertragbar sind. Beispiele: Tollwut, Toxoplasmose, Borreliose, FSME, Brucellose, Leptospirose, Q-Fieber, Ornithose, Tularämie, Salmonellose, Echinokokkose, Pest, Milzbrand.","id":"k0209"},{"cat":"infekt","topic":"Nosokomiale Infektion","freq":5,"type":"qa","q":"Was ist eine nosokomiale Infektion und welche Erreger sind typisch?","a":"Im Zusammenhang mit medizinischer Behandlung/Krankenhausaufenthalt erworbene Infektion (frühestens 48 h nach Aufnahme). Typische Erreger: <b>MRSA</b>, Pseudomonas aeruginosa, Clostridioides difficile, Klebsiellen, E. coli. Häufig: Wundinfektionen, Harnwegs-, Atemwegsinfekte, Katheter-Sepsis.","id":"k0210"},{"cat":"infekt","topic":"Röteln","freq":17,"type":"qa","q":"Warum sind Röteln in der Schwangerschaft besonders gefährlich?","a":"Der Erreger (Rubellavirus) ist <b>diaplazentar</b> übertragbar → <b>Rötelnembryopathie (Gregg-Syndrom)</b>, v. a. im 1. Trimenon: Trias aus <b>Herzfehler, Katarakt (Auge) und Innenohrschwerhörigkeit</b>. Deshalb Impfung vor geplanter Schwangerschaft wichtig.","id":"k0211"},{"cat":"infekt","topic":"Dreitagefieber","freq":5,"type":"qa","q":"Was ist typisch für das Dreitagefieber (Exanthema subitum)?","a":"Erreger: Humanes Herpesvirus 6. Verlauf: 3 Tage <b>hohes Fieber</b>, dann Entfieberung und <b>erst danach</b> ein blassrotes Exanthem am Rumpf. Kinder fühlen sich trotz Fieber meist wohl. Komplikation: Fieberkrampf.","id":"k0212"},{"cat":"infekt","topic":"Hand-Fuß-Mund","freq":5,"type":"qa","q":"Beschreibe die Hand-Fuß-Mund-Krankheit.","a":"Erreger: Coxsackieviren (Enteroviren). Bläschen an <b>Handinnenflächen, Fußsohlen und im Mund</b> (schmerzhafte Enantheme), leichtes Fieber. Meist harmlos, hoch ansteckend (fäkal-oral/Tröpfchen). Nicht mit Maul-und-Klauenseuche der Tiere verwechseln.","id":"k0213"},{"cat":"infekt","topic":"Skabies","freq":5,"type":"qa","q":"Beschreibe die Skabies (Krätze).","a":"Erreger: <b>Krätzmilbe</b> (Sarcoptes scabiei), gräbt Gänge in die Haut. Leitsymptom: <b>starker nächtlicher Juckreiz</b>, Milbengänge/Papeln v. a. Interdigitalfalten, Handgelenke, Genital. Übertragung durch engen Hautkontakt. §34 IfSG (Gemeinschaftseinrichtungen).","id":"k0214"},{"cat":"infekt","topic":"Impetigo contagiosa","freq":5,"type":"qa","q":"Was ist die Impetigo contagiosa (Grindflechte)?","a":"Hochansteckende bakterielle Hautinfektion (Streptokokken/Staphylokokken) v. a. bei Kindern. <b>Honiggelbe Krusten</b> auf gerötetem Grund, perioral/nasal. Schmierinfektion. §34 IfSG; Therapie antibiotisch/antiseptisch.","id":"k0215"},{"cat":"infekt","topic":"Mpox","freq":5,"type":"qa","q":"Was sind Mpox (Affenpocken)?","a":"Durch Orthopockenviren verursachte Zoonose; Übertragung durch engen (Haut-)Kontakt. Klinik: Fieber, Lymphknotenschwellung, dann charakteristisches <b>Bläschen-/Pustel-Exanthem</b> (alle in gleichem Stadium). Namentlich meldepflichtig (§6/§7).","id":"k0216"},{"cat":"infekt","topic":"Cholera","freq":2,"type":"qa","q":"Beschreibe die Cholera.","a":"Erreger: Vibrio cholerae (Toxin), fäkal-oral über verunreinigtes Wasser. Leitsymptom: massive, wässrige <b>„Reiswasserstühle“</b> → schwerste Dehydratation, Exsikkose, Kreislaufversagen. Wichtigste Therapie: Flüssigkeits-/Elektrolytersatz. §6/§7 meldepflichtig, HP-Behandlungsverbot.","id":"k0217"},{"cat":"infekt","topic":"Typhus","freq":2,"type":"qa","q":"Beschreibe den Typhus abdominalis.","a":"Erreger: Salmonella Typhi. Verlauf: treppenförmiger <b>Fieberanstieg</b>, Kopfschmerz, <b>Bradykardie trotz Fieber</b>, Roseolen (Bauch), zunächst Obstipation, später <b>erbsbreiartige Durchfälle</b>, Benommenheit („Typhus = Nebel“). Komplikation: Darmblutung/-perforation. §6/§7.","id":"k0218"},{"cat":"infekt","topic":"EHEC/HUS","freq":5,"type":"qa","q":"Was ist das HUS und womit hängt es zusammen?","a":"<b>Hämolytisch-urämisches Syndrom</b>: Trias aus <b>hämolytischer Anämie, Thrombozytopenie und akutem Nierenversagen</b>. Häufige Ursache: EHEC-Infektion (enterohämorrhagische E. coli, blutige Durchfälle), v. a. bei Kindern. Enteropathisches HUS ist §6-meldepflichtig.","id":"k0219"},{"cat":"infekt","topic":"Amöbiasis","freq":2,"type":"qa","q":"Beschreibe die Amöbenruhr.","a":"Erreger: Entamoeba histolytica, fäkal-oral (Tropen). Klinik: <b>himbeergeleeartige, blutig-schleimige Durchfälle</b>, krampfartige Bauchschmerzen. Komplikation: Amöbenleberabszess. Abzugrenzen von der bakteriellen Ruhr (Shigellose).","id":"k0220"},{"cat":"infekt","topic":"Campylobacter","freq":5,"type":"qa","q":"Was ist typisch für die Campylobacter-Enteritis?","a":"Häufigste bakterielle Durchfallerkrankung; Übertragung über <b>Geflügel/Rohmilch</b>. Klinik: Fieber, krampfartige Bauchschmerzen, wässrig-blutige Durchfälle. Seltene Folge: <b>Guillain-Barré-Syndrom</b>. Erregernachweis §7-meldepflichtig.","id":"k0221"},{"cat":"infekt","topic":"Lebensmittelvergiftung","freq":5,"type":"qa","q":"Wodurch unterscheidet sich eine Lebensmittelvergiftung durch Toxine von einer Infektion?","a":"Bei einer <b>Intoxikation</b> (z. B. Staphylokokken-Enterotoxin) sind bereits <b>vorgebildete Gifte</b> in der Nahrung → sehr kurze IZ (1–6 h), heftiges Erbrechen, kein/wenig Fieber. Bei einer Infektion vermehren sich die Erreger erst im Körper → längere IZ, oft Fieber.","id":"k0222"},{"cat":"infekt","topic":"Legionellose","freq":17,"type":"qa","q":"Beschreibe die Legionellose.","a":"Erreger: Legionella pneumophila; Übertragung durch <b>Aerosole aus warmem Wasser</b> (Duschen, Klimaanlagen) – <b>nicht</b> von Mensch zu Mensch. Klinik: schwere atypische Pneumonie mit hohem Fieber, ggf. Diarrhö/Verwirrtheit. Milde Form: Pontiac-Fieber.","id":"k0223"},{"cat":"infekt","topic":"Q-Fieber","freq":2,"type":"qa","q":"Was ist das Q-Fieber?","a":"Erreger: Coxiella burnetii (Zoonose, v. a. Schafe/Ziegen), Übertragung durch <b>Aerosole/Staub</b>. Klinik: grippeähnlich mit hohem Fieber, atypische Pneumonie, Hepatitis. Erregernachweis §7-meldepflichtig.","id":"k0224"},{"cat":"infekt","topic":"Ornithose","freq":2,"type":"qa","q":"Was ist die Ornithose (Papageienkrankheit)?","a":"Erreger: Chlamydia psittaci; Übertragung durch <b>Vögel</b> (Papageien, Tauben) via Kot-Staub. Klinik: atypische Pneumonie mit Fieber, Kopfschmerz, trockenem Husten. Zoonose, §7-meldepflichtig.","id":"k0225"},{"cat":"infekt","topic":"Tularämie","freq":2,"type":"qa","q":"Was ist die Tularämie (Hasenpest)?","a":"Erreger: Francisella tularensis (Zoonose, Nagetiere/Hasen). Übertragung durch Kontakt, Zeckenstich, Aerosole. Klinik: Fieber, ulzeröse Hautläsion, regionale Lymphknotenschwellung. Sehr infektiös. §7-meldepflichtig.","id":"k0226"},{"cat":"infekt","topic":"RSV","freq":5,"type":"qa","q":"Warum ist das RS-Virus besonders für Säuglinge gefährlich?","a":"RSV verursacht bei Säuglingen/Kleinkindern <b>Bronchiolitis</b> (Entzündung der kleinsten Atemwege) mit Atemnot, Giemen, Trinkschwäche und Apnoegefahr. Häufigster Grund für Atemwegs-Krankenhausaufnahmen im 1. Lebensjahr. §7-meldepflichtig.","id":"k0227"},{"cat":"infekt","topic":"Malaria","freq":5,"type":"qa","q":"Beschreibe Erreger, Übertragung und Leitsymptom der Malaria.","a":"Erreger: <b>Plasmodien</b> (Protozoen), Übertragung durch die <b>Anopheles-Mücke</b> (Tropen). Leitsymptom: <b>rhythmische Fieberschübe</b> (Malaria tertiana/quartana) bzw. unregelmäßiges Fieber bei der gefährlichen <b>Malaria tropica</b> (P. falciparum). Erregernachweis nichtnamentlich ans RKI.","id":"k0228"},{"cat":"infekt","topic":"Toxoplasmose","freq":2,"type":"qa","q":"Warum ist Toxoplasmose in der Schwangerschaft relevant?","a":"Erreger: Toxoplasma gondii (Katzenkot, rohes Fleisch). Beim Gesunden meist symptomlos. In der Schwangerschaft (Erstinfektion) diaplazentare Übertragung → <b>konnatale Toxoplasmose</b> (Hydrozephalus, Verkalkungen, Chorioretinitis). Konnatale Fälle nichtnamentlich meldepflichtig.","id":"k0229"},{"cat":"infekt","topic":"Milzbrand","freq":2,"type":"qa","q":"Beschreibe den Milzbrand (Anthrax).","a":"Erreger: Bacillus anthracis (Sporenbildner, Zoonose). Formen: <b>Hautmilzbrand</b> (schwarzes Ulkus/Pustula maligna), Lungenmilzbrand (schwer, Aerosole), Darmmilzbrand. Hoch gefährlich, §6/§7 meldepflichtig.","id":"k0230"},{"cat":"infekt","topic":"Pest","freq":2,"type":"qa","q":"Beschreibe die Pest.","a":"Erreger: Yersinia pestis; Übertragung durch <b>Rattenfloh</b> (Beulenpest) oder Tröpfchen (Lungenpest). Beulenpest: schmerzhafte Lymphknotenschwellung (Bubonen), hohes Fieber. Lungenpest: hochkontagiös, tödlich. §6/§7 meldepflichtig.","id":"k0231"},{"cat":"infekt","topic":"Gonorrhö","freq":2,"type":"qa","q":"Beschreibe die Gonorrhö (Tripper).","a":"Erreger: Neisseria gonorrhoeae (sexuell). Klinik: eitriger urethraler Ausfluss, Dysurie; bei Frauen oft symptomarm → Aszension (Adnexitis, Sterilität). Komplikation beim Neugeborenen: <b>Ophthalmia neonatorum</b> (Augeninfektion bei Geburt).","id":"k0232"},{"cat":"infekt","topic":"Chlamydien","freq":5,"type":"qa","q":"Warum sind genitale Chlamydieninfektionen besonders tückisch?","a":"Chlamydia trachomatis verläuft oft <b>symptomarm/asymptomatisch</b>, führt aber unbehandelt zu aufsteigenden Infektionen (Adnexitis, Epididymitis) und ist eine häufige Ursache für <b>Unfruchtbarkeit</b>. Häufigste sexuell übertragbare bakterielle Infektion.","id":"k0233"},{"cat":"infekt","topic":"Candidose","freq":16,"type":"qa","q":"Was ist eine Candidose und wann tritt sie gehäuft auf?","a":"Pilzinfektion durch <b>Candida albicans</b>. Formen: Mundsoor (weiße abwischbare Beläge), Windeldermatitis, Vaginalmykose, Ösophagitis. Gehäuft bei <b>Immunschwäche</b>, Diabetes, nach Antibiotika, bei Säuglingen/älteren Menschen. Bei HIV: Hinweis auf fortgeschrittene Immundefizienz.","id":"k0234"},{"cat":"infekt","topic":"Herpes simplex","freq":5,"type":"qa","q":"Unterscheide HSV-1 und HSV-2.","a":"<b>HSV-1:</b> meist Herpes labialis (Lippenbläschen), oral. <b>HSV-2:</b> meist Herpes genitalis. Beide persistieren lebenslang in Nervenganglien und reaktivieren bei Stress/Immunschwäche. Gefährlich: Herpes-Enzephalitis, Herpes neonatorum, Keratitis (Auge).","id":"k0235"},{"cat":"infekt","topic":"Zytomegalie","freq":2,"type":"qa","q":"Wann ist eine CMV-Infektion gefährlich?","a":"Zytomegalievirus (Herpesgruppe) – beim Gesunden meist harmlos. Gefährlich bei <b>Immunsupprimierten</b> (z. B. nach Transplantation, HIV: Retinitis, Pneumonie) und als <b>konnatale Infektion</b> (Schädigung von Gehör, Augen, Gehirn).","id":"k0236"},{"cat":"unters","topic":"Blutdruckmessung","freq":11,"type":"qa","q":"Wie wird der Blutdruck korrekt gemessen (Riva-Rocci) und was bedeuten die Werte?","a":"Manschette in Herzhöhe, aufpumpen über den zu erwartenden systolischen Wert, langsam ablassen. <b>1. Korotkoff-Ton = systolisch</b>, Verschwinden der Töne = <b>diastolisch</b>. Normal <120/80. Hypertonie ab ≥140/90 mmHg.","id":"k0237"},{"cat":"unters","topic":"Pulsstatus","freq":39,"type":"qa","q":"Welche peripheren Pulse werden zur Gefäßuntersuchung getastet?","a":"A. radialis, A. brachialis, A. carotis, A. femoralis, A. poplitea, A. tibialis posterior, A. dorsalis pedis. Beurteilt werden Frequenz, Rhythmus, Qualität und Seitengleichheit. Fehlende Fußpulse → Hinweis auf <b>pAVK</b>.","id":"k0238"},{"cat":"unters","topic":"Herzgeräusche","freq":48,"type":"qa","q":"Was unterscheidet systolische von diastolischen Herzgeräuschen?","a":"<b>Systolikum</b> (zwischen 1. und 2. Herzton): z. B. Aortenklappen<b>stenose</b>, Mitralklappen<b>insuffizienz</b>.<br><b>Diastolikum</b> (nach dem 2. Herzton): z. B. Aortenklappen<b>insuffizienz</b>, Mitralklappen<b>stenose</b>. Merke: „Stenose der Taschenklappen und Insuffizienz der Segelklappen = systolisch.“","id":"k0239"},{"cat":"unters","topic":"Schilddrüse","freq":8,"type":"qa","q":"Wie untersucht man die Schilddrüse?","a":"<b>Inspektion</b> (Schwellung, Schluckverschieblichkeit beim Schlucken), <b>Palpation</b> von hinten/vorne (Größe, Konsistenz, Knoten, Verschieblichkeit), <b>Auskultation</b> (Schwirren bei M. Basedow). Ergänzend: Sonografie, Labor (TSH).","id":"k0240"},{"cat":"unters","topic":"Lymphknotenstatus","freq":5,"type":"qa","q":"Welche Eigenschaften von Lymphknoten sprechen für Gutartigkeit bzw. Malignität?","a":"<b>Eher benigne/entzündlich:</b> weich, druckschmerzhaft, verschieblich, glatt.<br><b>Eher maligne:</b> derb/hart, indolent (schmerzlos), <b>nicht verschieblich</b> (mit Umgebung verbacken), höckrig. Tastregionen: zervikal, axillär, inguinal, supraklavikulär.","id":"k0241"},{"cat":"unters","topic":"Neurologie","freq":24,"type":"qa","q":"Wie prüft man die Koordination (Kleinhirnfunktion)?","a":"<b>Finger-Nase-Versuch</b> und <b>Knie-Hacke-Versuch</b> (Ataxie?), <b>Diadochokinese</b> (schnelle Wechselbewegungen), <b>Romberg-Stehversuch</b> (Standunsicherheit), Gangbild (Seiltänzergang). Auffälligkeiten deuten auf zerebelläre oder sensible Störungen.","id":"k0242"},{"cat":"unters","topic":"Sensibilität","freq":22,"type":"qa","q":"Welche Qualitäten werden bei der Sensibilitätsprüfung getestet?","a":"<b>Oberflächensensibilität:</b> Berührung, Schmerz (spitz/stumpf), Temperatur.<br><b>Tiefensensibilität:</b> Lagesinn, Vibration (Stimmgabel), Zwei-Punkt-Diskrimination. Prüfung im Seitenvergleich und nach Dermatomen zur Höhenlokalisation.","id":"k0243"},{"cat":"unters","topic":"Hirnnerven","freq":5,"type":"qa","q":"Nenne die 12 Hirnnerven (Merkspruch).","a":"<b>„Onkel Otto orgelt tag­täglich, aber freitags viel Ananas“</b> u. Ä.:<br>I Olfactorius, II Opticus, III Oculomotorius, IV Trochlearis, V Trigeminus, VI Abducens, VII Facialis, VIII Vestibulocochlearis, IX Glossopharyngeus, X Vagus, XI Accessorius, XII Hypoglossus.","id":"k0244"},{"cat":"unters","topic":"Bewegungsapparat","freq":24,"type":"qa","q":"Was prüft der Lasègue-Test und was zeigt ein positives Ergebnis?","a":"Anheben des <b>gestreckten Beins</b> beim liegenden Patienten. <b>Positiv</b> (Schmerz/Ausstrahlung ins Bein bei ~30–60°) = Hinweis auf eine <b>Nervenwurzelreizung</b> (z. B. Bandscheibenvorfall L5/S1) oder Meningismus.","id":"k0245"},{"cat":"unters","topic":"Pädiatrie","freq":5,"type":"qa","q":"Was sind frühkindliche Reflexe und wann verschwinden sie?","a":"Angeborene Reflexe des Säuglings: <b>Moro-, Saug-, Greif-, Schreitreflex</b>. Sie sollten im Laufe der ersten Lebensmonate verschwinden. <b>Persistieren</b> über die Norm hinaus = Hinweis auf neurologische Störung.","id":"k0246"},{"cat":"unters","topic":"Augen","freq":5,"type":"qa","q":"Wie prüft man die Pupillenreaktion und was bedeutet Anisokorie?","a":"Lichteinfall → prompte <b>Verengung (Miosis)</b>, direkte und konsensuelle Reaktion. <b>Anisokorie</b> = ungleiche Pupillenweite (z. B. bei Hirndruck, Okulomotoriusparese). Weite, lichtstarre Pupillen: Notfallzeichen (Einklemmung).","id":"k0247"},{"cat":"unters","topic":"Ohren","freq":5,"type":"qa","q":"Wie unterscheidet man Schallleitungs- von Schallempfindungsschwerhörigkeit (Weber/Rinne)?","a":"<b>Weber</b> (Stimmgabel Scheitel): Lateralisation ins <b>kranke</b> Ohr → Schallleitungsstörung; ins <b>gesunde</b> Ohr → Schallempfindungsstörung.<br><b>Rinne:</b> Luftleitung normal > Knochenleitung (positiv); bei Schallleitungsstörung negativ.","id":"k0248"},{"cat":"labor","topic":"Blutgruppen","freq":5,"type":"qa","q":"Erkläre das AB0-System und welche Blutgruppe Universalspender/-empfänger ist.","a":"Antigene A/B auf Erythrozyten, Antikörper im Serum (Iso-Agglutinine). <b>Universalspender: 0</b> (keine Antigene). <b>Universalempfänger: AB</b> (keine Antikörper). Zusätzlich <b>Rhesusfaktor</b> (D pos/neg) – wichtig in der Schwangerschaft (Rhesus-Inkompatibilität).","id":"k0249"},{"cat":"labor","topic":"Gerinnung","freq":5,"type":"qa","q":"Wofür stehen Quick/INR und aPTT?","a":"<b>Quick/INR</b> prüft das <b>extrinsische</b> System (Faktoren u. a. II, VII, X) – Kontrolle der <b>Cumarin-Therapie</b> (Marcumar).<br><b>aPTT</b> prüft das <b>intrinsische</b> System – Kontrolle der <b>Heparin-Therapie</b>. Verlängerte Werte = verminderte Gerinnung.","id":"k0250"},{"cat":"labor","topic":"Schilddrüsenwerte","freq":8,"type":"qa","q":"Wie interpretiert man TSH, fT3 und fT4?","a":"<b>TSH</b> ist der sensitivste Suchtest.<br>• <b>Hypothyreose:</b> TSH ↑, fT4 ↓.<br>• <b>Hyperthyreose:</b> TSH ↓, fT3/fT4 ↑.<br>TSH und periphere Hormone verhalten sich (bei primärer Störung) gegenläufig – negative Rückkopplung.","id":"k0251"},{"cat":"labor","topic":"Tumormarker","freq":5,"type":"qa","q":"Wozu dienen Tumormarker und nenne Beispiele.","a":"Sie dienen v. a. der <b>Verlaufs-/Therapiekontrolle</b>, nicht der Früherkennung (unspezifisch). Beispiele: <b>PSA</b> (Prostata), <b>CEA</b> (Darm), <b>CA 19-9</b> (Pankreas), <b>CA 125</b> (Ovar), <b>AFP</b> (Leber/Hoden), <b>CA 15-3</b> (Mamma).","id":"k0252"},{"cat":"labor","topic":"Differentialblutbild","freq":13,"type":"qa","q":"Was zeigt eine Eosinophilie bzw. eine Lymphozytose an?","a":"<b>Eosinophilie:</b> allergische Reaktionen, Parasitenbefall (Würmer), bestimmte Hauterkrankungen.<br><b>Lymphozytose:</b> v. a. <b>virale</b> Infektionen (z. B. Pfeiffersches Drüsenfieber), Keuchhusten, chronische lymphatische Leukämie.","id":"k0253"},{"cat":"labor","topic":"Liquor","freq":5,"type":"qa","q":"Wie unterscheidet sich der Liquorbefund bei bakterieller und viraler Meningitis?","a":"<b>Bakteriell:</b> trüb, stark erhöhte Zellzahl (v. a. <b>Granulozyten</b>), Eiweiß ↑↑, <b>Glukose ↓</b>, Laktat ↑.<br><b>Viral:</b> klar, mäßig erhöhte Zellzahl (v. a. <b>Lymphozyten</b>), Eiweiß normal/leicht ↑, Glukose normal.","id":"k0254"},{"cat":"labor","topic":"Entzündungszeichen","freq":8,"type":"qa","q":"Nenne die 5 klassischen Entzündungszeichen (Celsus/Galen).","a":"<b>Rubor</b> (Rötung), <b>Calor</b> (Überwärmung), <b>Tumor</b> (Schwellung), <b>Dolor</b> (Schmerz) und <b>Functio laesa</b> (gestörte Funktion).","id":"k0255"},{"cat":"labor","topic":"BZ-Verlauf","freq":126,"type":"qa","q":"Was misst der HbA1c-Wert?","a":"Den Anteil des <b>verzuckerten (glykierten) Hämoglobins</b> → Spiegelt den durchschnittlichen Blutzucker der letzten <b>8–12 Wochen</b> („Blutzuckergedächtnis“). Diabetes ab <b>≥6,5 %</b>. Dient der Langzeit-Therapiekontrolle.","id":"k0256"},{"cat":"hygiene","topic":"Infektionskette","freq":5,"type":"qa","q":"Nenne die Glieder der Infektionskette.","a":"1. Erregerreservoir/Infektionsquelle → 2. Erregerausscheidung → 3. Übertragungsweg → 4. Eintrittspforte → 5. empfänglicher Wirt. Hygienemaßnahmen setzen an, um diese Kette zu <b>unterbrechen</b> (z. B. Händedesinfektion = Übertragungsweg).","id":"k0257"},{"cat":"hygiene","topic":"Übertragungswege","freq":5,"type":"qa","q":"Nenne die wichtigsten Übertragungswege von Infektionserregern.","a":"<b>Tröpfchen</b> (Sprechen/Husten), <b>Aerosole</b> (aerogen), <b>Schmierinfektion/Kontakt</b> (fäkal-oral, Hände), <b>parenteral</b> (Blut, Nadelstich), <b>sexuell</b>, <b>diaplazentar/perinatal</b> (Mutter→Kind), über <b>Vektoren</b> (Mücken, Zecken) und kontaminierte Lebensmittel/Wasser.","id":"k0258"},{"cat":"hygiene","topic":"Nadelstichverletzung","freq":5,"type":"qa","q":"Was ist bei einer Nadelstichverletzung zu tun?","a":"Blutung <b>fördern</b> (nicht quetschen), Wunde <b>gründlich desinfizieren</b> (antiseptisch spülen), dokumentieren, D-Arzt/Betriebsarzt, ggf. <b>Postexpositionsprophylaxe</b> (HIV/Hepatitis B), Serologie von Indexperson und Verletztem. Risiko: HBV, HCV, HIV.","id":"k0259"},{"cat":"herz","topic":"Vorhofflimmern","freq":55,"type":"qa","q":"Was ist Vorhofflimmern und warum ist es gefährlich?","a":"Häufigste anhaltende Herzrhythmusstörung: ungeordnete Vorhoferregung → <b>absolute Arrhythmie</b> mit unregelmäßigem Puls. Gefahr: Bildung von Thromben im Vorhof → <b>arterielle Embolie/Schlaganfall</b>. Deshalb oft Antikoagulation (DOAK/Marcumar) nötig.","id":"k0260"},{"cat":"herz","topic":"AV-Block","freq":55,"type":"qa","q":"Unterscheide die Grade des AV-Blocks.","a":"<b>I°:</b> verlängerte Überleitung (PQ ↑), asymptomatisch.<br><b>II°:</b> intermittierender Ausfall der Überleitung (Wenckebach/Mobitz).<br><b>III° (totaler Block):</b> keine Überleitung, Vorhof und Kammer schlagen unabhängig → Bradykardie, Synkopen (Adams-Stokes) → Schrittmacher-Indikation.","id":"k0261"},{"cat":"herz","topic":"Endokarditis","freq":5,"type":"qa","q":"Beschreibe die infektiöse Endokarditis und ihre Leitsymptome.","a":"Entzündung der Herzinnenhaut/Klappen, meist bakteriell (Streptokokken/Staphylokokken), oft bei vorgeschädigten Klappen. Leitsymptome: Fieber, neues/verändertes <b>Herzgeräusch</b>, Embolien, Splenomegalie, Petechien, Osler-Knötchen. Gefürchtete Komplikation: Klappenzerstörung, septische Streuung.","id":"k0262"},{"cat":"herz","topic":"Myokarditis","freq":5,"type":"qa","q":"Was ist eine Myokarditis und wodurch wird sie häufig ausgelöst?","a":"Entzündung des Herzmuskels, häufig <b>viral</b> (z. B. Coxsackie), oft nach Atemwegsinfekt. Klinik variabel: Leistungsknick, Herzstolpern, Brustschmerz, Herzinsuffizienzzeichen. Gefahr: Rhythmusstörungen, plötzlicher Herztod. <b>Cave: körperliche Schonung bei Infekten!</b>","id":"k0263"},{"cat":"herz","topic":"Perikarditis","freq":5,"type":"qa","q":"Was ist typisch für eine Perikarditis?","a":"Entzündung des Herzbeutels. Klinik: <b>atemabhängige, lageabhängige</b> retrosternale Schmerzen (Besserung beim Vornüberbeugen), <b>Perikardreiben</b> bei der Auskultation. Komplikation: Perikarderguss/<b>Herzbeuteltamponade</b> (Kreislaufversagen).","id":"k0264"},{"cat":"herz","topic":"Aortenstenose","freq":5,"type":"qa","q":"Nenne die klassische Symptomtrias der Aortenklappenstenose.","a":"<b>Angina pectoris, (Belastungs-)Synkope und Dyspnoe/Herzinsuffizienz.</b> Auskultation: raues <b>Systolikum</b> mit Fortleitung in die Karotiden. Häufigster erworbener Klappenfehler.","id":"k0265"},{"cat":"herz","topic":"Angeborene Herzfehler","freq":5,"type":"qa","q":"Was unterscheidet Herzfehler mit Links-rechts- von Rechts-links-Shunt?","a":"<b>Links-rechts-Shunt</b> (azyanotisch zunächst): VSD, ASD, PDA – sauerstoffreiches Blut fließt zurück in den Lungenkreislauf.<br><b>Rechts-links-Shunt</b> (<b>zyanotisch</b>): z. B. <b>Fallot-Tetralogie</b> – sauerstoffarmes Blut gelangt in den Körperkreislauf → Zyanose.","id":"k0266"},{"cat":"herz","topic":"Cor pulmonale","freq":2,"type":"qa","q":"Was ist ein Cor pulmonale?","a":"<b>Rechtsherzbelastung/-versagen</b> infolge einer <b>Lungenerkrankung</b> mit pulmonaler Hypertonie (z. B. COPD, Lungenfibrose, chronische Lungenembolien). Zeichen der Rechtsherzinsuffizienz: gestaute Halsvenen, Ödeme, Stauungsleber.","id":"k0267"},{"cat":"herz","topic":"Aortenaneurysma","freq":5,"type":"qa","q":"Was ist ein Aortenaneurysma und wann wird es lebensbedrohlich?","a":"Krankhafte Aussackung der Aortenwand (meist Bauchaorta, arteriosklerotisch). Oft asymptomatisch. <b>Ruptur</b> = akuter Vernichtungsschmerz + Schock → höchste Lebensgefahr. Bei der <b>Aortendissektion</b>: Einriss der Wandschichten, reißender Schmerz mit Wanderung.","id":"k0268"},{"cat":"herz","topic":"Raynaud","freq":5,"type":"qa","q":"Beschreibe das Raynaud-Syndrom.","a":"Anfallsartige <b>Vasospasmen</b> der Finger-/Zehenarterien (durch Kälte/Stress) mit typischem <b>Tricolore-Phänomen</b>: <b>weiß</b> (Ischämie) → <b>blau</b> (Zyanose) → <b>rot</b> (reaktive Hyperämie). Primär (harmlos) oder sekundär (z. B. bei Kollagenosen).","id":"k0269"},{"cat":"herz","topic":"CVI/Varikosis","freq":5,"type":"qa","q":"Was ist die chronisch-venöse Insuffizienz und wie entsteht sie?","a":"Chronische Störung des venösen Rückflusses (Klappeninsuffizienz, nach Thrombose). Folgen: Ödeme, <b>Stauungsdermatitis</b>, Hyperpigmentierung, im Endstadium <b>Ulcus cruris venosum</b> (offenes Bein). Ursache oft Varikosis (Krampfadern).","id":"k0270"},{"cat":"herz","topic":"Thrombophlebitis","freq":14,"type":"qa","q":"Was unterscheidet eine Thrombophlebitis von einer tiefen Venenthrombose?","a":"<b>Thrombophlebitis</b> = Entzündung/Thrombose einer <b>oberflächlichen</b> Vene: schmerzhafter, geröteter, tastbarer <b>Strang</b>. Meist harmlos, aber Aszension möglich.<br><b>Phlebothrombose</b> = <b>tiefe</b> Venenthrombose mit Emboliegefahr (Lungenembolie).","id":"k0271"},{"cat":"herz","topic":"Lymphödem","freq":5,"type":"qa","q":"Was kennzeichnet ein Lymphödem?","a":"Eiweißreiche Schwellung durch gestörten Lymphabfluss (primär angeboren oder sekundär, z. B. nach Lymphknotenentfernung). Typisch: <b>positives Stemmer-Zeichen</b> (Hautfalte über den Zehen nicht abhebbar), Beginn distal, keine Dellen im Frühstadium.","id":"k0272"},{"cat":"atmung","topic":"Lungenemphysem","freq":5,"type":"qa","q":"Was ist ein Lungenemphysem?","a":"Irreversible <b>Überblähung und Zerstörung der Alveolen</b> → Verlust an Gasaustauschfläche. Meist Folge von Rauchen/COPD (selten α1-Antitrypsin-Mangel). Klinik: Fassthorax, hypersonorer Klopfschall, leises Atemgeräusch, Belastungsdyspnoe („Pink Puffer“).","id":"k0273"},{"cat":"atmung","topic":"Lungenfibrose","freq":5,"type":"qa","q":"Was kennzeichnet eine Lungenfibrose?","a":"Bindegewebiger Umbau (Vernarbung) des Lungengerüsts → <b>restriktive</b> Ventilationsstörung, gestörte Diffusion. Klinik: zunehmende Belastungsdyspnoe, Reizhusten, <b>„Sklerophonie/Knisterrasseln“</b>, Trommelschlägelfinger. Ursachen: idiopathisch, Staub, Medikamente.","id":"k0274"},{"cat":"atmung","topic":"Sarkoidose","freq":5,"type":"qa","q":"Was ist die Sarkoidose (Morbus Boeck)?","a":"Systemische granulomatöse Erkrankung unklarer Ursache, v. a. der Lunge/Lymphknoten. Akute Form <b>Löfgren-Syndrom</b>: Trias aus <b>bihilärer Lymphadenopathie, Erythema nodosum und Arthritis</b> (Sprunggelenke). Oft junge Erwachsene.","id":"k0275"},{"cat":"atmung","topic":"Pleuritis/Erguss","freq":5,"type":"qa","q":"Unterscheide Pleuritis sicca und exsudativa sowie den Pleuraerguss.","a":"<b>Pleuritis sicca</b> (trocken): atemabhängiger Schmerz, <b>Pleurareiben</b> („Lederknarren“).<br><b>Pleuritis exsudativa</b>: Ergussbildung → Schmerz lässt nach, aber <b>Dyspnoe</b>, gedämpfter Klopfschall, abgeschwächtes Atemgeräusch. Erguss = Flüssigkeit im Pleuraspalt (Transsudat/Exsudat).","id":"k0276"},{"cat":"atmung","topic":"Epiglottitis","freq":2,"type":"qa","q":"Was ist die Epiglottitis und warum ist sie ein Notfall?","a":"Bakterielle Entzündung des Kehldeckels (Haemophilus influenzae b). Rasch progrediente <b>Schwellung mit Erstickungsgefahr!</b> Kind sitzt vornübergebeugt, <b>speichelt</b>, kloßige Sprache, inspiratorischer Stridor, hohes Fieber. Kein Racheninspektion erzwingen! Sofort Notarzt.","id":"k0277"},{"cat":"atmung","topic":"Pseudokrupp","freq":2,"type":"qa","q":"Beschreibe den Pseudokrupp (stenosierende Laryngitis).","a":"Virale Entzündung im Kehlkopfbereich, v. a. Kleinkinder, oft nachts: <b>bellender Husten</b>, Heiserkeit, inspiratorischer Stridor, meist ohne hohes Fieber. Maßnahmen: Ruhe bewahren, kühle feuchte Luft. Abzugrenzen von der gefährlicheren Epiglottitis.","id":"k0278"},{"cat":"atmung","topic":"Schlafapnoe","freq":5,"type":"qa","q":"Was ist das obstruktive Schlafapnoe-Syndrom?","a":"Wiederholte <b>Atemaussetzer im Schlaf</b> durch Kollaps der oberen Atemwege. Folge: lautes Schnarchen, Sauerstoffabfälle, unruhiger Schlaf → <b>Tagesmüdigkeit</b>, Konzentrationsstörungen, Hypertonie, erhöhtes kardiovaskuläres Risiko. Therapie: CPAP.","id":"k0279"},{"cat":"atmung","topic":"Atelektase","freq":2,"type":"qa","q":"Was ist eine Atelektase?","a":"Luftleerer, kollabierter Lungenabschnitt (nicht belüftet) – z. B. durch Verlegung eines Bronchus (Tumor, Fremdkörper, Sekret) oder Kompression (Erguss). Befund: gedämpfter Klopfschall, fehlendes Atemgeräusch über dem betroffenen Bezirk.","id":"k0280"},{"cat":"atmung","topic":"Bronchiektasen","freq":2,"type":"qa","q":"Was sind Bronchiektasen?","a":"Irreversible <b>Erweiterungen der Bronchien</b> mit chronischer Sekretansammlung und rezidivierenden Infekten. Leitsymptom: chronischer Husten mit <b>reichlich (maulvollem), teils eitrigem Auswurf</b>, oft „dreischichtig“. Ursachen: Mukoviszidose, chronische Infekte.","id":"k0281"},{"cat":"gastro","topic":"Peritonitis","freq":5,"type":"qa","q":"Was ist eine Peritonitis und welche Leitzeichen gibt es?","a":"Entzündung des Bauchfells (meist durch Perforation/Durchwanderung). Leitzeichen: <b>bretthartes Abdomen</b> (Abwehrspannung), heftigste Schmerzen, Loslassschmerz, fehlende Darmgeräusche (paralytischer Ileus), Schock. <b>Akutes Abdomen – Notfall!</b>","id":"k0282"},{"cat":"gastro","topic":"Mesenterialinfarkt","freq":5,"type":"qa","q":"Beschreibe den Mesenterialinfarkt und seinen typischen Verlauf.","a":"Verschluss einer Darmarterie (meist embolisch) → Darmischämie. Klassischer <b>dreiphasiger Verlauf</b>: 1. akuter heftiger Schmerz, 2. trügerisches beschwerdefreies Intervall („fauler Frieden“), 3. Durchwanderungsperitonitis/Ileus mit Schock. Hohe Letalität.","id":"k0283"},{"cat":"gastro","topic":"Divertikulitis","freq":5,"type":"qa","q":"Was ist eine Divertikulitis?","a":"Entzündung von <b>Darmwandausstülpungen (Divertikeln)</b>, v. a. im Sigma. Klinik: Schmerzen im <b>linken Unterbauch</b> („Linksappendizitis“), Fieber, Stuhlunregelmäßigkeiten. Komplikationen: Perforation, Abszess, Blutung, Stenose.","id":"k0284"},{"cat":"gastro","topic":"Magenkarzinom","freq":5,"type":"qa","q":"Nenne Risikofaktoren und Frühzeichen des Magenkarzinoms.","a":"<b>Risiko:</b> Helicobacter pylori, chronische Typ-A-Gastritis, Nitrosamine (gepökelt/geräuchert), Rauchen.<br><b>Symptome (spät/unspezifisch):</b> Appetitlosigkeit, Abneigung gegen Fleisch, Gewichtsverlust, Druck im Oberbauch, Anämie. <b>Virchow-Drüse</b> (linke supraklavikuläre Lymphknotenmetastase).","id":"k0285"},{"cat":"gastro","topic":"Zöliakie","freq":5,"type":"qa","q":"Was ist die Zöliakie?","a":"Autoimmunreaktion auf <b>Gluten</b> → Zottenatrophie des Dünndarms → <b>Malabsorption</b>. Klinik: Durchfälle, Gewichtsverlust/Gedeihstörung (Kinder), Blähungen, Eisenmangel. Diagnostik: Antikörper (Transglutaminase), Biopsie. Therapie: <b>lebenslang glutenfreie Ernährung</b>.","id":"k0286"},{"cat":"gastro","topic":"Achalasie","freq":2,"type":"qa","q":"Was ist eine Achalasie?","a":"Störung der Speiseröhrenmotorik: der untere Ösophagussphinkter <b>erschlafft nicht</b> ausreichend → Speisestau. Leitsymptom: <b>Dysphagie</b> (Schluckstörung für feste UND flüssige Speisen), Regurgitation, retrosternaler Druck, Gewichtsverlust.","id":"k0287"},{"cat":"gastro","topic":"Mallory-Weiss","freq":2,"type":"qa","q":"Was ist das Mallory-Weiss-Syndrom?","a":"Längsrisse der Schleimhaut am <b>ösophagogastralen Übergang</b> durch heftiges Erbrechen (häufig bei Alkoholikern) → obere GI-Blutung (Hämatemesis). Abzugrenzen von der Ösophagusvarizenblutung.","id":"k0288"},{"cat":"gastro","topic":"Ösophagusvarizen","freq":2,"type":"qa","q":"Wie entstehen Ösophagusvarizen und warum sind sie gefährlich?","a":"Bei <b>portaler Hypertension</b> (v. a. Leberzirrhose) fließt Blut über Umgehungskreisläufe → Krampfadern der Speiseröhre. <b>Ruptur = massive, lebensbedrohliche obere GI-Blutung</b> (Bluterbrechen), häufige Todesursache bei Zirrhose.","id":"k0289"},{"cat":"gastro","topic":"Hernien","freq":2,"type":"qa","q":"Was ist eine Hernie und was bedeutet Inkarzeration?","a":"Vorfall von Eingeweiden durch eine Lücke der Bauchwand (Bruchpforte), z. B. Leisten-, Nabel-, Narbenhernie. <b>Inkarzeration (Einklemmung):</b> nicht reponierbarer, druckschmerzhafter Bruch → Durchblutungsstörung des Bruchinhalts (Ileus/Nekrose) → <b>Notfall</b>.","id":"k0290"},{"cat":"gastro","topic":"Roemheld-Syndrom","freq":2,"type":"qa","q":"Was ist das Roemheld-Syndrom?","a":"<b>Gastrokardialer Symptomenkomplex</b>: durch Gasansammlung/Meteorismus im Magen-Darm-Trakt wird das Zwerchfell hochgedrückt → herzbezogene Beschwerden (Herzstolpern, Beklemmung, Atemnot) <b>ohne</b> kardiale Ursache. Wichtige DD zu retrosternalen Schmerzen.","id":"k0291"},{"cat":"gastro","topic":"Leberversagen","freq":2,"type":"qa","q":"Nenne Zeichen des akuten Leberversagens.","a":"<b>Ikterus</b>, <b>Gerinnungsstörung</b> (Quick ↓), <b>hepatische Enzephalopathie</b> (Verwirrtheit bis Koma, <b>Flapping Tremor/Asterixis</b>), <b>Foetor hepaticus</b> (süßlicher Mundgeruch), Aszites. Ursache oft Intoxikation (z. B. Paracetamol) oder fulminante Hepatitis.","id":"k0292"},{"cat":"gastro","topic":"Hepatische Enzephalopathie","freq":2,"type":"qa","q":"Wie entsteht die hepatische Enzephalopathie?","a":"Bei Leberversagen kann <b>Ammoniak</b> (aus dem Eiweißabbau) nicht mehr entgiftet werden → neurotoxische Wirkung aufs Gehirn. Folge: Bewusstseinsstörungen, <b>Flapping Tremor</b>, Verlangsamung bis Koma. Auslöser: eiweißreiche Kost, GI-Blutung, Infekte.","id":"k0293"},{"cat":"gastro","topic":"Fettleber","freq":2,"type":"qa","q":"Was ist eine Fettleber und wodurch entsteht sie?","a":"Vermehrte Fetteinlagerung in die Leberzellen. Ursachen: <b>Alkohol</b> (alkoholische Fettleber) oder metabolisch (nicht-alkoholische Fettleber bei Adipositas/Diabetes). Kann über eine Fettleberhepatitis (NASH) in eine <b>Zirrhose</b> übergehen.","id":"k0294"},{"cat":"gastro","topic":"Hämochromatose","freq":2,"type":"qa","q":"Was ist die Hämochromatose?","a":"<b>Eisenspeicherkrankheit</b> mit vermehrter Eisenaufnahme und Ablagerung in Organen. Trias/„Bronzediabetes“: <b>Leberzirrhose, Diabetes mellitus und bronzefarbene Hautpigmentierung</b>. Dazu Gelenkbeschwerden, Kardiomyopathie.","id":"k0295"},{"cat":"gastro","topic":"Morbus Wilson","freq":2,"type":"qa","q":"Was ist der Morbus Wilson?","a":"<b>Kupferspeicherkrankheit</b> (genetisch) mit Ablagerung in Leber und Gehirn. Folgen: Leberschaden, neurologisch-psychiatrische Symptome (Tremor, Dystonie), typischer <b>Kayser-Fleischer-Kornealring</b> (kupferfarbener Ring um die Iris).","id":"k0296"},{"cat":"gastro","topic":"Cholangitis","freq":2,"type":"qa","q":"Was ist eine akute Cholangitis und wie äußert sie sich?","a":"Bakterielle Entzündung der Gallenwege, meist bei Gallenstau (Stein). Klassische <b>Charcot-Trias</b>: <b>Fieber/Schüttelfrost, Ikterus und rechtsseitiger Oberbauchschmerz</b>. Gefahr: Sepsis. Notfall!","id":"k0297"},{"cat":"gastro","topic":"Pankreaskarzinom","freq":5,"type":"qa","q":"Warum hat das Pankreaskarzinom eine schlechte Prognose?","a":"Es wächst lange <b>symptomlos</b> und wird meist spät entdeckt. Leitsymptom (Pankreaskopf): <b>schmerzloser Ikterus</b> mit tastbar praller Gallenblase (<b>Courvoisier-Zeichen</b>), Gewichtsverlust, Oberbauch-/Rückenschmerz. Tumormarker CA 19-9.","id":"k0298"},{"cat":"niere","topic":"Glomerulonephritis","freq":8,"type":"qa","q":"Was ist eine (Post-Streptokokken-)Glomerulonephritis?","a":"Immunologisch bedingte Entzündung der Nierenkörperchen, oft <b>1–3 Wochen nach Streptokokken-Infekt</b> (Scharlach/Angina). <b>Nephritisches Syndrom:</b> Hämaturie (bräunlicher Urin), Proteinurie, Ödeme (Lider), Hypertonie, Nierenfunktion ↓.","id":"k0299"},{"cat":"niere","topic":"Chronische Niereninsuffizienz","freq":8,"type":"qa","q":"Nenne Ursachen und Folgen der chronischen Niereninsuffizienz.","a":"<b>Häufigste Ursachen:</b> Diabetes mellitus und Hypertonie.<br><b>Folgen (Urämie):</b> Retentionswerte ↑, Anämie (EPO-Mangel), renale Osteopathie (Vitamin-D-/Kalzium-Störung), Hyperkaliämie, Übelkeit, Juckreiz, Ödeme, Hypertonie. Endstadium: Dialysepflicht.","id":"k0300"},{"cat":"niere","topic":"Pyelonephritis","freq":8,"type":"qa","q":"Was unterscheidet die Pyelonephritis von der Zystitis?","a":"Die <b>Pyelonephritis</b> (Nierenbeckenentzündung) ist eine <b>aufsteigende</b> Infektion mit <b>Allgemeinsymptomen</b>: hohes Fieber, Schüttelfrost, <b>klopfschmerzhaftes Nierenlager (Flankenschmerz)</b>, Krankheitsgefühl. Die Zystitis (Blasenentzündung) bleibt lokal ohne Fieber.","id":"k0301"},{"cat":"niere","topic":"Zystennieren","freq":2,"type":"qa","q":"Was sind Zystennieren?","a":"Erbliche Erkrankung mit multiplen <b>Zysten in beiden Nieren</b> → fortschreitende Vergrößerung und Zerstörung des Nierengewebes → chronische Niereninsuffizienz. Oft verbunden mit Hypertonie und Hirnaneurysmen.","id":"k0302"},{"cat":"niere","topic":"Nierenzellkarzinom","freq":2,"type":"qa","q":"Nenne die klassische (späte) Symptomtrias des Nierenzellkarzinoms.","a":"<b>Hämaturie, Flankenschmerz und tastbarer Tumor</b> – tritt meist erst spät auf, daher oft Zufallsbefund (Sonografie). Risikofaktor: Rauchen. Paraneoplastisch: Polyglobulie, Hyperkalzämie.","id":"k0303"},{"cat":"endo","topic":"Addison","freq":5,"type":"qa","q":"Beschreibe die Nebennierenrindeninsuffizienz (Morbus Addison).","a":"Mangel an <b>Kortisol und Aldosteron</b> (meist autoimmun). Klinik: Schwäche, Gewichtsverlust, <b>Hyperpigmentierung</b> („Bronzehaut“), Hypotonie, Hyponatriämie/Hyperkaliämie, Hypoglykämie, Salzhunger. Gefahr: lebensbedrohliche <b>Addison-Krise</b> (Schock).","id":"k0304"},{"cat":"endo","topic":"Conn-Syndrom","freq":5,"type":"qa","q":"Was ist das Conn-Syndrom?","a":"<b>Primärer Hyperaldosteronismus</b> (Aldosteron-Überschuss). Folge: Natrium-/Wasserretention → <b>therapieresistente Hypertonie</b> und <b>Hypokaliämie</b> (Muskelschwäche, Krämpfe, Herzrhythmusstörungen). Wichtige Ursache sekundärer Hypertonie.","id":"k0305"},{"cat":"endo","topic":"Phäochromozytom","freq":5,"type":"qa","q":"Was ist ein Phäochromozytom?","a":"Katecholamin-produzierender Tumor des Nebennierenmarks (Adrenalin/Noradrenalin). Leitsymptom: <b>anfallsartige Blutdruckkrisen</b> mit Kopfschmerz, Schwitzen, Herzrasen, Blässe. Wichtige (behebbare) Ursache einer sekundären Hypertonie.","id":"k0306"},{"cat":"endo","topic":"Hyperparathyreoidismus","freq":5,"type":"qa","q":"Was bewirkt ein primärer Hyperparathyreoidismus?","a":"Überschuss an <b>Parathormon</b> → <b>Hyperkalzämie</b>. Merkspruch: <b>„Stein-, Bein- und Magenpein“</b> – Nierensteine, Knochenschmerzen/-abbau, Magen-Darm-Beschwerden, dazu Müdigkeit, Polyurie, Verwirrtheit.","id":"k0307"},{"cat":"endo","topic":"Diabetes insipidus","freq":5,"type":"qa","q":"Was ist der Diabetes insipidus?","a":"Störung des Wasserhaushalts durch <b>ADH-Mangel</b> (zentral) oder ADH-Resistenz (renal). Leitsymptom: massive <b>Polyurie</b> (bis viele Liter) mit stark <b>verdünntem Urin</b> und quälendem Durst. Kein Zusammenhang mit Blutzucker (im Gegensatz zum Diabetes mellitus).","id":"k0308"},{"cat":"endo","topic":"Struma","freq":8,"type":"qa","q":"Was ist eine Struma und welche häufige Ursache gibt es?","a":"Vergrößerung der Schilddrüse („Kropf“), sicht-/tastbar, schluckverschieblich. Häufigste Ursache in Deutschland: <b>Jodmangel</b>. Kann euthyreot, hypo- oder hyperthyreot sein. Große Struma: Druck auf Trachea/Ösophagus (Atem-/Schluckbeschwerden).","id":"k0309"},{"cat":"endo","topic":"Schilddrüsenkarzinom","freq":2,"type":"qa","q":"Welche Zeichen sind bei einem Schilddrüsenknoten verdächtig auf Malignität?","a":"<b>Harter, nicht schluckverschieblicher, rasch wachsender „kalter“ Knoten</b>, Heiserkeit (Recurrensparese), zervikale Lymphknotenschwellung, Schluckbeschwerden. „Kalte“ (nicht speichernde) Knoten sind malignitätsverdächtiger als „heiße“.","id":"k0310"},{"cat":"endo","topic":"Adipositas","freq":5,"type":"qa","q":"Wie ist Adipositas anhand des BMI definiert?","a":"BMI = Gewicht(kg)/Größe²(m²). <b>Übergewicht ≥25</b>, <b>Adipositas ≥30</b> (Grad I 30–34,9; II 35–39,9; III ≥40). Zusätzlich Bedeutung der <b>Fettverteilung</b> (viszerale/stammbetonte Adipositas = höheres Risiko), Bauchumfang.","id":"k0311"},{"cat":"endo","topic":"Fettstoffwechsel","freq":5,"type":"qa","q":"Was unterscheidet LDL und HDL?","a":"<b>LDL</b> („böses“ Cholesterin) transportiert Cholesterin <b>zu den Geweben</b> → bei Erhöhung <b>arteriosklerosefördernd</b>.<br><b>HDL</b> („gutes“ Cholesterin) transportiert Cholesterin <b>zur Leber zurück</b> → gefäßschützend. Ungünstig: LDL ↑, HDL ↓, Triglyzeride ↑.","id":"k0312"},{"cat":"endo","topic":"Mukoviszidose","freq":2,"type":"qa","q":"Was ist die Mukoviszidose (zystische Fibrose)?","a":"Erbkrankheit mit gestörtem Chloridtransport → Bildung <b>zähen Schleims</b> in exokrinen Drüsen. Folgen: chronische Lungeninfekte/Bronchiektasen, <b>Pankreasinsuffizienz</b> (Verdauungsstörung, Gedeihstörung), salziger Schweiß. Diagnose u. a. Schweißtest.","id":"k0313"},{"cat":"endo","topic":"Kaliumhaushalt","freq":8,"type":"qa","q":"Welche Gefahren gehen von Hyper- und Hypokaliämie aus?","a":"Beide gefährden das Herz (<b>Herzrhythmusstörungen bis Herzstillstand</b>).<br><b>Hyperkaliämie</b> (z. B. Niereninsuffizienz): Muskelschwäche, EKG-Veränderungen (spitzes T).<br><b>Hypokaliämie</b> (z. B. Diuretika, Erbrechen): Muskelschwäche, Obstipation, Herzrhythmusstörungen.","id":"k0314"},{"cat":"endo","topic":"Kalziumhaushalt","freq":5,"type":"qa","q":"Welche Symptome verursachen Hypo- und Hyperkalzämie?","a":"<b>Hypokalzämie:</b> gesteigerte neuromuskuläre Erregbarkeit → <b>Tetanie</b> (Pfötchenstellung, Chvostek-/Trouss
