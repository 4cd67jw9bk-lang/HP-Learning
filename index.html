<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Fit für die Heilpraktikerprüfung – Lernapp</title>
<meta name="description" content="Karteikarten mit Spaced Repetition (Anki-Prinzip) und weiteren Lernmodi zur Vorbereitung auf die mündliche Heilpraktikerprüfung.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Serif:ital,wght@0,400;0,500;0,600;1,400&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ============================================================
   DESIGN TOKENS
   Konzept: klinisch-ruhige, kühle Oberfläche (Petrol/Schiefer)
   mit warmen "Papier"-Karteikarten – moderner Leitner-Kasten.
   Schrift: IBM Plex (Serif=Karten/Display, Sans=UI, Mono=§/Werte).
   ============================================================ */
:root{
  --shell:#E9EEEF;      /* kühler App-Hintergrund */
  --surface:#FFFFFF;    /* Panels */
  --surface-2:#F4F7F7;  /* leicht abgesetzt */
  --paper:#FBF7EE;      /* warme Karteikarte */
  --paper-edge:#EFE7D6;
  --ink:#16313A;        /* Haupttext, dunkles Petrol */
  --ink-soft:#5C7076;
  --ink-faint:#8A9BA0;
  --brand:#0E6E70;      /* Petrol-Teal, primär */
  --brand-deep:#0A5052;
  --brand-tint:#DDECEC;
  --signal:#B0710F;     /* Bernstein: Prüfungsrelevanz */
  --signal-tint:#F6ECD8;
  --line:#D6DEE0;
  --line-soft:#E4EAEB;
  /* Bewertungsfarben */
  --r-again:#C0413A;
  --r-hard:#C77E27;
  --r-good:#2E8B6F;
  --r-easy:#2F7FB0;
  --shadow:0 1px 2px rgba(22,49,58,.06),0 8px 24px rgba(22,49,58,.07);
  --shadow-card:0 2px 4px rgba(22,49,58,.08),0 18px 40px rgba(22,49,58,.10);
  --radius:14px;
  --radius-sm:9px;
  --maxw:1120px;
  --sans:'IBM Plex Sans',system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
  --serif:'IBM Plex Serif',Georgia,'Times New Roman',serif;
  --mono:'IBM Plex Mono',ui-monospace,SFMono-Regular,Menlo,monospace;
}
[data-theme="dark"]{
  --shell:#0E1C21;
  --surface:#14262C;
  --surface-2:#1A2F36;
  --paper:#1E3138;
  --paper-edge:#294049;
  --ink:#E7EEEF;
  --ink-soft:#A6BABF;
  --ink-faint:#7690967;
  --ink-faint:#76909A;
  --brand:#3FA9AB;
  --brand-deep:#2C8C8E;
  --brand-tint:#123536;
  --signal:#D79A3C;
  --signal-tint:#2C2415;
  --line:#274049;
  --line-soft:#1F353C;
  --shadow:0 1px 2px rgba(0,0,0,.3),0 10px 30px rgba(0,0,0,.35);
  --shadow-card:0 2px 6px rgba(0,0,0,.35),0 20px 46px rgba(0,0,0,.45);
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{
  font-family:var(--sans);
  background:var(--shell);
  color:var(--ink);
  line-height:1.5;
  font-size:16px;
  -webkit-font-smoothing:antialiased;
  min-height:100vh;
  overflow-x:hidden;
}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
::selection{background:var(--brand-tint);color:var(--ink)}
:focus-visible{outline:2.5px solid var(--brand);outline-offset:2px;border-radius:6px}
.mono{font-family:var(--mono)}

/* ---------- APP-SHELL ---------- */
.app{display:grid;grid-template-columns:250px 1fr;min-height:100vh}

/* Sidebar */
.side{
  background:var(--surface);
  border-right:1px solid var(--line);
  display:flex;flex-direction:column;
  position:sticky;top:0;height:100vh;
  padding:20px 14px;
}
.brand{display:flex;align-items:center;gap:11px;padding:4px 8px 20px;margin-bottom:6px;border-bottom:1px solid var(--line-soft)}
.brand-mark{
  width:38px;height:38px;border-radius:10px;flex:none;
  background:linear-gradient(150deg,var(--brand),var(--brand-deep));
  display:grid;place-items:center;color:#fff;
  box-shadow:0 4px 12px rgba(14,110,112,.3);
  position:relative;
}
.brand-mark svg{width:22px;height:22px}
.brand-txt b{font-weight:600;font-size:15px;letter-spacing:-.2px;display:block;line-height:1.15}
.brand-txt span{font-size:11.5px;color:var(--ink-faint);font-family:var(--mono);letter-spacing:.3px}
.nav{display:flex;flex-direction:column;gap:2px;margin-top:14px;flex:1;overflow-y:auto}
.nav-label{font-size:10.5px;text-transform:uppercase;letter-spacing:.11em;color:var(--ink-faint);font-weight:600;padding:12px 12px 6px}
.nav-item{
  display:flex;align-items:center;gap:12px;
  padding:10px 12px;border-radius:10px;
  font-size:14.5px;font-weight:500;color:var(--ink-soft);
  transition:background .13s,color .13s;text-align:left;width:100%;
}
.nav-item svg{width:19px;height:19px;flex:none;stroke-width:1.9}
.nav-item:hover{background:var(--surface-2);color:var(--ink)}
.nav-item.active{background:var(--brand-tint);color:var(--brand-deep);font-weight:600}
.nav-item .badge{margin-left:auto;font-family:var(--mono);font-size:11.5px;background:var(--brand);color:#fff;border-radius:20px;padding:1px 8px;font-weight:600;min-width:22px;text-align:center}
.nav-item.active .badge{background:var(--brand-deep)}
.nav-item .badge.zero{background:var(--line);color:var(--ink-faint)}
.side-foot{border-top:1px solid var(--line-soft);padding-top:12px;margin-top:8px;display:flex;gap:8px;align-items:center}
.icon-btn{width:38px;height:38px;border-radius:9px;display:grid;place-items:center;color:var(--ink-soft);border:1px solid var(--line)}
.icon-btn:hover{background:var(--surface-2);color:var(--ink)}
.icon-btn svg{width:18px;height:18px}

/* Main */
.main{min-width:0;position:relative}
.wrap{max-width:var(--maxw);margin:0 auto;padding:34px 34px 90px}
.view{display:none;animation:fade .25s ease}
.view.active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* Topbar (mobile) */
.topbar{display:none}

/* ---------- TYPO / HELPERS ---------- */
.eyebrow{font-family:var(--mono);font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--brand);font-weight:600;margin-bottom:10px}
h1.page{font-family:var(--serif);font-weight:600;font-size:30px;letter-spacing:-.4px;line-height:1.15;margin-bottom:8px}
.page-sub{color:var(--ink-soft);font-size:15px;max-width:60ch;margin-bottom:26px}
h2.sec{font-family:var(--serif);font-weight:600;font-size:19px;margin:30px 0 14px;letter-spacing:-.2px}
.pill{display:inline-flex;align-items:center;gap:5px;font-family:var(--mono);font-size:11.5px;font-weight:600;padding:3px 9px;border-radius:20px;letter-spacing:.02em}
.pill-signal{background:var(--signal-tint);color:var(--signal)}
.pill-brand{background:var(--brand-tint);color:var(--brand-deep)}
.pill-line{border:1px solid var(--line);color:var(--ink-soft)}

/* ---------- BUTTONS ---------- */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:9px;padding:12px 20px;border-radius:11px;font-weight:600;font-size:15px;transition:transform .08s,box-shadow .15s,background .15s;white-space:nowrap}
.btn:active{transform:translateY(1px)}
.btn svg{width:18px;height:18px;stroke-width:2}
.btn-primary{background:var(--brand);color:#fff;box-shadow:0 4px 14px rgba(14,110,112,.28)}
.btn-primary:hover{background:var(--brand-deep)}
.btn-ghost{background:var(--surface);color:var(--ink);border:1px solid var(--line)}
.btn-ghost:hover{background:var(--surface-2)}
.btn-lg{padding:15px 26px;font-size:16px}
.btn-block{width:100%}

/* ---------- CARDS / PANELS ---------- */
.panel{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
.grid{display:grid;gap:16px}

/* Dashboard hero */
.hero{
  background:linear-gradient(158deg,var(--brand-deep),var(--brand) 60%,#12807f);
  color:#fff;border-radius:var(--radius);padding:30px 32px;position:relative;overflow:hidden;
  box-shadow:0 10px 34px rgba(10,80,82,.32);
}
.hero::after{content:"";position:absolute;right:-40px;top:-40px;width:220px;height:220px;border-radius:50%;background:radial-gradient(circle,rgba(255,255,255,.14),transparent 68%)}
.hero-grade{font-family:var(--mono);font-size:12px;letter-spacing:.14em;text-transform:uppercase;opacity:.82;margin-bottom:12px;position:relative}
.hero h1{font-family:var(--serif);font-weight:500;font-size:27px;line-height:1.22;letter-spacing:-.3px;position:relative;max-width:22ch}
.hero-row{display:flex;flex-wrap:wrap;gap:26px;margin-top:22px;position:relative}
.hero-stat b{font-family:var(--mono);font-size:26px;font-weight:600;display:block;line-height:1}
.hero-stat span{font-size:12.5px;opacity:.82;letter-spacing:.02em}
.hero-cta{margin-top:26px;position:relative;display:flex;gap:12px;flex-wrap:wrap}
.hero .btn-primary{background:#fff;color:var(--brand-deep);box-shadow:0 6px 18px rgba(0,0,0,.18)}
.hero .btn-primary:hover{background:#F3FBFB}
.hero .btn-ghost{background:rgba(255,255,255,.13);border-color:rgba(255,255,255,.28);color:#fff}
.hero .btn-ghost:hover{background:rgba(255,255,255,.2)}

/* stat tiles */
.tiles{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-top:16px}
.tile{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius-sm);padding:16px 17px;box-shadow:var(--shadow)}
.tile b{font-family:var(--mono);font-size:24px;font-weight:600;display:block;line-height:1;color:var(--ink)}
.tile span{font-size:12.5px;color:var(--ink-soft);display:block;margin-top:6px}
.tile .ic{width:30px;height:30px;border-radius:8px;background:var(--brand-tint);color:var(--brand-deep);display:grid;place-items:center;margin-bottom:12px}
.tile .ic svg{width:17px;height:17px}
.tile.warn .ic{background:var(--signal-tint);color:var(--signal)}

/* Leitner-Kasten (Signature) */
.leitner{display:grid;grid-template-columns:repeat(5,1fr);gap:11px;margin-top:4px}
.fach{
  background:var(--surface);border:1px solid var(--line);border-radius:12px;
  padding:15px 12px 13px;text-align:center;position:relative;overflow:hidden;
  transition:transform .3s;
}
.fach-cards{height:44px;display:flex;align-items:flex-end;justify-content:center;gap:3px;margin-bottom:10px}
.fach-cards i{width:7px;background:var(--brand);border-radius:2px 2px 0 0;opacity:.85;display:block;animation:grow .5s ease backwards}
@keyframes grow{from{height:0!important;opacity:0}}
.fach-n{font-family:var(--mono);font-size:20px;font-weight:600}
.fach-l{font-size:11px;color:var(--ink-faint);margin-top:2px;letter-spacing:.02em}
.fach-tag{position:absolute;top:8px;left:8px;font-family:var(--mono);font-size:10px;color:var(--ink-faint);font-weight:600}
.fach.mature .fach-cards i{background:var(--signal)}
.fach.pop{transform:translateY(-4px)}

/* progress bar */
.bar{height:9px;background:var(--line-soft);border-radius:20px;overflow:hidden}
.bar>i{display:block;height:100%;background:linear-gradient(90deg,var(--brand),#15a0a0);border-radius:20px;transition:width .6s ease}
.bar.sig>i{background:linear-gradient(90deg,var(--signal),#d59a3f)}

/* ============================================================
   KARTEIKARTEN / SPACED REPETITION
   ============================================================ */
.study-stage{max-width:660px;margin:0 auto}
.study-top{display:flex;align-items:center;justify-content:space-between;gap:14px;margin-bottom:20px}
.study-progress{flex:1;height:7px;background:var(--line-soft);border-radius:20px;overflow:hidden;max-width:340px}
.study-progress>i{display:block;height:100%;background:var(--brand);transition:width .3s}
.study-counts{font-family:var(--mono);font-size:13px;color:var(--ink-soft);display:flex;gap:12px;flex:none}
.study-counts b{color:var(--ink)}
.dot-new{color:var(--r-easy)} .dot-rev{color:var(--r-good)} .dot-lrn{color:var(--r-again)}

.flashcard{perspective:1600px}
.fc-inner{position:relative;transition:transform .5s cubic-bezier(.4,.15,.2,1);transform-style:preserve-3d;min-height:340px}
.fc-inner.flipped{transform:rotateX(180deg)}
.fc-face{
  position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;
  background:var(--paper);border:1px solid var(--paper-edge);border-radius:18px;
  box-shadow:var(--shadow-card);padding:32px 34px;display:flex;flex-direction:column;
}
.fc-back{transform:rotateX(180deg)}
.fc-meta{display:flex;align-items:center;gap:8px;margin-bottom:18px;flex-wrap:wrap}
.fc-cat{font-family:var(--mono);font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--brand)}
.fc-topic{font-size:12.5px;color:var(--ink-faint)}
.fc-q{font-family:var(--serif);font-size:22px;line-height:1.34;color:var(--ink);font-weight:500;flex:1;display:flex;align-items:center}
.fc-q.small{font-size:19px}
.fc-a{font-size:15.5px;line-height:1.6;color:var(--ink);overflow-y:auto;flex:1}
.fc-a b{color:var(--brand-deep);font-weight:600}
[data-theme="dark"] .fc-a b{color:var(--brand)}
.fc-a-label{font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:12px;font-weight:600;flex:none}
.fc-hint{text-align:center;font-size:13px;color:var(--ink-faint);margin-top:16px;font-family:var(--mono)}
.fc-hint kbd{background:var(--surface);border:1px solid var(--line);border-bottom-width:2px;border-radius:5px;padding:1px 6px;font-family:var(--mono);font-size:11px;color:var(--ink-soft)}

.reveal-btn{margin-top:18px}
.rate-row{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin-top:18px;animation:fade .2s}
.rate{padding:13px 8px 11px;border-radius:11px;font-weight:600;font-size:14px;color:#fff;display:flex;flex-direction:column;align-items:center;gap:3px;transition:transform .08s,filter .12s;border:none}
.rate:active{transform:translateY(1px)}
.rate:hover{filter:brightness(1.06)}
.rate small{font-family:var(--mono);font-size:10.5px;font-weight:500;opacity:.9}
.rate .key{position:absolute;top:6px;right:8px;font-size:10px;opacity:.7}
.rate{position:relative}
.r-again{background:var(--r-again)} .r-hard{background:var(--r-hard)} .r-good{background:var(--r-good)} .r-easy{background:var(--r-easy)}

/* empty / done state */
.empty-state{text-align:center;padding:60px 20px;max-width:460px;margin:0 auto}
.empty-ic{width:72px;height:72px;border-radius:20px;background:var(--brand-tint);color:var(--brand-deep);display:grid;place-items:center;margin:0 auto 22px}
.empty-ic svg{width:34px;height:34px}
.empty-state h2{font-family:var(--serif);font-size:23px;font-weight:600;margin-bottom:10px}
.empty-state p{color:var(--ink-soft);font-size:15px;margin-bottom:22px}

/* ---------- SETUP / OPTION CARDS ---------- */
.opt-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px;margin-top:18px}
.opt-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:22px 20px;text-align:left;transition:border-color .15s,transform .1s,box-shadow .15s;box-shadow:var(--shadow);position:relative;display:flex;flex-direction:column;min-height:150px}
.opt-card:hover{border-color:var(--brand);transform:translateY(-3px);box-shadow:var(--shadow-card)}
.opt-ic{width:42px;height:42px;border-radius:11px;background:var(--brand-tint);color:var(--brand-deep);display:grid;place-items:center;margin-bottom:14px}
.opt-ic svg{width:22px;height:22px;stroke-width:1.8}
.opt-card h3{font-size:16px;font-weight:600;margin-bottom:5px;letter-spacing:-.1px}
.opt-card p{font-size:13px;color:var(--ink-soft);line-height:1.45;flex:1}
.opt-card .go{margin-top:12px;color:var(--brand);font-weight:600;font-size:13.5px;display:flex;align-items:center;gap:5px}
.opt-card.sig .opt-ic{background:var(--signal-tint);color:var(--signal)}

/* ---------- CHIPS (Kategorie-Auswahl) ---------- */
.chips{display:flex;flex-wrap:wrap;gap:8px;margin:6px 0 4px}
.chip{padding:7px 13px;border-radius:20px;border:1px solid var(--line);background:var(--surface);font-size:13px;font-weight:500;color:var(--ink-soft);transition:.12s;display:inline-flex;align-items:center;gap:7px}
.chip:hover{border-color:var(--brand);color:var(--ink)}
.chip.on{background:var(--brand);border-color:var(--brand);color:#fff}
.chip .c-n{font-family:var(--mono);font-size:11px;opacity:.7}
.chip.on .c-n{opacity:.85}
.chip-freq{margin-left:2px}

/* ---------- MULTIPLE CHOICE ---------- */
.mc-stage{max-width:660px;margin:0 auto}
.mc-q{background:var(--paper);border:1px solid var(--paper-edge);border-radius:16px;padding:26px 28px;box-shadow:var(--shadow-card);margin-bottom:16px}
.mc-q .fc-q{font-size:20px;display:block}
.mc-opts{display:flex;flex-direction:column;gap:10px}
.mc-opt{text-align:left;padding:15px 18px;border-radius:12px;border:1.5px solid var(--line);background:var(--surface);font-size:15px;font-weight:500;transition:.13s;display:flex;align-items:center;gap:12px;line-height:1.4}
.mc-opt:hover:not(:disabled){border-color:var(--brand);background:var(--surface-2)}
.mc-opt .mk{width:26px;height:26px;border-radius:7px;border:1.5px solid var(--line);flex:none;display:grid;place-items:center;font-family:var(--mono);font-size:12px;font-weight:600;color:var(--ink-soft)}
.mc-opt.correct{border-color:var(--r-good);background:rgba(46,139,111,.09)}
.mc-opt.correct .mk{background:var(--r-good);color:#fff;border-color:var(--r-good)}
.mc-opt.wrong{border-color:var(--r-again);background:rgba(192,65,58,.08)}
.mc-opt.wrong .mk{background:var(--r-again);color:#fff;border-color:var(--r-again)}
.mc-opt:disabled{cursor:default}
.mc-feedback{margin-top:16px;padding:16px 18px;border-radius:12px;background:var(--surface-2);border:1px solid var(--line);font-size:14px;line-height:1.55;display:none}
.mc-feedback.show{display:block;animation:fade .2s}
.mc-feedback .lbl{font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.08em;font-weight:600;margin-bottom:6px}
.mc-feedback.ok .lbl{color:var(--r-good)} .mc-feedback.no .lbl{color:var(--r-again)}

/* ---------- ZUORDNUNG (Matching) ---------- */
.match-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:8px}
.match-col-h{font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-faint);font-weight:600;margin-bottom:8px}
.match-item{padding:14px 16px;border-radius:11px;border:1.5px solid var(--line);background:var(--surface);font-size:14.5px;margin-bottom:10px;transition:.12s;text-align:left;width:100%;line-height:1.35}
.match-item:hover:not(:disabled):not(.done){border-color:var(--brand)}
.match-item.sel{border-color:var(--brand);background:var(--brand-tint);color:var(--brand-deep);font-weight:600}
.match-item.done{opacity:.4;border-style:dashed;cursor:default;background:var(--surface-2)}
.match-item.flash-ok{border-color:var(--r-good);background:rgba(46,139,111,.12)}
.match-item.flash-no{border-color:var(--r-again);background:rgba(192,65,58,.1);animation:shake .3s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}

/* ---------- PRÜFUNGSSIMULATION ---------- */
.exam-stage{max-width:660px;margin:0 auto}
.examiner{display:flex;gap:14px;align-items:flex-start;background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:20px 22px;box-shadow:var(--shadow);margin-bottom:18px}
.examiner-av{width:46px;height:46px;border-radius:12px;flex:none;background:linear-gradient(150deg,#3a5561,#16313a);color:#fff;display:grid;place-items:center;font-family:var(--serif);font-weight:600;font-size:19px}
.examiner-body .who{font-size:12.5px;color:var(--ink-faint);font-family:var(--mono);letter-spacing:.03em;margin-bottom:4px}
.examiner-body .says{font-family:var(--serif);font-size:19px;line-height:1.4;color:var(--ink)}
.exam-timer{font-family:var(--mono);font-size:14px;color:var(--ink-soft);display:flex;align-items:center;gap:7px;margin-bottom:16px;justify-content:center}
.exam-timer b{color:var(--ink);font-size:16px}
.exam-answer{background:var(--paper);border:1px solid var(--paper-edge);border-radius:16px;padding:24px 26px;box-shadow:var(--shadow-card);margin-bottom:16px;display:none}
.exam-answer.show{display:block;animation:fade .25s}
.exam-answer .fc-a-label{margin-bottom:12px}
.self-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:6px}
.self{padding:14px;border-radius:11px;font-weight:600;font-size:14.5px;display:flex;align-items:center;justify-content:center;gap:8px;color:#fff}
.self-no{background:var(--r-again)} .self-yes{background:var(--r-good)}
.self svg{width:18px;height:18px}

/* ---------- THEMEN BROWSER ---------- */
.search{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--line);border-radius:11px;padding:11px 15px;margin-bottom:18px;box-shadow:var(--shadow)}
.search svg{width:18px;height:18px;color:var(--ink-faint);flex:none}
.search input{border:none;background:none;outline:none;font-size:15px;color:var(--ink);width:100%;font-family:var(--sans)}
.search input::placeholder{color:var(--ink-faint)}
.cat-block{margin-bottom:10px;border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;background:var(--surface);box-shadow:var(--shadow)}
.cat-head{display:flex;align-items:center;gap:13px;padding:16px 18px;cursor:pointer;transition:background .12s;width:100%;text-align:left}
.cat-head:hover{background:var(--surface-2)}
.cat-dot{width:11px;height:11px;border-radius:50%;flex:none}
.cat-head h3{font-size:16px;font-weight:600;flex:1;letter-spacing:-.1px}
.cat-head .n{font-family:var(--mono);font-size:12px;color:var(--ink-faint)}
.cat-head .chev{color:var(--ink-faint);transition:transform .2s}
.cat-block.open .chev{transform:rotate(90deg)}
.cat-body{display:none;border-top:1px solid var(--line-soft);padding:6px 0}
.cat-block.open .cat-body{display:block}
.q-row{padding:13px 20px;border-bottom:1px solid var(--line-soft);cursor:pointer}
.q-row:last-child{border-bottom:none}
.q-row:hover{background:var(--surface-2)}
.q-row .qh{display:flex;gap:10px;align-items:flex-start}
.q-row .qq{font-family:var(--serif);font-size:15.5px;line-height:1.4;flex:1;color:var(--ink)}
.q-row .qa{font-size:14px;line-height:1.6;color:var(--ink-soft);margin-top:10px;padding-left:2px;display:none}
.q-row.open .qa{display:block;animation:fade .2s}
.q-row .qa b{color:var(--brand-deep)}
[data-theme="dark"] .q-row .qa b{color:var(--brand)}
.mini-freq{font-family:var(--mono);font-size:10.5px;font-weight:600;color:var(--signal);background:var(--signal-tint);border-radius:5px;padding:1px 6px;flex:none;margin-top:2px}

/* ---------- STATISTIK ---------- */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px}
.cov-row{display:flex;align-items:center;gap:14px;padding:10px 0;border-bottom:1px solid var(--line-soft)}
.cov-row:last-child{border-bottom:none}
.cov-name{font-size:14px;font-weight:500;width:170px;flex:none;display:flex;align-items:center;gap:9px}
.cov-name .cat-dot{width:9px;height:9px}
.cov-bar{flex:1;height:8px;background:var(--line-soft);border-radius:20px;overflow:hidden}
.cov-bar>i{display:block;height:100%;border-radius:20px;transition:width .6s}
.cov-pct{font-family:var(--mono);font-size:12.5px;color:var(--ink-soft);width:64px;text-align:right;flex:none}

/* ---------- SETTINGS ---------- */
.set-row{display:flex;align-items:center;justify-content:space-between;gap:18px;padding:16px 0;border-bottom:1px solid var(--line-soft)}
.set-row:last-child{border-bottom:none}
.set-info label{font-size:15px;font-weight:600;display:block;margin-bottom:3px}
.set-info p{font-size:13px;color:var(--ink-soft);max-width:46ch}
.stepper{display:flex;align-items:center;gap:2px;background:var(--surface-2);border:1px solid var(--line);border-radius:10px;padding:3px;flex:none}
.stepper button{width:34px;height:32px;border-radius:7px;font-size:19px;font-weight:600;color:var(--ink-soft);display:grid;place-items:center}
.stepper button:hover{background:var(--surface);color:var(--ink)}
.stepper .val{font-family:var(--mono);font-size:15px;font-weight:600;width:48px;text-align:center}
.switch{width:48px;height:28px;border-radius:20px;background:var(--line);position:relative;transition:background .2s;flex:none;border:none}
.switch::after{content:"";position:absolute;top:3px;left:3px;width:22px;height:22px;border-radius:50%;background:#fff;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.switch.on{background:var(--brand)}
.switch.on::after{transform:translateX(20px)}
.danger-zone{border:1px solid rgba(192,65,58,.3);border-radius:var(--radius);padding:20px 22px;margin-top:20px;background:rgba(192,65,58,.03)}
.danger-zone h3{color:var(--r-again);font-size:15px;font-weight:600;margin-bottom:6px}
.danger-zone p{font-size:13px;color:var(--ink-soft);margin-bottom:14px}
.btn-danger{background:var(--surface);color:var(--r-again);border:1px solid rgba(192,65,58,.4)}
.btn-danger:hover{background:rgba(192,65,58,.08)}

/* ---------- TOAST ---------- */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:13px 22px;border-radius:12px;font-size:14px;font-weight:500;box-shadow:0 10px 30px rgba(0,0,0,.25);opacity:0;transition:.25s;z-index:200;pointer-events:none;max-width:90vw}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
[data-theme="dark"] .toast{background:#fff;color:var(--ink)}

/* ---------- INTRO / info card ---------- */
.info-card{background:var(--brand-tint);border:1px solid var(--brand);border-radius:var(--radius);padding:18px 20px;display:flex;gap:14px;margin-bottom:20px}
.info-card svg{width:22px;height:22px;color:var(--brand-deep);flex:none;margin-top:1px}
.info-card .t{font-size:14px;line-height:1.55;color:var(--ink)}
.info-card .t b{color:var(--brand-deep)}
[data-theme="dark"] .info-card .t b{color:var(--brand)}

/* result screen */
.result{text-align:center;max-width:440px;margin:0 auto;padding:40px 20px}
.result-ring{width:130px;height:130px;margin:0 auto 24px;position:relative}
.result-ring svg{transform:rotate(-90deg)}
.result-ring .pct{position:absolute;inset:0;display:grid;place-items:center;font-family:var(--mono);font-size:30px;font-weight:600;color:var(--ink)}
.result h2{font-family:var(--serif);font-size:25px;font-weight:600;margin-bottom:8px}
.result p{color:var(--ink-soft);margin-bottom:24px}
.result-stats{display:flex;justify-content:center;gap:30px;margin-bottom:26px}
.result-stats b{font-family:var(--mono);font-size:22px;display:block}

/* ---------- RESPONSIVE ---------- */
@media (max-width:860px){
  .app{grid-template-columns:1fr}
  .side{display:none;position:fixed;z-index:150;width:270px;left:0;top:0;box-shadow:0 0 60px rgba(0,0,0,.3);transform:translateX(-100%);transition:transform .25s}
  .side.open{display:flex;transform:translateX(0)}
  .scrim{display:none;position:fixed;inset:0;background:rgba(10,25,30,.4);z-index:140}
  .scrim.show{display:block}
  .topbar{display:flex;align-items:center;gap:12px;padding:12px 16px;background:var(--surface);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:100}
  .topbar .brand-mark{width:34px;height:34px}
  .topbar .tb-title{font-weight:600;font-size:15px;flex:1}
  .topbar .tb-due{font-family:var(--mono);font-size:12px;background:var(--brand);color:#fff;border-radius:20px;padding:3px 10px;font-weight:600}
  .hamb{width:40px;height:40px;border-radius:9px;display:grid;place-items:center;color:var(--ink)}
  .hamb svg{width:22px;height:22px}
  .wrap{padding:20px 16px 90px}
  h1.page{font-size:25px}
  .hero{padding:24px 22px}.hero h1{font-size:22px}
  .tiles{grid-template-columns:repeat(2,1fr)}
  .leitner{grid-template-columns:repeat(5,1fr);gap:6px}
  .fach{padding:11px 5px 10px}.fach-tag{display:none}.fach-l{font-size:9.5px}
  .rate-row{grid-template-columns:repeat(2,1fr)}
  .match-grid{gap:8px}
  .fc-face{padding:24px 22px}.fc-q{font-size:20px}
  .result-stats{gap:20px}
}
@media (max-width:480px){
  .tiles{grid-template-columns:1fr 1fr}
  .self-row,.mc-opts{gap:8px}
  .opt-grid{grid-template-columns:1fr}
}
@media (prefers-reduced-motion:reduce){
  *{animation-duration:.01ms!important;transition-duration:.05ms!important}
  .fc-inner{transition:none}
}
</style>
</head>

<script>
/* Kartendaten werden hier eingefügt */
const KARTEN = [{"cat":"recht","topic":"Was ist Heilkunde?","freq":1010,"type":"qa","q":"Wie lautet die gesetzliche Definition der Ausübung der Heilkunde (§1 Abs. 2 HeilprG)? (Wortwörtlich lernen!)","a":"Ausübung der Heilkunde ist jede <b>berufs- oder gewerbsmäßig</b> vorgenommene Tätigkeit zur <b>Feststellung, Heilung oder Linderung</b> von <b>Krankheiten, Leiden oder Körperschäden</b> bei Menschen, auch wenn sie im Dienste von anderen ausgeübt wird.<br><br><i>Merke: kam bisher in JEDER Prüfung dran.</i>","id":"k0001"},{"cat":"recht","topic":"Was ist Heilkunde?","freq":1010,"type":"qa","q":"Was bedeutet „berufsmäßig“ bzw. „gewerbsmäßig“ im Sinne des HeilprG?","a":"<b>Berufsmäßig</b> = auf Dauer angelegt, mit Wiederholungsabsicht (Ausnahme: Behandlung der eigenen engen Familie).<br><b>Gewerbsmäßig</b> = gegen Entgelt, Naturalien oder Gegenleistung.","id":"k0002"},{"cat":"recht","topic":"HeilprG","freq":765,"type":"qa","q":"Wann und unter welchem vollständigen Namen wurde das Heilpraktikergesetz erlassen?","a":"„Gesetz über die berufsmäßige Ausübung der Heilkunde ohne Bestallung“ (Heilpraktikergesetz) vom <b>17.02.1939</b>. <i>Bestallung</i> = veraltet für Approbation.","id":"k0003"},{"cat":"recht","topic":"Erlaubnis (DVO)","freq":2,"type":"qa","q":"Nenne die Voraussetzungen zur Erteilung der Heilpraktikererlaubnis (§2 HeilprGDV 1).","a":"• mind. <b>25 Jahre</b> alt<br>• Wohnsitz/Aufenthalt (früher: dt. Staatsangehörigkeit)<br>• mind. abgeschlossene <b>Hauptschulbildung</b> (Volksschule)<br>• <b>sittliche Zuverlässigkeit</b> (kein Strafregister-Hindernis)<br>• gesundheitliche Eignung<br>• keine Ausübung neben einem anderen Beruf, der dies ausschließt<br>• Überprüfung durch das <b>Gesundheitsamt</b>: keine Gefahr für die Gesundheit der Bevölkerung","id":"k0004"},{"cat":"recht","topic":"Verbote","freq":765,"type":"qa","q":"Welche Tätigkeiten sind dem Heilpraktiker grundsätzlich VERBOTEN?","a":"• Zahnheilkunde & Geburtshilfe (Entbindungspflege)<br>• Verschreibung/Anwendung verschreibungspflichtiger Arzneimittel & Betäubungsmittel<br>• Behandlung meldepflichtiger übertragbarer Krankheiten (§24 IfSG)<br>• Behandlung von Geschlechtskrankheiten (soweit gesetzl. geregelt)<br>• Ausstellung von Todesbescheinigungen / Leichenschau<br>• Röntgen (nach Strahlenschutzrecht)<br>• Ausübung im Umherziehen (feste Praxis nötig)","id":"k0005"},{"cat":"recht","topic":"§24 IfSG","freq":165,"type":"qa","q":"Was besagt §24 IfSG für den Heilpraktiker?","a":"<b>Behandlungs- und Feststellungsverbot:</b> Krankheiten oder Krankheitserreger nach <b>§6, §7 und §34</b> IfSG dürfen nur von Ärzten behandelt/festgestellt werden. Der Heilpraktiker darf diese Erkrankungen <b>nicht behandeln</b> und muss den Patienten an einen Arzt verweisen.","id":"k0006"},{"cat":"recht","topic":"Pflichten","freq":31,"type":"qa","q":"Nenne wichtige Pflichten des Heilpraktikers.","a":"• <b>Sorgfaltspflicht</b> (Behandlung nach anerkanntem Standard)<br>• <b>Aufklärungspflicht</b> (§630e BGB)<br>• <b>Dokumentationspflicht</b> (§630f BGB, mind. 10 Jahre)<br>• <b>Schweigepflicht</b> (§203 StGB)<br>• <b>Meldepflicht</b> (§8/§9 IfSG bei §6-Erkrankungen)<br>• Grenzen der eigenen Fähigkeiten erkennen (Überweisung)<br>• Datenschutz (DSGVO)","id":"k0007"},{"cat":"recht","topic":"Schweigepflicht","freq":5,"type":"qa","q":"Auf welchem Paragraphen beruht die Schweigepflicht und wann darf/muss sie durchbrochen werden?","a":"<b>§203 StGB</b> (Verletzung von Privatgeheimnissen).<br>Durchbrechung erlaubt bei: Einwilligung des Patienten, gesetzlicher Meldepflicht (z. B. IfSG), rechtfertigendem Notstand (§34 StGB, z. B. Abwendung schwerer Straftaten/Gefahr für Leib und Leben).","id":"k0008"},{"cat":"recht","topic":"Dokumentation","freq":3,"type":"qa","q":"Wie lange müssen Patientenakten mindestens aufbewahrt werden und auf welcher Grundlage?","a":"Mindestens <b>10 Jahre</b> nach Abschluss der Behandlung (§630f BGB / Patientenrechtegesetz), teils länger (z. B. Röntgen/Strahlenschutz). Muss zeitnah, vollständig und wahrheitsgemäß erfolgen.","id":"k0009"},{"cat":"recht","topic":"Aufklärung","freq":3,"type":"qa","q":"Worüber muss der Heilpraktiker den Patienten aufklären (§630e BGB)?","a":"Über Art, Umfang, Durchführung, zu erwartende Folgen und Risiken der Behandlung, Alternativen, Notwendigkeit, Dringlichkeit, Erfolgsaussichten sowie voraussichtliche Kosten – rechtzeitig und verständlich, damit der Patient <b>informiert einwilligen</b> kann.","id":"k0010"},{"cat":"recht","topic":"HWG","freq":3,"type":"qa","q":"Was regelt das Heilmittelwerbegesetz (HWG)?","a":"Es regelt und beschränkt die <b>Werbung im Heilwesen</b>. Verboten sind u. a. irreführende Werbung, Werbung mit Erfolgsgarantien, Angst-Werbung, Werbung mit Gutachten/Empfehlungen von Fachkreisen gegenüber Laien und Werbung für bestimmte Krankheiten (z. B. meldepflichtige Erkrankungen, Krebs).","id":"k0011"},{"cat":"recht","topic":"Unterbringung","freq":2,"type":"qa","q":"Unter welchen Voraussetzungen ist eine Unterbringung gegen den Willen möglich?","a":"Bei <b>Eigen- oder Fremdgefährdung</b> aufgrund einer psychischen Störung. Rechtsgrundlagen: <b>PsychKG</b> der Länder (öffentlich-rechtlich, akute Gefahr) oder <b>Betreuungsrecht §1831 BGB</b> (zivilrechtlich, freiheitsentziehende Unterbringung durch Betreuer mit Genehmigung des Betreuungsgerichts).","id":"k0012"},{"cat":"ifsg","topic":"Zweck IfSG","freq":3,"type":"qa","q":"Was ist der Zweck des Infektionsschutzgesetzes (§1 IfSG)?","a":"Übertragbaren Krankheiten beim Menschen <b>vorzubeugen</b>, Infektionen <b>frühzeitig zu erkennen</b> und ihre <b>Weiterverbreitung zu verhindern</b>.","id":"k0013"},{"cat":"ifsg","topic":"§6 IfSG","freq":64,"type":"qa","q":"Welche Meldeart und welcher Meldeweg gilt für Erkrankungen nach §6 IfSG?","a":"<b>Namentliche</b> Meldung an das <b>Gesundheitsamt</b>, unverzüglich, spätestens <b>innerhalb von 24 Stunden</b> nach erlangter Kenntnis (Melder u. a. der behandelnde Arzt; der HP hat Meldepflicht nach §8 bei §6-Erkrankungen).","id":"k0014"},{"cat":"ifsg","topic":"§6 IfSG","freq":64,"type":"cloze","q":"Merkhilfe §6 („Hänschen klein“): Bo · Cho · Di · ___ · Hep · HUS · Fie · Ma · Me · Mi · Mu · Pe · Po · Rö · Win · Keuch · To · Ty · Tu …","a":"Die fehlende Erkrankung ist <b>En = humane spongiforme Enzephalopathie</b> (Creutzfeldt-Jakob), außer familiär-hereditärer Formen.<br><br>Melde-Trias V/E/T (Verdacht, Erkrankung, Tod) gilt für die meisten §6-Erkrankungen.","id":"k0015"},{"cat":"ifsg","topic":"§6 IfSG","freq":64,"type":"qa","q":"Nenne möglichst viele namentlich meldepflichtige KRANKHEITEN nach §6 IfSG (VET).","a":"Botulismus, Cholera, Diphtherie, humane spongiforme Enzephalopathie, akute Virushepatitis, HUS (enteropathisch), virusbedingtes hämorrhagisches Fieber, Masern, Meningokokken-Meningitis/-Sepsis, Milzbrand, Mumps, Pest, Poliomyelitis, Röteln (inkl. Embryopathie), Windpocken, Keuchhusten, Tollwut, Typhus/Paratyphus, zoonotische Influenza, COVID-19, Orthopocken (Affenpocken).<br>Nur E+T: behandlungsbedürftige Tuberkulose, schwere Clostridioides-difficile-Infektion.","id":"k0016"},{"cat":"ifsg","topic":"§6 IfSG","freq":64,"type":"qa","q":"Bei §6 IfSG – was ist zusätzlich meldepflichtig (unabhängig von einer benannten Krankheit)?","a":"• Verdacht einer über das übliche Maß hinausgehenden <b>Impfschädigung</b> (nur Verdacht)<br>• Verletzung/Berührung durch ein <b>tollwutverdächtiges Tier</b><br>• Verdacht/Erkrankung an mikrobieller <b>Lebensmittelvergiftung</b> oder akuter Gastroenteritis, wenn eine Person im Lebensmittelbereich (§42) tätig ist ODER ≥2 gleichartige Fälle mit epidem. Zusammenhang<br>• jede <b>bedrohliche übertragbare Krankheit</b>","id":"k0017"},{"cat":"ifsg","topic":"§7 IfSG","freq":5,"type":"qa","q":"Was wird nach §7 IfSG gemeldet, von wem und wie?","a":"Der <b>direkte oder indirekte Nachweis von Krankheitserregern</b> (soweit auf akute Infektion hinweisend). Meldung durch das <b>Labor</b> (Leiter), <b>namentlich</b> an das Gesundheitsamt. <i>Wichtig: §7 = Erregernachweis (Labor), §6 = Krankheit (Arzt).</i>","id":"k0018"},{"cat":"ifsg","topic":"§7 IfSG","freq":5,"type":"qa","q":"Welche Erreger nach §7 IfSG werden NICHTnamentlich gemeldet?","a":"<b>Treponema pallidum</b> (Syphilis), <b>HIV</b>, <b>Echinococcus</b> sp., <b>Plasmodium</b> sp. (Malaria), <b>Toxoplasma gondii</b> (nur konnatal). Meldung nichtnamentlich an das <b>RKI</b>.","id":"k0019"},{"cat":"ifsg","topic":"§34 IfSG","freq":6,"type":"qa","q":"Was regelt §34 IfSG (Gemeinschaftseinrichtungen)?","a":"Personen mit bestimmten übertragbaren Krankheiten oder Ausscheider dürfen <b>Gemeinschaftseinrichtungen</b> (Schule, Kita) nicht betreten/nicht dort tätig sein, bis nach ärztlichem Urteil keine Weiterverbreitung mehr droht. Es besteht eine <b>Benachrichtigungspflicht</b> der Einrichtungsleitung ans Gesundheitsamt (namentlich).","id":"k0020"},{"cat":"ifsg","topic":"§34 IfSG","freq":6,"type":"qa","q":"Nenne Beispiele für Erkrankungen mit Tätigkeits-/Besuchsverbot in Gemeinschaftseinrichtungen (§34 IfSG).","a":"U. a. Diphtherie, EHEC, Cholera, Keuchhusten, Masern, Mumps, Röteln, Windpocken, Scharlach/andere Streptokokken-Erkrankungen, Impetigo contagiosa, Skabies, Kopflausbefall, Tuberkulose, virales hämorrhagisches Fieber, Meningokokken-Infektion, Pest, Poliomyelitis, Typhus/Paratyphus, ansteckungsfähige Lungentuberkulose.","id":"k0021"},{"cat":"ifsg","topic":"§8/§9 IfSG","freq":597,"type":"qa","q":"Wer ist nach §8 IfSG zur Meldung verpflichtet und in welcher Reihenfolge/Frist?","a":"Meldepflichtig sind u. a. der <b>feststellende Arzt</b>, Labore, Leiter von Einrichtungen – und der <b>Heilpraktiker</b> (nur bei §6). Frist: <b>unverzüglich</b>, spätestens <b>24 h</b> an das <b>Gesundheitsamt</b> des Aufenthalts des Betroffenen. §9 regelt Inhalt (namentlich).","id":"k0022"},{"cat":"ifsg","topic":"STIKO/RKI","freq":2,"type":"qa","q":"Welche Aufgaben hat das Robert Koch-Institut (RKI)?","a":"Nationale Behörde für Infektionskrankheiten & Public Health: Krankheitsüberwachung (Surveillance), Erfassung/Auswertung von Meldedaten, Ausbruchsmanagement, wissenschaftliche Beratung der Bundesregierung, Herausgabe von Empfehlungen. Bei ihm angesiedelt: die <b>STIKO</b> (Ständige Impfkommission).","id":"k0023"},{"cat":"ifsg","topic":"Impfungen","freq":12,"type":"qa","q":"Für welche Krankheit besteht in Deutschland eine gesetzliche Impfpflicht (auch für Heilpraktiker)?","a":"<b>Masern</b> (Masernschutzgesetz, §20 IfSG): Nachweis von Impfschutz/Immunität für alle nach 1970 Geborenen, die in Gemeinschafts- oder medizinischen Einrichtungen betreut werden oder arbeiten – <b>inkl. Heilpraktiker</b>.","id":"k0024"},{"cat":"ifsg","topic":"Impfungen","freq":12,"type":"qa","q":"Unterscheide Aktiv- und Passivimpfung.","a":"<b>Aktivimpfung:</b> Gabe von Antigenen (abgeschwächte/abgetötete Erreger, Toxoide, mRNA) → Körper bildet <b>selbst Antikörper + Gedächtnis</b>. Schutz verzögert, aber lang.<br><b>Passivimpfung:</b> Gabe fertiger <b>Antikörper (Immunglobuline)</b> → sofortiger, aber kurzer Schutz, kein Gedächtnis (z. B. Postexpositionsprophylaxe Tetanus, Tollwut).","id":"k0025"},{"cat":"hygiene","topic":"Grundbegriffe","freq":11,"type":"qa","q":"Unterscheide Reinigung, Desinfektion und Sterilisation.","a":"<b>Reinigung:</b> Entfernung von sichtbarem Schmutz, keine Keimreduktion garantiert.<br><b>Desinfektion:</b> Reduktion pathogener Keime auf ein Maß, das keine Infektion mehr auslöst (Keimzahl ↓ ≥10⁵). Sporen bleiben ggf.<br><b>Sterilisation:</b> Abtötung/Entfernung <b>ALLER</b> Mikroorganismen inkl. Sporen → keimfrei.","id":"k0026"},{"cat":"hygiene","topic":"Desinfektion","freq":11,"type":"qa","q":"Nenne die wichtigsten Desinfektionsverfahren nach Wirkprinzip.","a":"<b>Physikalisch:</b> thermisch (Auskochen 100 °C, Pasteurisieren), UV-Strahlung.<br><b>Chemisch:</b> Alkohole, Aldehyde, Halogene (Chlor, Jod), Peroxide, quartäre Ammoniumverbindungen (QAV), Phenole.<br>Einteilung nach Anwendung: Haut-, Hände-, Flächen-, Instrumenten-Desinfektion.","id":"k0027"},{"cat":"hygiene","topic":"Händedesinfektion","freq":11,"type":"qa","q":"Wie lange und womit erfolgt die hygienische Händedesinfektion?","a":"Mit <b>alkoholischem Händedesinfektionsmittel</b>, Hände vollständig benetzen, Einwirkzeit i. d. R. <b>30 Sekunden</b> feucht halten. Sie ist wirksamer als Händewaschen und der wichtigste Einzelschritt zur Vermeidung nosokomialer Infektionen.","id":"k0028"},{"cat":"hygiene","topic":"Sterilisation","freq":11,"type":"qa","q":"Nenne Sterilisationsverfahren und typische Parameter.","a":"<b>Dampfsterilisation (Autoklav):</b> gesättigter Wasserdampf mit Überdruck, <b>121 °C/20 min</b> oder <b>134 °C/5 min</b> – Standard in der Praxis.<br><b>Heißluft:</b> 180 °C/30 min (heute selten).<br><b>Gas (Ethylenoxid), Plasma, Strahlen:</b> für hitzeempfindliches Material (v. a. Industrie/Klinik).","id":"k0029"},{"cat":"hygiene","topic":"Sterilisation","freq":11,"type":"qa","q":"Wie wird der Erfolg einer Sterilisation kontrolliert?","a":"<b>Physikalisch:</b> Anzeige von Temperatur/Druck/Zeit.<br><b>Chemisch:</b> Behandlungsindikatoren (Farbumschlag), z. B. Bowie-Dick-Test.<br><b>Biologisch:</b> Bioindikatoren mit hitzeresistenten <b>Sporen</b> (Geobacillus stearothermophilus) – Goldstandard des Wirknachweises.","id":"k0030"},{"cat":"hygiene","topic":"i.m.-Injektion","freq":16,"type":"qa","q":"Wo und wie wird die intramuskuläre Injektion nach v. Hochstetter durchgeführt?","a":"In den <b>M. gluteus medius/minimus</b> (ventrogluteal). Lokalisation: Handballen auf Trochanter major, Zeigefinger auf Spina iliaca anterior superior, Mittelfinger zum Beckenkamm gespreizt → Injektion in das entstehende Dreieck. Stich <b>senkrecht</b>, ca. 90°. Vorteil: keine großen Gefäße/Nerven (N. ischiadicus wird vermieden).","id":"k0031"},{"cat":"hygiene","topic":"i.m.-Injektion","freq":16,"type":"qa","q":"Welche weiteren Orte eignen sich für i.m.-Injektionen?","a":"<b>M. deltoideus</b> (Oberarm, z. B. Impfungen; max. ~2 ml), <b>M. vastus lateralis</b> (Oberschenkel, auch bei Säuglingen). Aspiration vor Injektion zum Ausschluss intravasaler Lage (bei Impfungen laut STIKO nicht mehr zwingend).","id":"k0032"},{"cat":"hygiene","topic":"s.c.-Injektion","freq":5,"type":"qa","q":"Wie und wo erfolgt die subkutane Injektion? Beispiele?","a":"In das <b>Unterhautfettgewebe</b>, Hautfalte abheben, Stich <b>45°</b> (bzw. 90° bei kurzer Nadel). Orte: Bauch, Oberschenkel-Außenseite, Oberarm. Beispiele: <b>Insulin</b>, <b>Heparin</b> (niedermolekular).","id":"k0033"},{"cat":"hygiene","topic":"Injektionen","freq":5,"type":"qa","q":"Nenne Komplikationen von Injektionen.","a":"Spritzenabszess/Infektion, Hämatom, Nervläsion (z. B. N. ischiadicus), versehentlich intravasale Injektion, Gewebsnekrose, allergische/anaphylaktische Reaktion, Spritzenlähmung, Embolie, Vasovagale Synkope.","id":"k0034"},{"cat":"unters","topic":"Anamnese","freq":16,"type":"qa","q":"Welche Bestandteile umfasst eine vollständige Anamnese?","a":"Aktuelle Beschwerden (Hauptbeschwerde), <b>vegetative</b> Anamnese, Eigenanamnese (frühere/chronische Erkrankungen, OPs), <b>Medikamenten</b>anamnese, <b>Familien</b>anamnese, Sozial-/Berufsanamnese, Suchtmittel, Allergien, ggf. Sexual-/gynäkologische Anamnese.","id":"k0035"},{"cat":"unters","topic":"Vegetative Anamnese","freq":16,"type":"qa","q":"Was gehört zur vegetativen Anamnese?","a":"Appetit, Durst, Gewicht(sverlauf), Schlaf, Stuhlgang, Miktion, Schwitzen, Fieber, Menstruation, Leistungsfähigkeit, Genussmittel (Nikotin, Alkohol, Koffein), Libido/Sexualität.","id":"k0036"},{"cat":"unters","topic":"Untersuchungsschema","freq":16,"type":"qa","q":"Nenne die 4 klassischen Schritte der körperlichen Untersuchung – in der richtigen Reihenfolge.","a":"1. <b>Inspektion</b> (Betrachten)<br>2. <b>Palpation</b> (Tasten)<br>3. <b>Perkussion</b> (Beklopfen)<br>4. <b>Auskultation</b> (Abhören)<br><br><i>Ausnahme Abdomen: I – Auskultation – P – P (Auskultation vor Palpation, um die Darmgeräusche nicht zu verfälschen).</i>","id":"k0037"},{"cat":"unters","topic":"Herzauskultation","freq":48,"type":"qa","q":"Nenne die Auskultationspunkte der Herzklappen (Merkspruch).","a":"<b>„Anton Pulmonalis trinkt Milch um 22:45 Uhr“</b><br>• <b>A</b>orten­klappe: 2. ICR rechts parasternal<br>• <b>P</b>ulmonalklappe: 2. ICR links parasternal<br>• <b>T</b>rikuspidal: 4./5. ICR rechts parasternal<br>• <b>M</b>itral: 5. ICR links, Medioklavikularlinie (Herzspitze)<br><b>Erb-Punkt</b>: 3. ICR links parasternal (Projektion aller Klappen).","id":"k0038"},{"cat":"unters","topic":"Herztöne","freq":48,"type":"qa","q":"Wodurch entstehen 1. und 2. Herzton?","a":"<b>1. Herzton</b> (Anspannungston): Schluss der <b>AV-Klappen</b> (Mitral/Trikuspidal) zu Beginn der Systole.<br><b>2. Herzton</b> (Klappenschlusston): Schluss der <b>Taschenklappen</b> (Aorten/Pulmonal) am Ende der Systole. Physiologisch: „lubb–dubb“.","id":"k0039"},{"cat":"unters","topic":"Lungenauskultation","freq":103,"type":"qa","q":"Unterscheide die pathologischen Atemgeräusche (Nebengeräusche).","a":"<b>Rasselgeräusche (RG):</b><br>• feucht/grobblasig = Sekret in großen Atemwegen (z. B. Lungenödem)<br>• feucht/feinblasig = Alveolen/Bronchiolen (z. B. Pneumonie)<br><b>Trocken:</b><br>• <b>Giemen/Pfeifen</b> = Bronchialobstruktion (Asthma, COPD)<br>• <b>Brummen</b> = zähes Sekret<br><b>Stridor:</b> inspiratorisch (obere Atemwege), exspiratorisch (untere).<br><b>Pleurareiben:</b> „Lederknarren“ bei Pleuritis sicca.","id":"k0040"},{"cat":"unters","topic":"Perkussion Lunge","freq":25,"type":"qa","q":"Welcher Klopfschall ist normal über der Lunge und welche pathologischen Befunde gibt es?","a":"Normal: <b>sonorer Klopfschall</b>.<br>• <b>Hypersonor/„Schachtelton“</b>: vermehrter Luftgehalt → Emphysem, Pneumothorax.<br>• <b>gedämpft/schenkelschall</b>: verminderter Luftgehalt → Pneumonie, Erguss, Atelektase, Tumor.","id":"k0041"},{"cat":"unters","topic":"Reflexe","freq":24,"type":"qa","q":"Nenne wichtige Muskeleigenreflexe und ihre Segmente.","a":"<b>BSR</b> Bizepssehnenreflex – C5/C6<br><b>RPR</b> Radiusperiostreflex/Brachioradialis – C5/C6<br><b>TSR</b> Trizepssehnenreflex – C7<br><b>PSR</b> Patellarsehnenreflex – L3/L4<br><b>ASR</b> Achillessehnenreflex – S1/S2","id":"k0042"},{"cat":"unters","topic":"Pathologische Reflexe","freq":24,"type":"qa","q":"Was ist das Babinski-Zeichen und was zeigt es an?","a":"Bestreichen des lateralen Fußsohlenrandes → <b>Dorsalextension der Großzehe</b> + Spreizen der übrigen Zehen. Positiv = Hinweis auf eine Schädigung der <b>Pyramidenbahn</b> (1. Motoneuron). Beim Erwachsenen pathologisch, beim Säugling physiologisch.","id":"k0043"},{"cat":"unters","topic":"Meningismus","freq":8,"type":"qa","q":"Nenne Zeichen des Meningismus.","a":"<b>Nackensteifigkeit</b> (Kopfbeugung schmerzhaft/eingeschränkt), <b>Brudzinski-Zeichen</b> (Kopfbeugung → reflekt. Beinanziehen), <b>Kernig-Zeichen</b> (gebeugtes Bein lässt sich nicht strecken), <b>Lasègue</b> (Schmerz bei Anheben des gestreckten Beins).","id":"k0044"},{"cat":"unters","topic":"Abdomen","freq":38,"type":"qa","q":"Beschreibe die 4-Quadranten-Einteilung des Abdomens und typische Organe.","a":"<b>Rechter Oberbauch:</b> Leber, Gallenblase.<br><b>Linker Oberbauch:</b> Magen, Milz, Pankreasschwanz.<br><b>Rechter Unterbauch:</b> Appendix, Zökum, rechter Ovar.<br><b>Linker Unterbauch:</b> Sigma, linker Ovar. (Alternativ 9-Felder-Schema.)","id":"k0045"},{"cat":"unters","topic":"Appendizitis-Zeichen","freq":8,"type":"qa","q":"Nenne klinische Zeichen der Appendizitis.","a":"<b>McBurney-Punkt</b> (Mitte Nabel–Spina iliaca ant. sup. re.), <b>Lanz-Punkt</b>, <b>Blumberg</b> (kontralateraler Loslassschmerz), <b>Rovsing</b> (Ausstreichen Kolon), <b>Psoas-Zeichen</b>, <b>Douglas-Schmerz</b> (rektal). Dazu: Fieber (axillär-rektale Temperaturdifferenz), Leukozytose.","id":"k0046"},{"cat":"unters","topic":"Leber","freq":25,"type":"qa","q":"Wie beurteilt man die Leber bei der Untersuchung?","a":"<b>Perkussion:</b> Bestimmung der Lebergröße in der Medioklavikularlinie (normal ~7–11 cm).<br><b>Palpation:</b> im Inspirium unter dem re. Rippenbogen (Konsistenz, Rand, Oberfläche, Druckschmerz).<br>Auskultation: Reibegeräusche selten. Beurteilung: Größe, Konsistenz (weich/derb/höckrig), Druckdolenz.","id":"k0047"},{"cat":"unters","topic":"Milz","freq":5,"type":"qa","q":"Ab wann ist die Milz tastbar und was bedeutet das?","a":"Die Milz ist normalerweise <b>nicht tastbar</b>. Wird sie unter dem li. Rippenbogen (im Inspirium) tastbar, liegt eine <b>Splenomegalie</b> vor (mind. auf das ~2-fache vergrößert). Ursachen: portale Hypertension, hämatolog. Erkrankungen, Infektionen (z. B. Mononukleose, Malaria).","id":"k0048"},{"cat":"labor","topic":"Erythrozyten","freq":18,"type":"qa","q":"Nenne Normwerte und Funktion der Erythrozyten sowie von Hämoglobin und Hämatokrit.","a":"<b>Funktion:</b> O₂-/CO₂-Transport (Hämoglobin).<br><b>Erys:</b> ♂ ~4,5–5,9 Mio/µl, ♀ ~4,0–5,2.<br><b>Hb:</b> ♂ ~13,5–17,5 g/dl, ♀ ~12–16.<br><b>Hkt:</b> ♂ ~40–52 %, ♀ ~37–47 %.<br>Lebensdauer ~120 Tage, Abbau in der Milz.","id":"k0049"},{"cat":"labor","topic":"MCV/MCH","freq":18,"type":"qa","q":"Wofür stehen MCV, MCH, MCHC und wozu dienen sie?","a":"<b>MCV</b> = mittleres Erythrozytenvolumen (Größe) → mikro-/normo-/makrozytär.<br><b>MCH</b> = mittlerer Hb-Gehalt pro Ery → hypo-/normo-/hyperchrom.<br><b>MCHC</b> = mittlere Hb-Konzentration.<br>Dienen der <b>Anämie-Differenzierung</b> (z. B. mikrozytär-hypochrom = Eisenmangel; makrozytär = B12-/Folsäuremangel).","id":"k0050"},{"cat":"labor","topic":"Leukozyten","freq":13,"type":"qa","q":"Nenne die 5 Leukozytenarten und ihre Hauptfunktion.","a":"<b>Neutrophile Granulozyten</b> (Phagozytose Bakterien, ~60 %), <b>Lymphozyten</b> (spezifische Immunabwehr, B/T, ~30 %), <b>Monozyten</b> (Makrophagen), <b>Eosinophile</b> (Parasiten/Allergie), <b>Basophile</b> (Histamin, Allergie). Normwert gesamt: ~4.000–10.000/µl.","id":"k0051"},{"cat":"labor","topic":"Leukozytose/-penie","freq":13,"type":"qa","q":"Was bedeuten Leukozytose, Leukopenie und „Linksverschiebung“?","a":"<b>Leukozytose</b> (>10.000): bakt. Infektion, Entzündung, Leukämie, Stress.<br><b>Leukopenie</b> (<4.000): virale Infekte, Knochenmarkschädigung, Agranulozytose.<br><b>Linksverschiebung</b>: vermehrt unreife (stabkernige) Neutrophile → Hinweis auf akute bakterielle Infektion.","id":"k0052"},{"cat":"labor","topic":"Thrombozyten","freq":8,"type":"qa","q":"Normwert und Funktion der Thrombozyten? Was bedeuten Thrombozytose/-penie?","a":"Normwert ~<b>150.000–350.000/µl</b>, Funktion: primäre Blutstillung (Thrombozytenpfropf).<br><b>Thrombopenie</b> (<150.000): Blutungsneigung (Petechien) – z. B. ITP, Leukämie, Verbrauch.<br><b>Thrombozytose</b> (>500.000): reaktiv (Entzündung, nach Splenektomie) oder myeloproliferativ.","id":"k0053"},{"cat":"labor","topic":"BSG/CRP","freq":8,"type":"qa","q":"Wofür stehen BSG und CRP und was zeigen sie an?","a":"<b>BSG</b> (Blutkörperchensenkungsgeschwindigkeit): unspezifischer Entzündungsmarker, langsam, „Sturzsenkung“ bei Malignom/Plasmozytom.<br><b>CRP</b> (C-reaktives Protein): Akut-Phase-Protein, steigt/fällt schneller als BSG, deutlicher Anstieg v. a. bei <b>bakteriellen</b> Infektionen.","id":"k0054"},{"cat":"labor","topic":"Leberwerte","freq":8,"type":"qa","q":"Welche Laborwerte spiegeln Leberschädigung bzw. -funktion wider?","a":"<b>Zellschädigung (Transaminasen):</b> GOT (AST), GPT (ALT), GLDH.<br><b>Cholestase:</b> γ-GT, AP, Bilirubin.<br><b>Synthese-/Funktionsleistung:</b> Albumin, Gerinnungsfaktoren (Quick/INR), Cholinesterase (CHE). GPT ist leberspezifisch; De-Ritis-Quotient (GOT/GPT) >1 spricht für schweren Schaden.","id":"k0055"},{"cat":"labor","topic":"Nierenwerte","freq":8,"type":"qa","q":"Welche Laborparameter zeigen die Nierenfunktion an?","a":"<b>Kreatinin</b> (steigt erst spät – „kreatininblinder Bereich“), <b>Harnstoff</b>, <b>GFR</b> (glomeruläre Filtrationsrate – bester Funktionsparameter), Cystatin C, Elektrolyte. Retentionswerte ↑ = eingeschränkte Nierenfunktion.","id":"k0056"},{"cat":"labor","topic":"Urinstatus","freq":10,"type":"qa","q":"Welche Parameter erfasst der Urin-Teststreifen (Urinstix)?","a":"pH, spezifisches Gewicht, <b>Eiweiß</b>, <b>Glukose</b>, Ketone, <b>Blut/Erythrozyten</b>, <b>Leukozyten</b>, <b>Nitrit</b> (Bakterien), Bilirubin, Urobilinogen. Leukozyten + Nitrit positiv → Harnwegsinfekt.","id":"k0057"},{"cat":"labor","topic":"BZ-Werte","freq":126,"type":"qa","q":"Nenne die Grenzwerte zur Diagnose eines Diabetes mellitus.","a":"• <b>Nüchternblutzucker ≥126 mg/dl</b> (7,0 mmol/l)<br>• <b>Gelegenheits-BZ ≥200 mg/dl</b> + Symptome<br>• <b>oGTT 2-h-Wert ≥200 mg/dl</b><br>• <b>HbA1c ≥6,5 %</b> (48 mmol/mol)<br>Normal nüchtern: <100 mg/dl. Gestörte Nüchternglukose: 100–125 mg/dl.","id":"k0058"},{"cat":"labor","topic":"Elektrolyte","freq":8,"type":"qa","q":"Nenne die wichtigsten Serum-Elektrolyte mit Normbereich.","a":"<b>Natrium</b> 135–145 mmol/l, <b>Kalium</b> 3,5–5,0 mmol/l, <b>Calcium</b> 2,2–2,6 mmol/l, <b>Chlorid</b> 95–105 mmol/l. Kalium ist kritisch: Hyper-/Hypokaliämie → Herzrhythmusstörungen.","id":"k0059"},{"cat":"pharma","topic":"Grundbegriffe","freq":5,"type":"qa","q":"Unterscheide Pharmakodynamik und Pharmakokinetik.","a":"<b>Pharmakodynamik:</b> was das Arzneimittel im Körper bewirkt (Wirkmechanismus, Wirkung, Nebenwirkung).<br><b>Pharmakokinetik:</b> was der Körper mit dem Arzneimittel macht – <b>LADME</b>: Liberation, Absorption, Distribution, Metabolismus, Exkretion.","id":"k0060"},{"cat":"pharma","topic":"Applikation","freq":3,"type":"qa","q":"Was bedeutet „First-Pass-Effekt“?","a":"Bei <b>oraler</b> Gabe wird der Wirkstoff nach Resorption über die Pfortader zur <b>Leber</b> transportiert und dort teilweise metabolisiert, bevor er den Kreislauf erreicht → verminderte Bioverfügbarkeit. Umgehung z. B. durch i.v., sublinguale oder rektale Gabe.","id":"k0061"},{"cat":"pharma","topic":"NSAR","freq":5,"type":"qa","q":"Wie wirken NSAR (z. B. Ibuprofen, ASS, Diclofenac) und welche Nebenwirkungen sind typisch?","a":"Hemmung der <b>Cyclooxygenase (COX)</b> → weniger Prostaglandine → analgetisch, antipyretisch, antiphlogistisch.<br><b>NW:</b> Magen-Darm-Ulzera/Blutungen, Nierenschädigung, Blutdruck ↑, bei ASS Hemmung der Thrombozytenaggregation (Blutungsneigung), Analgetika-Asthma.","id":"k0062"},{"cat":"pharma","topic":"Glukokortikoide","freq":5,"type":"qa","q":"Nenne Wirkungen und typische Nebenwirkungen von Glukokortikoiden (Kortison).","a":"<b>Wirkung:</b> antientzündlich, immunsuppressiv, antiallergisch.<br><b>NW (Cushing-artig):</b> Stammfettsucht/Vollmondgesicht, Osteoporose, Diabetes, Muskelabbau, Hautatrophie, Infektanfälligkeit, Magenulzera, Ödeme, Glaukom/Katarakt, psychische Veränderungen. <b>Cave:</b> nie abrupt absetzen (Nebennierensuppression)!","id":"k0063"},{"cat":"pharma","topic":"Herzmedikamente","freq":25,"type":"qa","q":"Nenne die wichtigsten Medikamentengruppen bei Hypertonie/Herzinsuffizienz.","a":"• <b>ACE-Hemmer</b> (…pril) / <b>Sartane</b> (…sartan)<br>• <b>Betablocker</b> (…olol)<br>• <b>Diuretika</b> (Thiazide, Schleifendiuretika, Aldosteronantagonisten)<br>• <b>Calciumantagonisten</b> (…dipin, Verapamil)<br>• <b>Herzglykoside</b> (Digitalis)<br>• SGLT2-Inhibitoren (neuer bei HI)","id":"k0064"},{"cat":"pharma","topic":"ACE-Hemmer","freq":25,"type":"qa","q":"Wie wirken ACE-Hemmer und welche typische Nebenwirkung gibt es?","a":"Hemmung des <b>Angiotensin-Converting-Enzyme</b> → weniger Angiotensin II → Vasodilatation, Blutdruck ↓, Nachlast ↓. Typische NW: <b>Reizhusten</b> (Bradykinin), Hyperkaliämie, selten <b>Angioödem</b>. Kontraindiziert in der Schwangerschaft.","id":"k0065"},{"cat":"pharma","topic":"Betablocker","freq":25,"type":"qa","q":"Wie wirken Betablocker, wann werden sie eingesetzt und was ist zu beachten?","a":"Blockade der β-Rezeptoren → Herzfrequenz ↓, Blutdruck ↓, O₂-Verbrauch des Herzens ↓.<br>Einsatz: Hypertonie, KHK, Herzinsuffizienz, Tachyarrhythmien.<br><b>Cave:</b> Asthma/COPD (Bronchokonstriktion), Bradykardie, AV-Block, Diabetes (maskiert Hypoglykämie), nicht abrupt absetzen.","id":"k0066"},{"cat":"pharma","topic":"Digitalis","freq":25,"type":"qa","q":"Wie wirkt Digitalis (Herzglykoside) und woran erkennt man eine Intoxikation?","a":"<b>Positiv inotrop</b> (Kontraktionskraft ↑), <b>negativ chronotrop/dromotrop</b> (Frequenz/Erregungsleitung ↓).<br><b>Intoxikation</b> (geringe therap. Breite!): Übelkeit/Erbrechen, <b>Farbsehstörungen (Gelb-/Grünsehen)</b>, Herzrhythmusstörungen, Bradykardie. Verstärkt durch Hypokaliämie.","id":"k0067"},{"cat":"pharma","topic":"Antikoagulation","freq":5,"type":"qa","q":"Unterscheide Heparin, Cumarine (Marcumar) und DOAK in Wirkweise und Kontrolle.","a":"<b>Heparin:</b> wirkt sofort, über Antithrombin, s.c./i.v.; Kontrolle aPTT (unfraktioniert).<br><b>Cumarine (Phenprocoumon/Marcumar):</b> Vitamin-K-Antagonist, verzögerter Wirkeintritt, oral; Kontrolle <b>INR/Quick</b>.<br><b>DOAK</b> (z. B. Apixaban, Rivaroxaban): direkte Faktor-Xa-/Thrombin-Hemmer, keine Routinekontrolle.","id":"k0068"},{"cat":"pharma","topic":"Antibiotika","freq":5,"type":"qa","q":"Nenne wichtige Antibiotikagruppen und einen Vertreter.","a":"<b>Penicilline/β-Laktame</b> (Amoxicillin), <b>Cephalosporine</b>, <b>Makrolide</b> (Erythromycin, Azithromycin), <b>Tetrazykline</b> (Doxycyclin), <b>Gyrasehemmer/Fluorchinolone</b> (Ciprofloxacin), <b>Aminoglykoside</b>, <b>Sulfonamide</b>. Bakterizid vs. bakteriostatisch beachten.","id":"k0069"},{"cat":"pharma","topic":"Psychopharmaka","freq":9,"type":"qa","q":"Nenne die Hauptgruppen der Antidepressiva.","a":"• <b>SSRI</b> (selektive Serotonin-Wiederaufnahmehemmer, z. B. Citalopram)<br>• <b>SNRI</b> (Serotonin-Noradrenalin-WAH)<br>• <b>trizyklische Antidepressiva</b> (z. B. Amitriptylin)<br>• <b>MAO-Hemmer</b><br>Wirkeintritt verzögert (2–3 Wochen). SSRI: NW gastrointestinal, sexuelle Funktionsstörungen; Cave Serotonin-Syndrom.","id":"k0070"},{"cat":"pharma","topic":"Neuroleptika","freq":9,"type":"qa","q":"Wie wirken Neuroleptika (Antipsychotika) und welche Nebenwirkungen sind typisch?","a":"Blockade von <b>Dopaminrezeptoren</b> (v. a. D2) → antipsychotisch.<br><b>Typische NW (v. a. klassische):</b> extrapyramidal-motorisch (Frühdyskinesien, Parkinsonoid, Akathisie, Spätdyskinesien), Prolaktin ↑, malignes neuroleptisches Syndrom. Atypika: metabolische NW.","id":"k0071"},{"cat":"pharma","topic":"Lithium","freq":9,"type":"qa","q":"Wofür wird Lithium eingesetzt und was ist zu beachten?","a":"<b>Phasenprophylaxe der bipolaren Störung</b>, Akutbehandlung der Manie.<br><b>Geringe therap. Breite</b> → Spiegelkontrolle nötig! Intoxikation: Tremor, Übelkeit, Diarrhö, Verwirrtheit, Krämpfe, Nierenschädigung. Kontrolle von Nieren- und Schilddrüsenfunktion.","id":"k0072"},{"cat":"dd","topic":"DD Retrosternale Schmerzen","freq":181,"type":"qa","q":"Nenne die wichtigsten Differenzialdiagnosen retrosternaler/thorakaler Schmerzen.","a":"<b>Kardial:</b> Angina pectoris, Herzinfarkt, Perikarditis, Aortendissektion.<br><b>Pulmonal:</b> Lungenembolie, Pneumothorax, Pleuritis, Pneumonie.<br><b>Gastrointestinal:</b> Reflux, Ösophagusspasmus, Ulkus, Roemheld-Syndrom.<br><b>Muskuloskelettal:</b> BWS-Blockade, Tietze-Syndrom, Interkostalneuralgie, Herpes zoster.<br><b>Psychisch:</b> Angst/Panik.","id":"k0073"},{"cat":"dd","topic":"DD Thoraxschmerz","freq":181,"type":"qa","q":"Welche 4 lebensbedrohlichen Ursachen von Thoraxschmerz müssen sofort ausgeschlossen werden?","a":"1. <b>Herzinfarkt</b> (ACS)<br>2. <b>Lungenembolie</b><br>3. <b>Aortendissektion</b><br>4. <b>Spannungspneumothorax</b><br>(Merke: „die tödlichen Vier“ – dazu Ösophagusruptur/Boerhaave als 5.)","id":"k0074"},{"cat":"dd","topic":"DD Übelkeit/Erbrechen","freq":128,"type":"qa","q":"Nenne wichtige Ursachen von Übelkeit und Erbrechen (nach Systemen).","a":"<b>Gastrointestinal:</b> Gastroenteritis, Ulkus, Ileus, Appendizitis, Cholezystitis, Pankreatitis.<br><b>Zentral:</b> Hirndruck ↑ (Blutung, Tumor, Meningitis), Migräne, Schwindel/Vestibulär.<br><b>Metabolisch:</b> diabet. Ketoazidose, Urämie, Hyperkalzämie, Schwangerschaft.<br><b>Toxisch/Medikamentös:</b> Alkohol, Digitalis, Chemo. Kardial: Hinterwandinfarkt.","id":"k0075"},{"cat":"dd","topic":"DD Husten","freq":101,"type":"qa","q":"Nenne Differenzialdiagnosen von akutem und chronischem Husten.","a":"<b>Akut:</b> Infekt (Bronchitis, Pneumonie, Influenza), Aspiration, Lungenembolie.<br><b>Chronisch (>8 Wochen):</b> COPD, Asthma, Bronchialkarzinom, Tuberkulose, Herzinsuffizienz („Asthma cardiale“), Reflux, <b>ACE-Hemmer</b>, postnasal drip, Bronchiektasen, Lungenfibrose.","id":"k0076"},{"cat":"dd","topic":"DD Husten","freq":101,"type":"qa","q":"Welche Warnsymptome („red flags“) bei Husten erfordern eine ärztliche Abklärung?","a":"<b>Hämoptysen</b> (Bluthusten), ungewollter Gewichtsverlust, Nachtschweiß, Fieber >1 Woche, Dyspnoe, Husten >8 Wochen, thorakale Schmerzen, Raucheranamnese – v. a. Verdacht auf Bronchialkarzinom oder Tuberkulose.","id":"k0077"},{"cat":"dd","topic":"DD Gewichtsverlust","freq":97,"type":"qa","q":"Nenne Ursachen eines ungewollten Gewichtsverlusts.","a":"<b>Maligne Erkrankungen</b> (jede Art), <b>Hyperthyreose</b>, <b>Diabetes mellitus</b> (Erstmanifestation), chronische Infektionen (Tuberkulose, HIV), gastrointestinale Erkrankungen (Malassimilation, CED, Zöliakie), <b>Depression</b>/Demenz, Anorexie, Sucht, Herz-/Niereninsuffizienz (Kachexie).","id":"k0078"},{"cat":"dd","topic":"B-Symptomatik","freq":97,"type":"qa","q":"Was versteht man unter B-Symptomatik?","a":"Trias aus <b>Fieber (>38 °C) ohne Infekt</b>, <b>Nachtschweiß</b> (durchnässt) und ungewolltem <b>Gewichtsverlust</b> (>10 % in 6 Monaten). Wichtiges Warnzeichen v. a. bei <b>Lymphomen</b> und anderen malignen/chronisch-entzündlichen Erkrankungen (auch Tuberkulose, HIV).","id":"k0079"},{"cat":"dd","topic":"DD Kopfschmerzen","freq":73,"type":"qa","q":"Unterscheide die primären Kopfschmerzarten Migräne, Spannungskopfschmerz und Cluster.","a":"<b>Migräne:</b> einseitig, pulsierend, mittel-stark, mit Übelkeit/Foto-/Phonophobie, ggf. Aura; Stunden bis 3 Tage.<br><b>Spannungskopfschmerz:</b> beidseitig, dumpf-drückend, „Helm“, leicht-mittel, keine Begleitsymptome.<br><b>Cluster:</b> streng einseitig periorbital, extrem stark, kurz (15–180 min), attackenweise, mit Augentränen/Nasenlaufen, Unruhe.","id":"k0080"},{"cat":"dd","topic":"DD Kopfschmerzen","freq":73,"type":"qa","q":"Welche sekundären (gefährlichen) Kopfschmerz-Ursachen dürfen nicht übersehen werden?","a":"<b>Subarachnoidalblutung</b> („Vernichtungskopfschmerz“, Donnerschlag), <b>Meningitis</b> (Fieber + Meningismus), <b>Hirndruck</b>/Tumor, Sinusvenenthrombose, <b>Riesenzellarteriitis</b> (Arteriitis temporalis), Glaukomanfall, Hypertensive Krise, Schlaganfall.","id":"k0081"},{"cat":"dd","topic":"DD Diarrhö","freq":73,"type":"qa","q":"Nenne Ursachen einer akuten und chronischen Diarrhö.","a":"<b>Akut:</b> infektiös (viral: Noro/Rota; bakteriell: Salmonellen, Campylobacter, EHEC; Toxine), Lebensmittelvergiftung, Medikamente (Antibiotika).<br><b>Chronisch:</b> CED (M. Crohn, Colitis ulcerosa), Reizdarm, Zöliakie, Malassimilation, Hyperthyreose, kolorektales Karzinom, exkretorische Pankreasinsuffizienz.","id":"k0082"},{"cat":"dd","topic":"DD Diarrhö","freq":73,"type":"qa","q":"Was unterscheidet osmotische von sekretorischer Diarrhö?","a":"<b>Osmotisch:</b> durch nicht resorbierbare Stoffe (Laktoseintoleranz, Laxanzien) → sistiert bei <b>Nahrungskarenz</b>.<br><b>Sekretorisch:</b> vermehrte Sekretion (Toxine, z. B. Cholera; hormonell) → besteht auch bei <b>Fasten</b> fort.","id":"k0083"},{"cat":"dd","topic":"DD Gastrointestinale Blutung","freq":45,"type":"qa","q":"Wie unterscheidet man obere und untere GI-Blutung klinisch?","a":"<b>Obere GI-Blutung</b> (bis Treitz-Band): <b>Hämatemesis</b> (Bluterbrechen, „kaffeesatzartig“) und <b>Teerstuhl/Meläna</b> (schwarz). Ursachen: Ulkus, Ösophagusvarizen, Mallory-Weiss.<br><b>Untere GI-Blutung:</b> <b>Hämatochezie</b> (frisches Blut/Blutauflagerungen). Ursachen: Hämorrhoiden, Divertikel, Kolonkarzinom, CED.","id":"k0084"},{"cat":"dd","topic":"DD Atemnot/Dyspnoe","freq":54,"type":"qa","q":"Nenne die wichtigsten Ursachen der Dyspnoe.","a":"<b>Pulmonal:</b> Asthma, COPD, Pneumonie, Lungenembolie, Pneumothorax, Lungenödem, Erguss, Tumor.<br><b>Kardial:</b> Herzinsuffizienz, ACS, Rhythmusstörung.<br><b>Sonstige:</b> Anämie, metabolische Azidose (Kußmaul-Atmung), Hyperventilation/Angst, Anaphylaxie, Fremdkörper.","id":"k0085"},{"cat":"dd","topic":"DD Beinschmerzen","freq":57,"type":"qa","q":"Nenne Differenzialdiagnosen von Beinschmerzen.","a":"<b>Gefäße:</b> pAVK (Claudicatio, belastungsabhängig), tiefe Beinvenenthrombose (Schwellung, Überwärmung), CVI.<br><b>Muskuloskelettal:</b> Muskelfaserriss, Arthrose, Bandscheibenvorfall (Ischialgie), Fraktur.<br><b>Neurologisch:</b> Polyneuropathie, Restless Legs.<br><b>Entzündlich:</b> Erysipel, Erythema nodosum, Kompartmentsyndrom.","id":"k0086"},{"cat":"dd","topic":"DD Herzrhythmusstörungen","freq":55,"type":"qa","q":"Wie unterscheidet man tachykarde und bradykarde Rhythmusstörungen? Beispiele?","a":"<b>Tachykard</b> (>100/min): Vorhofflimmern/-flattern, supraventrikuläre/ventrikuläre Tachykardie, Kammerflimmern (Notfall!).<br><b>Bradykard</b> (<60/min): Sinusbradykardie, AV-Block (I–III), Sick-Sinus-Syndrom. Symptome: Palpitationen, Schwindel, Synkope, Dyspnoe.","id":"k0087"},{"cat":"dd","topic":"DD Synkope","freq":26,"type":"qa","q":"Nenne die Hauptformen der Synkope.","a":"<b>Vasovagal/reflektorisch</b> (häufigste, harmlos: Schreck, langes Stehen).<br><b>Kardial</b> (gefährlich: Rhythmusstörung, Aortenstenose, Infarkt).<br><b>Orthostatisch</b> (Blutdruckabfall beim Aufstehen).<br><b>Zerebrovaskulär</b> (selten). DD zur Synkope: Epilepsie, Hypoglykämie.","id":"k0088"},{"cat":"dd","topic":"DD Ikterus","freq":3,"type":"qa","q":"Unterscheide prähepatischen, intrahepatischen und posthepatischen Ikterus.","a":"<b>Prähepatisch (hämolytisch):</b> vermehrter Anfall → indirektes (unkonjug.) Bilirubin ↑.<br><b>Intrahepatisch:</b> Leberzellschaden (Hepatitis, Zirrhose) → beides ↑.<br><b>Posthepatisch (cholestatisch):</b> Abflussstörung (Steine, Tumor) → direktes (konjug.) Bilirubin ↑, <b>heller Stuhl, dunkler Urin</b>, Juckreiz.","id":"k0089"},{"cat":"dd","topic":"DD Fieber","freq":8,"type":"qa","q":"Was bedeutet „Fieber unklarer Genese“ (FUO) und welche Ursachengruppen gibt es?","a":"Fieber >38,3 °C über >3 Wochen ohne Diagnose trotz Abklärung. Ursachengruppen: <b>Infektionen</b> (abszedierend, TBC, Endokarditis), <b>Malignome</b> (v. a. Lymphome), <b>Autoimmun-/entzündliche</b> Erkrankungen (Kollagenosen, Vaskulitiden), sonstige (Medikamentenfieber).","id":"k0090"},{"cat":"dd","topic":"DD Ödeme","freq":5,"type":"qa","q":"Nenne Ursachen generalisierter und lokaler Ödeme.","a":"<b>Generalisiert:</b> kardial (Rechtsherzinsuffizienz, symmetrisch, Knöchel), renal (nephrotisches Syndrom, Lidödem), hepatisch (Hypalbuminämie, Aszites), Eiweißmangel.<br><b>Lokal:</b> Thrombose, Lymphödem, Entzündung, Angioödem, chronisch-venöse Insuffizienz.","id":"k0091"},{"cat":"infekt","topic":"Grundbegriffe","freq":5,"type":"qa","q":"Definiere Kontagiosität, Inkubationszeit und Infektiosität.","a":"<b>Kontagiosität (Kontagionsindex):</b> Ansteckungsfähigkeit – Anteil der Exponierten, die sich anstecken.<br><b>Inkubationszeit:</b> Zeit von Infektion bis zum Auftreten erster Symptome.<br><b>Infektiosität (Ansteckungsfähigkeit):</b> Zeitraum, in dem ein Erkrankter andere anstecken kann.","id":"k0092"},{"cat":"infekt","topic":"Grundbegriffe","freq":5,"type":"qa","q":"Unterscheide Epidemie, Pandemie und Endemie.","a":"<b>Epidemie:</b> zeitlich und örtlich begrenzte Häufung.<br><b>Pandemie:</b> länder-/kontinentübergreifende Ausbreitung.<br><b>Endemie:</b> dauerhaftes, gehäuftes Vorkommen in einer bestimmten Region (z. B. Malaria in den Tropen).","id":"k0093"},{"cat":"infekt","topic":"Erregerarten","freq":5,"type":"qa","q":"Nenne die Erregergruppen (mit je einem Beispiel).","a":"<b>Bakterien</b> (Salmonellen), <b>Viren</b> (Influenza), <b>Pilze</b> (Candida), <b>Protozoen</b> (Plasmodien/Malaria), <b>Würmer/Helminthen</b> (Bandwurm), <b>Prionen</b> (CJD), Ektoparasiten (Krätzmilbe).","id":"k0094"},{"cat":"infekt","topic":"Inkubationszeiten","freq":5,"type":"qa","q":"Nenne die Inkubationszeiten wichtiger Kinderkrankheiten.","a":"<b>Masern:</b> 1–2 Wo · <b>Röteln:</b> 2–3 Wo · <b>Windpocken:</b> ~2 Wo (14–21 d) · <b>Scharlach:</b> 1–5 d · <b>Mumps:</b> 2–4 Wo (~18 d) · <b>Ringelröteln:</b> 4–14 d · <b>Dreitagefieber:</b> 3–15 d · <b>Keuchhusten:</b> 7–20 d.","id":"k0095"},{"cat":"infekt","topic":"Exanthem-Krankheiten","freq":42,"type":"qa","q":"Wie lässt sich das Exanthem bei Masern, Röteln und Scharlach unterscheiden?","a":"<b>Masern:</b> grobfleckig, konfluierend, makulopapulös, bräunlich-rosa, beginnt <b>hinter den Ohren</b> → absteigend; Koplik-Flecken.<br><b>Röteln:</b> klein-mittelfleckig, <b>nicht</b> konfluierend, hellrot; hinter Ohren → Rumpf; nuchale Lymphknoten.<br><b>Scharlach:</b> feinfleckig, „sandpapierartig“, in Achsel/Leiste, <b>periorale Blässe</b>, Himbeerzunge; Ausgangspunkt Gelenkbeugen.","id":"k0096"},{"cat":"infekt","topic":"Masern","freq":130,"type":"qa","q":"Beschreibe Erreger, Übertragung und den typischen Verlauf der Masern.","a":"<b>Erreger:</b> Masernvirus (Paramyxo), Reservoir Mensch. <b>Übertragung:</b> Tröpfchen/Aerosole, hochkontagiös.<br><b>Prodromal (3–5 d):</b> Fieber, Rhinitis, Konjunktivitis, bellender Husten, <b>Koplik-Flecken</b> (Wangenschleimhaut), „Enanthem vor Exanthem“.<br><b>Exanthemstadium:</b> 2. Fiebergipfel + grobfleckiges Exanthem hinter den Ohren beginnend, absteigend.","id":"k0097"},{"cat":"infekt","topic":"Masern","freq":130,"type":"qa","q":"Nenne die gefürchteten Komplikationen der Masern.","a":"Otitis media, Masernkrupp (Erstickungsgefahr), Pneumonie (auch Riesenzell-), <b>Enzephalitis</b> (akut postinfektiös, 1–2 Wo nach Exanthem) sowie die <b>SSPE</b> (subakute sklerosierende Panenzephalitis, 6–8 Jahre später, <b>immer tödlich</b>). Vorübergehende Immunschwäche für ~6 Wochen.","id":"k0098"},{"cat":"infekt","topic":"Windpocken/Gürtelrose","freq":121,"type":"qa","q":"Erkläre den Zusammenhang zwischen Windpocken und Gürtelrose.","a":"Beide werden durch das <b>Varizella-Zoster-Virus (VZV)</b> verursacht. <b>Erstinfektion = Windpocken</b> (Varizellen, „Sternenhimmel“, Tröpfchen/Schmierinfektion). Das Virus persistiert in <b>Spinalganglien</b>. Reaktivierung (bei Immunschwäche/Alter/Stress) = <b>Gürtelrose (Herpes zoster)</b>, dermatomgebunden, halbseitig, schmerzhaft.","id":"k0099"},{"cat":"infekt","topic":"Windpocken","freq":121,"type":"qa","q":"Was ist typisch für das Windpocken-Exanthem?","a":"<b>„Sternenhimmel“/„Heubner-Sternenkarte“:</b> gleichzeitiges Nebeneinander verschiedener Stadien – Flecken, Papeln, Bläschen und verkrustete Effloreszenzen. Starker <b>Juckreiz</b>, Befall auch von Kopfhaut und Schleimhäuten, aber nicht an Hand-/Fußflächen.","id":"k0100"},{"cat":"infekt","topic":"Gürtelrose","freq":121,"type":"qa","q":"Nenne typische Klinik und eine wichtige Komplikation der Gürtelrose.","a":"Halbseitige, streng auf ein <b>Dermatom</b> begrenzte, gruppierte, schmerzhafte Bläschen; oft Prodromi mit brennendem Schmerz.<br>Komplikationen: <b>Post-Zoster-Neuralgie</b> (anhaltende Schmerzen), <b>Zoster ophthalmicus</b> (Augenbefall!), Zoster oticus (Ramsay-Hunt, Fazialisparese), generalisierter Zoster bei Immunschwäche.","id":"k0101"},{"cat":"infekt","topic":"Scharlach","freq":65,"type":"qa","q":"Beschreibe Erreger, Leitsymptome und Komplikationen von Scharlach.","a":"<b>Erreger:</b> β-hämolysierende Streptokokken der Gruppe A (Toxin).<br><b>Leitsymptome:</b> hohes Fieber, eitrige Angina tonsillaris, <b>Himbeerzunge</b>, feinfleckiges „Sandpapier“-Exanthem, <b>periorale Blässe</b>, Schuppung an Hand/Fuß.<br><b>Komplikationen:</b> rheumatisches Fieber, akute Glomerulonephritis, Karditis. Therapie: <b>Antibiotika</b> (Penicillin).","id":"k0102"},{"cat":"infekt","topic":"Mumps","freq":47,"type":"qa","q":"Beschreibe Mumps (Ziegenpeter) und seine Komplikationen.","a":"<b>Erreger:</b> Mumpsvirus (Tröpfchen). Leitsymptom: schmerzhafte Schwellung der <b>Ohrspeicheldrüsen (Parotitis)</b>, „Hamsterbacken“, abstehende Ohrläppchen.<br><b>Komplikationen:</b> <b>Orchitis</b> (→ mögliche Sterilität bei Jungen nach Pubertät), Pankreatitis, Meningitis/Enzephalitis, Innenohrschwerhörigkeit.","id":"k0103"},{"cat":"infekt","topic":"Ringelröteln","freq":17,"type":"qa","q":"Was ist typisch für Ringelröteln und wann sind sie gefährlich?","a":"<b>Erreger:</b> Parvovirus B19. <b>Schmetterlingserythem</b> im Gesicht, danach girlandenförmiges Exanthem an Extremitäten. Meist harmlos.<br><b>Gefährlich:</b> in der <b>Schwangerschaft</b> (Hydrops fetalis) und bei chronischer Hämolyse (aplastische Krise), da B19 die Erythropoese hemmt.","id":"k0104"},{"cat":"infekt","topic":"Keuchhusten","freq":44,"type":"qa","q":"Beschreibe die Stadien und den Erreger des Keuchhustens (Pertussis).","a":"<b>Erreger:</b> Bordetella pertussis. Stadien:<br>1. <b>Stadium catarrhale</b> (1–2 Wo): erkältungsähnlich, hochinfektiös.<br>2. <b>Stadium convulsivum</b> (2–6 Wo): anfallsartige stakkatoartige Hustenattacken mit <b>inspiratorischem Ziehen</b>, würgen/Erbrechen, v. a. nachts.<br>3. <b>Stadium decrementi</b>: Abklingen. Gefährlich für Säuglinge (Apnoe).","id":"k0105"},{"cat":"infekt","topic":"Tuberkulose","freq":62,"type":"qa","q":"Beschreibe Erreger, Übertragung und Verlauf der Tuberkulose.","a":"<b>Erreger:</b> Mycobacterium tuberculosis (säurefeste Stäbchen). <b>Übertragung:</b> aerogen (Tröpfchen).<br><b>Primärtuberkulose:</b> Primärkomplex (Ghon-Herd + Lymphknoten), meist symptomarm.<br><b>Postprimär:</b> Reaktivierung → offene TBC (Kavernen). Symptome: chronischer Husten, <b>Hämoptysen</b>, B-Symptomatik (Nachtschweiß, Gewichtsverlust). Meldepflichtig, Behandlungsverbot HP.","id":"k0106"},{"cat":"infekt","topic":"Tuberkulose","freq":62,"type":"qa","q":"Welche Diagnostik wird bei Tuberkulose eingesetzt?","a":"Röntgen-Thorax, <b>Tuberkulin-Hauttest (Mendel-Mantoux)</b>, <b>IGRA</b> (Interferon-γ-Test, z. B. Quantiferon), mikroskopischer Erregernachweis (Ziehl-Neelsen-Färbung säurefester Stäbchen), Kultur (Goldstandard, langsam), PCR. „Offene TBC“ = Erregernachweis im Sputum → hochansteckend.","id":"k0107"},{"cat":"infekt","topic":"Influenza","freq":84,"type":"qa","q":"Wie unterscheidet sich die echte Influenza (Grippe) von einem grippalen Infekt?","a":"<b>Influenza:</b> <b>plötzlicher</b> Beginn mit hohem Fieber, starkem Krankheitsgefühl, Kopf-/Gliederschmerzen, trockenem Husten; Erreger Influenzaviren (A/B). Komplikation: Pneumonie (viral/bakterielle Superinfektion), Myokarditis.<br><b>Grippaler Infekt (Erkältung):</b> langsamer Beginn, mild, v. a. Schnupfen/Halsschmerz, versch. Erreger (Rhino-, Adenoviren).","id":"k0108"},{"cat":"infekt","topic":"COVID-19","freq":5,"type":"qa","q":"Nenne Erreger, Übertragung und typische Symptome von COVID-19.","a":"<b>Erreger:</b> SARS-CoV-2. Übertragung: Tröpfchen/Aerosole. Symptome variabel: Fieber, trockener Husten, Abgeschlagenheit, <b>Geruchs-/Geschmacksverlust</b>, Dyspnoe. Komplikationen: Pneumonie/ARDS, Thromboembolien, Long-COVID. Namentlich meldepflichtig (§6/§7).","id":"k0109"},{"cat":"infekt","topic":"Borreliose","freq":32,"type":"qa","q":"Beschreibe Erreger, Übertragung und Stadien der Lyme-Borreliose.","a":"<b>Erreger:</b> Borrelia burgdorferi (Bakterium), Übertragung durch <b>Zeckenstich</b>.<br><b>Stadium 1:</b> <b>Erythema migrans</b> (Wanderröte).<br><b>Stadium 2:</b> Neuroborreliose (Fazialisparese, Meningoradikulitis/Bannwarth), Karditis, Arthralgien.<br><b>Stadium 3:</b> Lyme-Arthritis, Acrodermatitis chronica atrophicans. Therapie: Antibiotika (Doxycyclin).","id":"k0110"},{"cat":"infekt","topic":"FSME","freq":36,"type":"qa","q":"Was ist FSME und wie unterscheidet sie sich von der Borreliose?","a":"<b>Frühsommer-Meningoenzephalitis:</b> Erreger = <b>FSME-Virus</b> (Flavivirus), Übertragung durch Zeckenstich (v. a. Endemiegebiete Süddeutschland).<br>Biphasischer Verlauf: grippal → nach Intervall Meningoenzephalitis. <b>Impfung möglich</b> (im Gegensatz zur Borreliose), aber keine kausale Therapie. Borreliose = bakteriell, antibiotisch behandelbar, keine Impfung.","id":"k0111"},{"cat":"infekt","topic":"Salmonellose","freq":22,"type":"qa","q":"Beschreibe die Salmonellen-Enteritis.","a":"<b>Erreger:</b> Salmonella enteritidis/typhimurium; Übertragung fäkal-oral über <b>Lebensmittel</b> (Eier, Geflügel). IZ Stunden bis 3 Tage. Symptome: Übelkeit, Erbrechen, wässrige <b>Diarrhö</b>, Fieber, Bauchkrämpfe. Meist selbstlimitierend; Ausscheider möglich. Erregernachweis §7-meldepflichtig.","id":"k0112"},{"cat":"infekt","topic":"Meningitis","freq":30,"type":"qa","q":"Nenne Leitsymptome und Erreger der bakteriellen Meningitis.","a":"<b>Leitsymptome:</b> hohes Fieber, starke Kopfschmerzen, <b>Meningismus</b> (Nackensteife), Photophobie, Erbrechen, Bewusstseinsstörung. Bei Meningokokken: <b>Petechien/Purpura</b> (Waterhouse-Friderichsen-Syndrom).<br><b>Erreger:</b> Meningokokken, Pneumokokken, Haemophilus influenzae. <b>Notfall!</b> Meningokokken-Meningitis §6-meldepflichtig.","id":"k0113"},{"cat":"infekt","topic":"HIV/AIDS","freq":25,"type":"qa","q":"Beschreibe Übertragung und Stadien der HIV-Infektion.","a":"<b>Übertragung:</b> Blut, sexuell, vertikal (Mutter-Kind).<br><b>Stadien:</b> akute Infektion (grippeähnlich) → Latenz (asymptomatisch) → AIDS (CD4-Zellen ↓ → opportunistische Infektionen: Pneumocystis-Pneumonie, Candida, Kaposi-Sarkom, Toxoplasmose).<br>Erregernachweis (HIV) <b>nichtnamentlich</b> ans RKI meldepflichtig.","id":"k0114"},{"cat":"infekt","topic":"Hepatitis","freq":86,"type":"qa","q":"Unterscheide die Übertragungswege von Hepatitis A, B und C.","a":"<b>Hepatitis A:</b> <b>fäkal-oral</b> (Schmierinfektion, Lebensmittel/Wasser), keine Chronifizierung.<br><b>Hepatitis B:</b> <b>parenteral/sexuell</b>, Blut, vertikal; kann chronisch werden; Impfung verfügbar.<br><b>Hepatitis C:</b> v. a. <b>parenteral (Blut)</b>; hohe Chronifizierungsrate; keine Impfung. Akute Virushepatitis §6-, Erregernachweis §7-meldepflichtig.","id":"k0115"},{"cat":"infekt","topic":"Syphilis","freq":14,"type":"qa","q":"Beschreibe Erreger und Stadien der Syphilis (Lues).","a":"<b>Erreger:</b> Treponema pallidum, sexuell übertragen.<br><b>Stadium I:</b> schmerzloser <b>Ulcus durum</b> (harter Schanker) + LK-Schwellung.<br><b>Stadium II:</b> generalisiertes Exanthem (auch Handflächen/Fußsohlen), Condylomata lata.<br><b>Stadium III:</b> Gummen, kardiovaskulär, Neurosyphilis (Tabes dorsalis, progressive Paralyse). Erregernachweis <b>nichtnamentlich</b> ans RKI.","id":"k0116"},{"cat":"infekt","topic":"Tetanus","freq":17,"type":"qa","q":"Beschreibe Erreger und Klinik des Tetanus (Wundstarrkrampf).","a":"<b>Erreger:</b> Clostridium tetani (anaerobe Sporenbildner, Wunden), Toxin (Tetanospasmin) blockiert hemmende Neurone.<br><b>Klinik:</b> Muskelkrämpfe/Rigor: <b>Trismus (Kiefersperre), Risus sardonicus</b> (Teufelsgrinsen), <b>Opisthotonus</b>, generalisierte tonische Krämpfe bei erhaltenem Bewusstsein. Prophylaxe: Impfung (aktiv/passiv).","id":"k0117"},{"cat":"infekt","topic":"Tollwut","freq":20,"type":"qa","q":"Beschreibe Übertragung und Verlauf der Tollwut (Rabies).","a":"<b>Erreger:</b> Rabiesvirus, Übertragung durch <b>Biss infizierter Tiere</b> (Fuchs, Hund, Fledermaus).<br>Verlauf: unspezifisches Prodromal → exzitatorische Phase mit <b>Hydrophobie</b>, Schlundkrämpfen, Aggression → Lähmung → Tod. Nach Symptombeginn praktisch <b>immer tödlich</b>. Postexpositionelle Impfung (aktiv+passiv) möglich.","id":"k0118"},{"cat":"infekt","topic":"Poliomyelitis","freq":14,"type":"qa","q":"Was ist die Poliomyelitis (Kinderlähmung)?","a":"<b>Erreger:</b> Poliovirus (fäkal-oral). Meist asymptomatisch; bei paralytischem Verlauf Befall der <b>motorischen Vorderhornzellen</b> des Rückenmarks → <b>schlaffe, asymmetrische Lähmungen</b>
